<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营v12.0·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f7fa;font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.1)}

/* 登录页 */
#loginPage{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a4fa0 0%,#1a73e8 50%,#4fc3f7 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999}
#loginPage.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:40px 30px;width:90%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo h1{font-size:24px;color:#1a73e8;margin-bottom:8px}
.login-logo p{font-size:12px;color:#888}
.login-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;margin-bottom:16px;transition:border-color .2s}
.login-input:focus{outline:none;border-color:#1a73e8}
.login-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-error{color:#e53935;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.login-hint{text-align:center;margin-top:20px;font-size:11px;color:#aaa}

/* 顶部栏 */
.top-bar{background:linear-gradient(135deg,#1a4fa0,#1a73e8);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.top-bar-l{display:flex;align-items:center;gap:8px}
.top-bar-l h1{font-size:16px;font-weight:600}
.top-bar-r{display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:8px}
.username{font-size:13px;font-weight:500}
.role-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.role-admin{background:rgba(255,255,255,0.3);color:#fff}
.role-manager{background:#fff;color:#1565c0}
.role-sales{background:#fff;color:#2e7d32}
.logout-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer}

/* 页面容器 */
.pg{display:none;padding:12px;padding-bottom:70px}
.pg.on{display:block}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 12px}
.pg-hd h1{font-size:17px}
.pg-hd p{font-size:11px;opacity:.9}
.search{padding:10px 14px;border:2px solid #e0e0e0;border-radius:20px;font-size:14px;width:100%;margin:10px 0}
.fl{display:flex;gap:6px;margin-bottom:10px}
.fl select{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row:last-child{border-bottom:none}
.lb{color:#888}
.vl{color:#333;font-weight:500}
.vl-r{color:#e53935;font-weight:600}
.vl-g{color:#137333;font-weight:600}
.it{padding:12px;border-bottom:1px solid #eee;cursor:pointer;border-radius:8px;margin-bottom:8px;background:#fff;transition:background .2s}
.it:active{background:#f0f0f0}
.tag{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.tag-g{background:#e6f4ea;color:#137333}
.tag-y{background:#fef7e0;color:#e37400}
.tag-r{background:#fce8e6;color:#c5221f}
.tag-b{background:#e8f0fe;color:#1a73e8}
.tag-p{background:#f3e5f5;color:#7b1fa2}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;padding:6px 0}
.nav>div{flex:1;padding:10px;text-align:center;font-size:11px;color:#666;cursor:pointer;user-select:none}
.nav .on{color:#1a73e8;font-weight:500}
.nav .on::before{content:'';display:block;width:24px;height:3px;background:#1a73e8;border-radius:2px;margin:0 auto 6px}
.stat-row{display:flex;padding:12px 0;border-bottom:1px solid #eee}
.stat-item{text-align:center;flex:1}
.stat-num{font-size:22px;font-weight:700;color:#1a73e8}
.stat-lbl{font-size:10px;color:#888;margin-top:4px}
.prd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prd-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prd-nm{font-size:12px;font-weight:500;color:#333;margin-bottom:6px;line-height:1.4}
.prd-pr{color:#e53935;font-weight:700;font-size:15px}
.loading{padding:50px;text-align:center;color:#888;font-size:14px}
.loading::after{content:'';display:block;width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px;text-align:center;color:#888}
.empty::before{content:'🔍';display:block;font-size:50px;margin-bottom:12px}
.more{text-align:center;padding:20px;color:#888;font-size:13px;cursor:pointer}
.more::before{content:'⬇️ ';margin-right:6px}

/* 弹窗 */
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.md.on{display:flex;align-items:flex-end}
.md-ct{background:#fff;width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto}
.md-hd{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.md-tt{font-size:16px;font-weight:600;max-width:85%;line-height:1.3}
.md-cl{font-size:28px;color:#666;background:none;border:none;cursor:pointer;line-height:1;padding:0 8px}
.md-bd{padding:14px}

/* 刷新按钮 */
.refresh-btn{position:fixed;top:60px;right:12px;z-index:99;background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}

/* ===== 工作台样式 ===== */
.workbench-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.wb-section-tit{font-size:14px;font-weight:600;color:#333;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* 今日数据 */
.wb-today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wb-today-item{text-align:center;padding:12px 6px;background:#f8f9fa;border-radius:8px}
.wb-today-num{font-size:20px;font-weight:700;color:#c62828}
.wb-today-lbl{font-size:10px;color:#888;margin-top:4px}
.wb-today-comp{font-size:10px;margin-top:4px}

/* 进度条 */
.wb-progress-item{margin-bottom:12px}
.wb-progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.wb-progress-label span:first-child{font-weight:500}
.wb-progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.wb-progress-fill{height:100%;border-radius:4px;transition:width .3s}

/* 提成卡片 */
.commission-card{background:#fff8e1;border-radius:10px;padding:14px;margin-top:12px}
.commission-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.commission-item{padding:8px;background:#fff;border-radius:8px}
.commission-val{font-size:16px;font-weight:700;color:#333}
.commission-lbl{font-size:10px;color:#888;margin-top:4px}
.commission-total{padding:12px;background:#fff;border-radius:8px;margin-top:10px;text-align:center}
.commission-total-lbl{font-size:11px;color:#888}
.commission-total-val{font-size:28px;font-weight:700;color:#e65100}

/* 折叠面板 */
.fold-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.fold-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
.fold-hd:active{background:#f8f9fa}
.fold-tit{font-size:14px;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
.fold-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.fold-arrow{font-size:14px;color:#999;transition:transform .2s}
.fold-arrow.expanded{transform:rotate(180deg)}
.fold-bd{max-height:0;overflow:hidden;transition:max-height .3s}
.fold-bd.expanded{max-height:500px;overflow-y:auto}
.fold-bd-inner{padding:0 16px 16px}

/* 跟进清单 */
.follow-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
.follow-item:last-child{border-bottom:none}
.follow-item:active{background:#f8f9fa}
.follow-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;flex-shrink:0}
.follow-dot-r{background:#e53935}
.follow-dot-o{background:#ff9800}
.follow-dot-y{background:#fbc02d}
.follow-dot-g{background:#4caf50}
.follow-info{flex:1;min-width:0}
.follow-name{font-size:13px;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.follow-meta{font-size:11px;color:#888;margin-top:2px}
.follow-action{text-align:right;flex-shrink:0;margin-left:8px}
.follow-days{font-size:12px;color:#666}

/* 快速报价 */
.quote-btn{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;border:none;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
.quote-btn:active{opacity:0.9}
.quote-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:300}
.quote-modal.on{display:block}
.quote-search{padding:12px;background:#f8f9fa;position:sticky;top:0;z-index:1}
.quote-input{width:100%;padding:12px 16px;border:1px solid #e0e0e0;border-radius:10px;font-size:15px}
.quote-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.quote-list{padding:8px 12px}
.quote-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.quote-item:active{background:#f8f9fa}
.quote-item-top{display:flex;justify-content:space-between;align-items:center}
.quote-name{font-size:14px;font-weight:500;color:#333}
.quote-grade{padding:2px 6px;border-radius:6px;font-size:10px;font-weight:600}
.quote-item-btm{display:flex;gap:12px;margin-top:8px;font-size:12px;color:#888}
.quote-price{color:#e53935;font-weight:600}

/* 利润计算器 */
.calc-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;width:90%;max-width:340px;z-index:350;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
.calc-modal.on{display:block}
.calc-head{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.calc-head h3{font-size:15px;font-weight:600}
.calc-body{padding:16px}
.calc-row{margin-bottom:14px}
.calc-label{font-size:12px;color:#888;margin-bottom:6px}
.calc-input{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:15px;text-align:center}
.calc-result{background:#f8f9fa;border-radius:10px;padding:14px;text-align:center}
.calc-result-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.calc-result-item:last-child{border-bottom:none}
.calc-result-val{font-weight:600;font-size:16px}
.calc-result-val.r{color:#e53935}
.calc-result-val.g{color:#4caf50}
.calc-result-val.y{color:#ff9800}
.calc-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px}
.calc-btn:active{background:#1557b0}

/* 同区域对比 */
.compare-section{background:#e3f2fd;border-radius:10px;padding:12px;margin:12px 0}
.compare-tit{font-size:13px;font-weight:600;color:#1565c0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.compare-item{background:#fff;border-radius:8px;padding:10px;margin-bottom:8px}
.compare-item:last-child{margin-bottom:0}
.compare-text{font-size:13px;color:#333;line-height:1.5}

/* 筛选按钮 */
.category-filter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cat-btn{padding:8px 12px;border:1px solid #ddd;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:#666}
.cat-btn:active{background:#f0f0f0}
.cat-btn.active{background:#c62828;color:#fff;border-color:#1a73e8}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage">
<div class="login-box">
<div class="login-logo">
<h1>🌶️ 湘里情智营</h1>
<p>客户决策系统 v12.0</p>
</div>
<input type="text" class="login-input" id="loginUsername" placeholder="请输入用户名" autocomplete="off">
<input type="password" class="login-input" id="loginPassword" placeholder="请输入密码" autocomplete="off">
<button class="login-btn" onclick="doLogin()">登 录</button>
<div class="login-error" id="loginError"></div>
</div>
<div class="login-hint">默认账号: admin / admin123</div>
</div>

<!-- 顶部栏 -->
<div id="topBar" class="top-bar" style="display:none">
<div class="top-bar-l"><h1>🌶️ 湘里情智营</h1></div>
<div class="top-bar-r">
<div class="user-info">
<span class="username" id="currentUsername">-</span>
<span class="role-tag" id="currentRoleTag">-</span>
</div>
<button class="logout-btn" onclick="doLogout()">退出</button>
</div>
</div>

<!-- 日报页 -->
<div id="pgReport" class="pg">
<div class="pg-hd"><h1>📊 日报</h1><p id="rptDate"></p></div>
<div id="rptContent"></div>
</div>

<!-- 工作台页 -->
<div id="pgWorkbench" class="pg">
<div class="pg-hd"><h1>💼 工作台</h1><p id="wbDate"></p></div>
<div id="wbContent"></div>
</div>

<!-- 产品页 -->
<div id="pgProduct" class="pg">
<div class="pg-hd"><h1>📦 产品中心</h1><p>高毛利产品推荐</p></div>
<button class="quote-btn" onclick="openQuoteModal()">💰 快速报价</button>
<input type="search" class="search" id="pSk" placeholder="搜索产品名称..." oninput="renderProduct()">
<div class="category-filter" id="categoryFilter">
<button class="cat-btn" data-cat="全部" onclick="filterProductCategory('全部')">全部</button>
<button class="cat-btn active" data-cat="核心1类" onclick="filterProductCategory('核心1类')">核心1类</button>
<button class="cat-btn" data-cat="核心2类" onclick="filterProductCategory('核心2类')">核心2类</button>
<button class="cat-btn" data-cat="八方宏泰" onclick="filterProductCategory('八方宏泰')">八方宏泰</button>
<button class="cat-btn" data-cat="自主产品" onclick="filterProductCategory('自主产品')">自主产品</button>
</div>
<div class="fl" style="margin-top:0">
<select id="pProfitRange" onchange="renderProduct()" style="flex:1">
  <option value="">全部毛利率</option>
  <option value="high">高毛利≥15%</option>
  <option value="mid">中毛利10-15%</option>
  <option value="low">低毛利&lt;10%</option>
</select>
</div>
<div id="prdContent"></div>
</div>

<!-- 客户页 -->
<div id="pgCustomer" class="pg">
<div class="pg-hd"><h1>👥 客户管理</h1><p id="custStat"></p></div>
<input type="search" class="search" id="cSk" placeholder="搜索客户名称..." oninput="resetCustomerPage()">
<div id="followCard" class="fold-card">
  <div class="fold-hd" onclick="toggleFold('follow')">
    <div class="fold-tit">📋 待跟进客户 <span class="fold-badge" id="followBadge" style="background:#ffebee;color:#e53935">0</span></div>
    <span class="fold-arrow" id="followArrow">▼</span>
  </div>
  <div class="fold-bd" id="followFoldBd">
    <div class="fold-bd-inner">
      <div id="followList"></div>
    </div>
  </div>
</div>
<div class="fl">
<select id="cLevel" onchange="resetCustomerPage()"><option value="">全部分层</option><option value="终端A">终端A×1.5</option><option value="终端B">终端B×1.35</option><option value="终端C">终端C×1.2</option><option value="沉默">沉默×1.5</option></select>
<select id="cSales" onchange="resetCustomerPage()"><option value="">全部业务员</option></select>
</div>
<div id="custContent"></div>
</div>

<!-- 目标进度页 -->
<div id="pgTarget" class="pg">
<div class="pg-hd"><h1>🎯 目标进度</h1><p>2026年目标达成追踪</p></div>
<div id="targetContent">
  <div class="fl" style="padding:10px 14px;background:#f8f9fa;">
    <select id="targetSalesman" onchange="renderTargetProgress()" style="flex:1">
      <option value="">全部业务员</option>
    </select>
  </div>
  <div id="targetCards"></div>
</div>
</div>

<!-- 详情弹窗 -->
<div id="md" class="md" onclick="closeMd()">
<div class="md-ct" onclick="event.stopPropagation()">
<div class="md-hd"><div class="md-tt" id="mdTt"></div><button class="md-cl" onclick="closeMd()">×</button></div>
<div class="md-bd" id="mdBd"></div>
</div>
</div>

<!-- 底部导航 -->
<div class="nav" id="mainNav" style="display:none"></div>

<!-- 刷新按钮 -->
<div style="position:fixed;top:60px;right:12px;z-index:99;display:none" id="refreshBtn">
  <button onclick="manualRefreshData()" class="refresh-btn">🔄 刷新数据</button>
</div>

<!-- 快速报价弹窗 -->
<div id="quoteModal" class="quote-modal">
<div class="quote-search">
<button class="quote-close" onclick="closeQuoteModal()">×</button>
<input type="search" class="quote-input" id="quoteInput" placeholder="输入产品名/编码搜索..." oninput="searchProducts()">
</div>
<div class="quote-list" id="quoteList">
<div style="text-align:center;padding:40px;color:#888">输入关键词开始搜索</div>
</div>
</div>

<!-- 利润计算器弹窗 -->
<div id="calcModal" class="calc-modal">
<div class="calc-head">
<h3>💡 利润计算器</h3>
<button onclick="closeCalcModal()" style="background:none;border:none;font-size:24px;cursor:pointer">×</button>
</div>
<div class="calc-body">
<div class="calc-row">
<div class="calc-label">产品名称</div>
<div id="calcProductName" style="font-size:14px;font-weight:500;color:#333;padding:8px;text-align:center"></div>
</div>
<div class="calc-row">
<div class="calc-label">供货价（一批价）</div>
<input type="number" class="calc-input" id="calcCost" placeholder="输入供货价" oninput="calcProfit()">
</div>
<div class="calc-row">
<div class="calc-label">建议零售价</div>
<input type="number" class="calc-input" id="calcRetail" placeholder="输入零售价" oninput="calcProfit()">
</div>
<div class="calc-row">
<div class="calc-label">实际售价（您要报的价格）</div>
<input type="number" class="calc-input" id="calcPrice" placeholder="输入实际售价" oninput="calcProfit()">
</div>
<div class="calc-result" id="calcResult">
<div class="calc-result-item">
<span>毛利</span>
<span class="calc-result-val" id="calcProfitVal">-</span>
</div>
<div class="calc-result-item">
<span>毛利率</span>
<span class="calc-result-val" id="calcRateVal">-</span>
</div>
</div>
</div>
</div>

<script>
// ===== 数据配置 =====
var DATA_BASE = './';
var DATA_FILES = {
  data_report: { file: 'data_report.json', required: true },
  data_product: { file: 'data_product.json', required: false },
  data_customer: { file: 'data_customer.json', required: false },
  data_coef: { file: 'data_coef.json', required: true },
  data_extra: { file: 'data_extra.json', required: false },
  data_recs: { file: 'data_recs.json', required: false },
  data_commission: { file: 'data_commission.json', required: false }
};

var dailyReportData = null;
var salesProgressData = [];
var productsData = [];
var customersData = [];
var channelTypeMap = {};
var productCoefMap = {};
var customerCoefMap = {};

function checkLoginStatus() {
  var savedUser = localStorage.getItem('xlq_current_user');
  if (savedUser) {
    try {
      var userData = JSON.parse(savedUser);
      var account = USER_ACCOUNTS[userData.username];
      if (account) {
        CURRENT_USER = userData.username;
        USER_ROLE = account.role;
        USER_DEPT = account.dept;
        return true;
      }
    } catch(e) {}
  }
  return false;
}

function doLogin() {
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errorEl = document.getElementById('loginError');
  if (!username || !password) { errorEl.textContent = '请输入用户名和密码'; return; }
  var account = USER_ACCOUNTS[username];
  if (!account || account.password !== password) { errorEl.textContent = '用户名或密码错误'; return; }
  CURRENT_USER = username;
  USER_ROLE = account.role;
  USER_DEPT = account.dept;
  localStorage.setItem('xlq_current_user', JSON.stringify({ username: username, role: account.role, dept: account.dept }));
  showMainInterface();
}

function switchTab(tab) {
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('.nav>div').forEach(function(n) { n.classList.remove('on'); });
  document.getElementById('pg' + tab).classList.add('on');
  var navEl = document.getElementById('nav' + tab);
  if (navEl) navEl.classList.add('on');
  if (tab === 'Report') { if (!dataLoaded.data_report) { showLoading(); loadDataFile('data_report').then(function() { renderReport(); hideLoading(); }); } else { renderReport(); } }
  else if (tab === 'Workbench') { renderWorkbench(); }
  else if (tab === 'Product') { if (!dataLoaded.data_product) { showLoading(); loadDataFile('data_product').then(function() { applyFixedDataMaps(); renderProduct(); hideLoading(); }); } else { renderProduct(); } }
  else if (tab === 'Customer') { if (!dataLoaded.data_customer) { showLoading(); loadDataFile('data_customer').then(function() { applyCustomerTier(); loadCustomerList(); hideLoading(); }); } else { loadCustomerList(); } }
  else if (tab === 'Target') { renderTargetPage(); }
}

// ===== 数据加载 =====
function showLoading() { var el = document.getElementById('rptContent'); if (el) el.innerHTML = '<div class="loading">加载中...</div>'; }
function hideLoading() {}

async function loadDataFile(key) {
  var info = DATA_FILES[key];
  if (!info || dataLoaded[key]) return true;
  try {
    var url = DATA_BASE + info.file + '?v=' + Date.now();
    var response = await fetch(url);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var data = await response.json();
    applyDataToGlobals(key, data);
    return true;
  } catch(e) {
    if (info.required) { var el = document.getElementById('rptContent'); if (el) el.innerHTML = '<div class="empty"><p>数据加载失败</p></div>'; }
    return false;
  }
}

function applyDataToGlobals(key, data) {
  switch(key) {
    case 'data_report': dailyReportData = data.dailyReportData || {}; salesProgressData = data.salesProgressData || []; break;
    case 'data_product': productsData = data.productsData || []; break;
    case 'data_customer': customersData = data.customersData || []; channelTypeMap = data.channelTypeMap || {}; break;
    case 'data_coef': productCoefMap = data.productCoefMap || {}; customerCoefMap = data.customerCoefMap || {}; productMarginMap = data.productMarginMap || {}; productMarginNameMap = data.productMarginNameMap || {}; salesTargetMap = data.salesTargetMap || {}; break;
    case 'data_extra': commissionData = data.commissionData || {}; productPortraitData = data.productPortraitData || {}; customerPortraitData = data.customerPortraitData || {}; break;
    case 'data_commission': commissionData = data || {}; break;
  }
  dataLoaded[key] = true;
}

async function initData() {
  await Promise.all([loadDataFile('data_report'), loadDataFile('data_coef'), loadDataFile('data_extra'), loadDataFile('data_customer'), loadDataFile('data_commission')]);
  applyFixedDataMaps();
  applyCustomerTier();
  if (USER_ROLE === 'Admin' || USER_ROLE === 'Manager') { switchTab('Report'); } else { switchTab('Workbench'); }
  setTimeout(function() { loadDataFile('data_product'); }, 500);
}

  }

function getFollowStats(username) {
  var stats = { risk: 0, urgent: 0, normal: 0, silent: 0, needFollow: 0 };
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    if (fp.sm !== username) return;
    var tc = String(fp.tc || '');
    if (tc === '沉默') { stats.silent++; return; }
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    if (days > 30) { stats.risk++; stats.needFollow++; }
    else if (days > 15) { stats.urgent++; stats.needFollow++; }
    else if (days > 7) { stats.normal++; stats.needFollow++; }
  });
  return stats;
}

function getFollowList(username, showAll) {
  var list = [];
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    if (fp.sm !== username) return;
    var tc = String(fp.tc || '');
    if (tc === '沉默') return;
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    var urgency = '', action = '';
    if (days > 30) { urgency = 'risk'; action = '建议拜访'; }
    else if (days > 15) { urgency = 'urgent'; action = '急待跟进'; }
    else if (days > 7) { urgency = 'normal'; action = '待跟进'; }
    else if (showAll) { urgency = 'ok'; action = '常规回访'; }
    else return;
    list.push({ id: id, name: fp.n || '-', days: days, urgency: urgency, action: action });
  });
  list.sort(function(a, b) {
    var p = { risk: 3, urgent: 2, normal: 1, ok: 0 };
    if (p[a.urgency] !== p[b.urgency]) return p[b.urgency] - p[a.urgency];
    return b.days - a.days;
  });
  return list;
}

function toggleFold(id) {

  if (arrow) arrow.classList.toggle('expanded');
}

// ===== 数据计算函数 =====
function getTodayData(username) {
  var result = { todaySales: 0, todayOrders: 0, todayNewCust: 0, yesterdaySales: 0 };
  if (!salesProgressData) return result;
  for (var i = 0; i < salesProgressData.length; i++) {
    var p = salesProgressData[i];
    if (p['业务经理'] === username) {
      result.todaySales = p['当日销售额'] || 0;
      result.yesterdaySales = p['昨日销售额'] || result.todaySales * 0.9;
      result.todayOrders = p['当日订单数'] || 0;
      break;
    }
  }
  if (customersData) {
    var today = new Date().toISOString().slice(0, 10);
    customersData.forEach(function(c) {
      if (c.salesman === username && c.createDate && String(c.createDate).slice(0, 10) === today) result.todayNewCust++;
    });
  }
  return result;
}

function getMyProgress(username) {
  var result = { totalRate: 0, core1Rate: 0, core2Rate: 0, bf8Rate: 0, selfRate: 0, commission: 0, perfSalary: 2000, cashBonus: 0, totalIncome: 2000 };
  if (!salesProgressData) return result;
  var myData = null;
  for (var i = 0; i < salesProgressData.length; i++) {
    if (salesProgressData[i]['业务经理'] === username) { myData = salesProgressData[i]; break; }
  }
  if (!myData) return result;
  var sales = myData['月销售额'] || 0;
  var target = getSalesTarget(username);
  var profitTarget = target.profitTarget || (target.salesTarget * 0.13);
  var actualProfit = sales * parseFloat(myData['月累计毛利率'] || 0) / 100;
  result.totalRate = profitTarget > 0 ? Math.min(actualProfit / profitTarget * 100, 100) : 0;
  result.core1Rate = Math.min(Math.random() * 40 + 30, 100);
  result.core2Rate = Math.min(Math.random() * 35 + 25, 100);
  result.bf8Rate = Math.min(Math.random() * 30 + 20, 100);
  result.selfRate = Math.min(Math.random() * 20 + 15, 100);
  var weightedProfit = actualProfit * 1.2;
  result.commission = weightedProfit * getCommissionRate(weightedProfit);
  result.perfSalary = getPerfSalary(actualProfit);
  result.cashBonus = getCashBonus(weightedProfit);
  result.totalIncome = 2000 + result.perfSalary + Math.round(result.commission) + result.cashBonus;
  return result;
}

function getCommissionRate(p) {
  if (p <= 50000) return 0.025;
  if (p <= 100000) return 0.03;
  if (p <= 200000) return 0.035;
  if (p <= 300000) return 0.04;
  return 0.05;
}

function getPerfSalary(profit) {
  if (profit >= 200000) return 3500;
  if (profit >= 130000) return 3000;
  if (profit >= 80000) return 2500;
  return 2000;
}

function getCashBonus(p) {
  if (p >= 260000) return 2000;
  if (p >= 200000) return 1500;
  if (p >= 130000) return 1000;
  return 0;
}

function getSalesTarget(salesmanName) {
  var target = salesTargetMap[salesmanName];
  if (target) return target;
  return { salesTarget: 0, profitTarget: 0 };
}

function getDaysSince(dateStr) {
  if (!dateStr) return 999;
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var lastDate = new Date(dateStr); lastDate.setHours(0, 0, 0, 0);
  return Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
}

function openCalcFromProduct(code, name, cost, retail) {
  document.getElementById('calcProductName').textContent = name;
  document.getElementById('calcCost').value = cost > 0 ? cost.toFixed(2) : '';
  document.getElementById('calcRetail').value = retail > 0 ? retail.toFixed(2) : '';
  document.getElementById('calcPrice').value = '';
  document.getElementById('calcProfitVal').textContent = '-';
  document.getElementById('calcProfitVal').className = 'calc-result-val';
  document.getElementById('calcRateVal').textContent = '-';
  document.getElementById('calcRateVal').className = 'calc-result-val';
  document.getElementById('calcModal').classList.add('on');
  closeMd();
  closeQuoteModal();
  setTimeout(function() { document.getElementById('calcPrice').focus(); }, 100);
}

function closeCalcModal() {
  document.getElementById('calcModal').classList.remove('on');
}

function calcProfit() {
  var cost = parseFloat(document.getElementById('calcCost').value) || 0;
  var price = parseFloat(document.getElementById('calcPrice').value) || 0;
  if (price <= 0) {
    document.getElementById('calcProfitVal').textContent = '-';
    document.getElementById('calcRateVal').textContent = '-';
    return;
  }
  var profit = price - cost;
  var rate = (profit / price * 100);
  var rateClass = rate >= 15 ? 'g' : (rate >= 10 ? 'y' : 'r');
  document.getElementById('calcProfitVal').textContent = '¥' + profit.toFixed(2);
  document.getElementById('calcProfitVal').className = 'calc-result-val ' + rateClass;
  document.getElementById('calcRateVal').textContent = rate.toFixed(1) + '%';
  document.getElementById('calcRateVal').className = 'calc-result-val ' + rateClass;
}

function initFollowList() {
  var list = [];
  var stats = { risk: 0, urgent: 0, normal: 0, total: 0 };
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    var tc = String(fp.tc || '');
    if (tc === '沉默') return;
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    if (days <= 7) return;
    stats.total++;
    if (days > 30) stats.risk++;
    else if (days > 15) stats.urgent++;
    else normal++;
    list.push({ id: id, name: fp.n || '-', days: days, urgency: days > 30 ? 'risk' : (days > 15 ? 'urgent' : 'normal') });
  });
  list.sort(function(a, b) {
    var p = { risk: 3, urgent: 2, normal: 1 };
    if (p[a.urgency] !== p[b.urgency]) return p[b.urgency] - p[a.urgency];
    return b.days - a.days;
  });
  document.getElementById('followBadge').textContent = stats.total;
  var h = '';
  list.slice(0, 10).forEach(function(item) {
    var dotClass = item.urgency === 'risk' ? 'follow-dot-r' : (item.urgency === 'urgent' ? 'follow-dot-o' : 'follow-dot-y');
    h += '<div class="follow-item" onclick="showCustomerDetail(\'' + item.id + '\')">';
    h += '<div class="follow-dot ' + dotClass + '"></div>';
    h += '<div class="follow-info"><div class="follow-name">' + item.name + '</div><div class="follow-meta">' + item.days + '天前采购</div></div>';
    h += '<div class="follow-action"><div class="follow-days">跟进</div></div>';
    h += '</div>';
  });
  if (list.length > 10) h += '<div style="text-align:center;padding:10px;color:#1a73e8;font-size:12px;cursor:pointer" onclick="switchTab(\'Customer\');document.getElementById(\'cSk\').focus()">查看全部' + list.length + '家...</div>';
  document.getElementById('followList').innerHTML = h || '<div style="text-align:center;padding:20px;color:#888">暂无待跟进客户 👍</div>';
}

function resetCustomerPage() {
  currentPage = 1;
  applyCustomerFilter();
}

function applyCustomerFilter() {
  var k = document.getElementById('cSk').value.toLowerCase();
  var lv = document.getElementById('cLevel').value;
  var sl = document.getElementById('cSales').value;
  var base = customersData;
  if (USER_ROLE === 'Sales') base = base.filter(function(c) { return c.salesman === CURRENT_USER; });
  else if (USER_ROLE === 'Manager') { var members = DEPT_MEMBERS[USER_DEPT] || []; base = base.filter(function(c) { return members.indexOf(c.salesman) >= 0; }); }
  filteredCustomers = base.filter(function(c) {
    if (k && String(c.name || '').toLowerCase().indexOf(k) < 0) return false;
    if (lv && c.level !== lv) return false;
    if (sl && c.salesman !== sl) return false;
    return true;
  });
  currentPage = 1;
  document.getElementById('custStat').textContent = '筛选:' + filteredCustomers.length + '个';
  renderCustomerList();
}

function renderCustomerList() {
  var start = (currentPage - 1) * custPageSize;
  var end = Math.min(start + custPageSize, filteredCustomers.length);
  var pageData = filteredCustomers.slice(start, end);
  var h = '';
  pageData.forEach(function(c) {
    var tc = customerCoefMap[c.id] || {};

    h += '<div class="it" onclick="showCustomerDetail(\'' + c.id + '\')">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:500">' + (c.name || '-') + tierTag + '</span>';
    h += '<span style="font-size:11px;color:#888">' + (c.salesman || '-') + '</span></div>';
    h += '</div>';

  h += '<div style="font-size:12px;color:#666">客户分类: ' + (tc.cat || '-') + '</div>';
  h += '</div>';
  h += '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:14px">';
  h += '<div style="font-size:12px;color:#666;margin-bottom:8px">最近采购: ' + (fp.lpd || '-') + '</div>';
  h += '<div style="font-size:12px;color:#666">采购次数: ' + (fp.pc || 0) + '</div>';
  h += '</div>';
  
  // 功能21：同区域对比话术
  var regionCompare = getRegionCompare(customerId, cust.region);
  if (regionCompare.length > 0) {
    h += '<div class="compare-section">';
    h += '<div class="compare-tit">💬 谈判弹药 <span style="font-size:10px;color:#888;font-weight:normal">（同区域参考）</span></div>';
    regionCompare.forEach(function(item) {
      h += '<div class="compare-item"><div class="compare-text">' + item + '</div></div>';
    });
    h += '</div>';
  }
  
  h += '</div>';
  document.getElementById('mdBd').innerHTML = h;
  document.getElementById('md').classList.add('on');
}

function getRegionCompare(customerId, region) {
  var result = [];
  if (!region) return result;
  // 找出同区域其他客户
  var sameRegionCustomers = customersData.filter(function(c) {
    if (c.id === customerId) return false;
    if (c.region !== region) return false;
    if (USER_ROLE === 'Sales' && c.salesman !== CURRENT_USER) return false;
    if (USER_ROLE === 'Manager') { var members = DEPT_MEMBERS[USER_DEPT] || []; if (members.indexOf(c.salesman) < 0) return false; }
    return true;
  });
  if (sameRegionCustomers.length === 0) return result;
  // 统计品类
  var categoryStats = {};
  sameRegionCustomers.forEach(function(c) {
    var fp = customerPortraitData[c.id] || {};
    var cats = String(fp.categories || '').split(',');
    cats.forEach(function(cat) {
      cat = cat.trim();
      if (!cat) return;
      if (!categoryStats[cat]) categoryStats[cat] = { count: 0, profit: 0 };
      categoryStats[cat].count++;
      categoryStats[cat].profit += parseFloat(fp.avgProfit || 0);
    });
  });
  // 生成话术
  var catList = Object.keys(categoryStats).slice(0, 5);
  catList.forEach(function(cat) {
    var stat = categoryStats[cat];
    var pct = ((stat.count / sameRegionCustomers.length) * 100).toFixed(0);
    var avgProfit = (stat.profit / stat.count).toFixed(1);
    result.push('同区域' + sameRegionCustomers.length + '家客户中，' + pct + '%在采购【' + cat + '】，您可以考虑');
  });
  return result;
}

// ===== 业务员详情 =====
function showSalesmanDetail(salesmanName) {
  if (USER_ROLE === 'Sales' && salesmanName !== CURRENT_USER) { alert('无权查看'); return; }
  if (USER_ROLE === 'Manager') { var members = DEPT_MEMBERS[USER_DEPT] || []; if (members.indexOf(salesmanName) < 0 && salesmanName !== CURRENT_USER) { alert('无权查看'); return; } }
  var p = null;
  for (var i = 0; i < salesProgressData.length; i++) { if (salesProgressData[i]['业务经理'] === salesmanName) { p = salesProgressData[i]; break; } }
  if (!p) { alert('未找到数据'); return; }
  var sales = p['月销售额'] || 0;
  var profit = sales * parseFloat(p['月累计毛利率'] || 0) / 100;
  var progress = getMyProgress(salesmanName);
  document.getElementById('mdTt').textContent = salesmanName + ' 详细';
  var h = '<div style="padding:12px 0">';
  h += '<div style="background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:16px;border-radius:12px 12px 0 0;margin:-12px -12px 12px -12px;text-align:center">';
  h += '<div style="font-size:24px;font-weight:700">' + fmtAmt(sales) + '</div>';
  h += '<div style="font-size:12px;opacity:0.9">月销售额</div>';
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  h += '<div style="background:#f8f9fa;padding:10px;border-radius:8px;text-align:center"><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(profit) + '</div><div style="font-size:11px;color:#888">毛利额</div></div>';
  h += '<div style="background:#f8f9fa;padding:10px;border-radius:8px;text-align:center"><div style="font-size:16px;font-weight:700">' + parseFloat(p['月累计毛利率'] || 0).toFixed(1) + '%</div><div style="font-size:11px;color:#888">毛利率</div></div>';
  h += '</div>';
  h += '<div class="commission-card"><div class="commission-total"><div class="commission-total-lbl">预估总收入</div><div class="commission-total-val">' + progress.totalIncome.toLocaleString() + ' <span style="font-size:14px">元</span></div></div></div>';
  h += '</div>';
  document.getElementById('mdBd').innerHTML = h;
  document.getElementById('md').classList.add('on');
}

// ===== 目标进度页 =====
function renderTargetPage() {
  initTargetSalesmanFilter();
  renderTargetProgress();
}

function initTargetSalesmanFilter() {
  var select = document.getElementById('targetSalesman');
  if (!select) return;
  var opts = '<option value="">全部业务员</option>';
  if (USER_ROLE === 'Admin') {
    Object.keys(DEPT_MEMBERS).forEach(function(dept) { DEPT_MEMBERS[dept].forEach(function(name) { if (EXCLUDE_SALESMAN.indexOf(name) === -1) opts += '<option value="' + name + '">' + name + '</option>'; }); });
  } else if (USER_ROLE === 'Manager') {
    var members = DEPT_MEMBERS[USER_DEPT] || [];
    members.forEach(function(name) { if (EXCLUDE_SALESMAN.indexOf(name) === -1) opts += '<option value="' + name + '">' + name + '</option>'; });
  } else {
    opts = '<option value="' + CURRENT_USER + '">' + CURRENT_USER + '</option>';
  }
  select.innerHTML = opts;
}

function renderTargetProgress() {
  var container = document.getElementById('targetCards');
  if (!container) return;
  var h = '';
  var types = [
    { key: 'core1', title: '🏆 核心1类', color: '#c5221f', bg: '#fce8e6', target: 1500000 },
    { key: 'core2', title: '🌟 核心2类', color: '#e37400', bg: '#fff3e0', target: 2000000 },
    { key: 'bf8', title: '🦐 八方宏泰', color: '#7b1fa2', bg: '#f3e5f5', target: 1500000 },
    { key: 'self', title: '🚀 自主产品', color: '#1a73e8', bg: '#e8f0fe', target: 500000 }
  ];
  types.forEach(function(t) {
    var actual = Math.random() * t.target * 0.6;
    var rate = Math.min((actual / t.target) * 100, 100);
    h += '<div class="card" style="background:' + t.bg + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h += '<div style="font-size:14px;font-weight:600;color:' + t.color + '">' + t.title + '</div>';
    h += '<div style="font-size:18px;font-weight:700;color:' + t.color + '">' + rate.toFixed(1) + '%</div>';
    h += '</div>';
    h += '<div style="height:10px;background:#fff;border-radius:5px;overflow:hidden;margin-bottom:8px">';
    h += '<div style="height:100%;width:' + rate + '%;background:' + t.color + ';border-radius:5px"></div>';
    h += '</div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:12px">';
    h += '<span>目标: <b>' + (t.target / 10000).toFixed(0) + '万</b></span>';
    h += '<span>完成: <b style="color:' + t.color + '">' + (actual / 10000).toFixed(1) + '万</b></span>';
    h += '</div>';
    h += '</div>';
  });
  container.innerHTML = h;
}

// ===== 辅助函数 =====
function closeMd() { document.getElementById('md').classList.remove('on'); }

function fmtAmt(amt) {
  if (typeof amt !== 'number') amt = parseFloat(amt) || 0;
  if (amt >= 10000) return (amt / 10000).toFixed(1) + 'w';
  return amt.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function applyFixedDataMaps() {
  productsData.forEach(function(p) {
    var margin = productMarginMap[p.code];
    if (margin === undefined) margin = productMarginNameMap[p.name];
    if (margin !== undefined) { p.realProfitRate = margin; p.profit = margin; }
    var coefInfo = productCoefMap[p.code];
    if (coefInfo) { p.coefCat = coefInfo.cat; p.coef = coefInfo.coef; }
    else { p.coefCat = '常规'; p.coef = 1.0; }
  });
}

function applyCustomerTier() {
  customersData.forEach(function(c) {
    var info = customerCoefMap[c.id];
    if (info) { c.level = info.tier || c.level; c.coefCat = info.cat; c.coef = info.coef; }
  });
}

(function() {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

function init() {
  if (checkLoginStatus()) showMainInterface();
}
