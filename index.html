  data_product: { file: 'data_product.json', required: false },
  data_customer: { file: 'data_customer.json', required: false },
  data_coef: { file: 'data_coef.json', required: true },
  data_extra: { file: 'data_extra.json', required: false },
  data_recs: { file: 'data_recs.json', required: false },
  data_commission: { file: 'data_commission.json', required: false }

var dataVersion = '';
var dataFromCache = false;

function showLoading(msg) {
  var el = document.getElementById('rptContent');
  if (el) el.innerHTML = '<div class="loading">' + msg + '</div>';
}

function hideLoading() {
  // 移除加载提示（如果有的话）
  var el = document.getElementById('rptContent');
  if (el && el.querySelector('.loading')) {
    // 保留内容，让 render 函数处理
  }
}

function showError(msg) {
  var el = document.getElementById('rptContent');
  if (el) el.innerHTML = '<div class="empty"><p>' + msg + '</p></div>';
}

async function loadDataFile(key) {
  var info = DATA_FILES[key];
  if (!info) return false;
  if (dataLoaded[key]) return true; // 已加载过则跳过
  try {
    var cacheKey = 'xlq_' + key;
    var cached = localStorage.getItem(cacheKey);
    var cacheVer = localStorage.getItem(cacheKey + '_ver');
    // version信息只在第一次加载时获取，后续用缓存
    var fileVer = '';
    if (window._versionData && window._versionData.files && window._versionData.files[key]) {
      fileVer = window._versionData.files[key].ver || '';
    }
    if (cached && cacheVer === fileVer && fileVer) {
      var data = JSON.parse(cached);
      applyDataToGlobals(key, data);
      dataFromCache = true;
      return true;
    }
    var url = DATA_BASE + info.file + '?v=' + (fileVer || Date.now());
    var response = await fetch(url, { signal: AbortSignal.timeout(30000) });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var data = await response.json();
    // localStorage 限制约5MB，超过3MB不缓存
    try {
      var dataSize = JSON.stringify(data).length;
      if (dataSize < 3 * 1024 * 1024) { // 3MB以下才缓存
        localStorage.setItem(cacheKey, JSON.stringify(data));
        localStorage.setItem(cacheKey + '_ver', fileVer);
      }
    } catch (e) {
      // localStorage满了，清理旧缓存后重试
      for (var k in DATA_FILES) {
        if (k !== key) {
          localStorage.removeItem('xlq_' + k);
          localStorage.removeItem('xlq_' + k + '_ver');
        }
      }
      try {
        var dataSize2 = JSON.stringify(data).length;
        if (dataSize2 < 3 * 1024 * 1024) {
          localStorage.setItem(cacheKey, JSON.stringify(data));
          localStorage.setItem(cacheKey + '_ver', fileVer);
        }
      } catch (e2) { /* 仍然失败，不影响流程 */ }
    }
    applyDataToGlobals(key, data);
    return true;
  } catch (e) {
    var cacheKey = 'xlq_' + key;
    var cached = localStorage.getItem(cacheKey);
    if (cached) {
      var data = JSON.parse(cached);
      applyDataToGlobals(key, data);
      dataFromCache = true;
      return true;
    }
    if (info.required) {
      showError('数据加载失败: ' + key);
      return false;
    }
    return false;
  }
}

function applyDataToGlobals(key, data) {
  switch(key) {
    case 'data_report':
      dailyReportData = data.dailyReportData || {};
      salesProgressData = data.salesProgressData || [];
      break;
    case 'data_product':
      productsData = data.productsData || [];
      break;
    case 'data_customer':
      customersData = data.customersData || [];
      channelTypeMap = data.channelTypeMap || {};
      break;
    case 'data_coef':
      productCoefMap = data.productCoefMap || {};
      customerCoefMap = data.customerCoefMap || {};
      productMarginMap = data.productMarginMap || {};
      productMarginNameMap = data.productMarginNameMap || {};
      salesTargetMap = data.salesTargetMap || {};
      break;
    case 'data_extra':
      customerTierMap = data.customerTierMap || {};
      commissionData = data.commissionData || {};
      productSalesmen = data.productSalesmen || [];
      productPortraitData = data.productPortraitData || {};
      customerPortraitData = data.customerPortraitData || {};
      productPriceMap = data.productPriceMap || {};
      portraitData = data.portraitData || {};
      taskManagerData = data.taskManagerData || {};
      break;
    case 'data_recs':
      window.recsDataCache = data || {};
      break;
    case 'data_commission':
      commissionData = data || {};
      break;
  }
  dataLoaded[key] = true;
}

async function initData() {
  showLoading('正在加载数据...');
  // 首屏并行加载所有关键数据
  await Promise.all([
    loadDataFile('data_report'),
    loadDataFile('data_coef'),
    loadDataFile('data_extra'),
    loadDataFile('data_customer'),
    loadDataFile('data_commission')
  ]);
  // 数据加载完后应用系数覆盖
  applyCustomerTier();
  applyFixedDataMaps();
  updateDataStatus();
  renderReport();
  // 后台预加载产品数据
  setTimeout(function() {
    loadDataFile('data_product').then(function() {
      applyFixedDataMaps();
    });
    loadDataFile('data_recs');
  }, 500);
}

function updateDataStatus() {
  var statusBar = document.getElementById('dataStatusBar');
  if (statusBar) {
    var icon = dataFromCache ? '📦' : '☁️';
    var cache = dataFromCache ? ' (缓存)' : '';
    statusBar.innerHTML = icon + ' 数据已加载' + cache + ' | ' + dataVersion + ' | ' + dataUpdateTime;
  }
}

async function manualRefreshData() {
  for (var key in DATA_FILES) {
    localStorage.removeItem('xlq_' + key);
    localStorage.removeItem('xlq_' + key + '_ver');
  }
  dataLoaded = { data_report: false, data_product: false, data_customer: false, data_coef: false, data_extra: false, data_recs: false, data_commission: false };
  await initData();
}

// ===== 推荐数据异步加载 =====
var recsCache = {};
async function loadCustomerRecs(id) {
  if (recsCache[id]) return recsCache[id];
  if (window.recsDataCache && window.recsDataCache[id]) {
    recsCache[id] = window.recsDataCache[id];
    return recsCache[id];
  }
  try {
    var resp = await fetch('./data_recs.json');
    var allRecs = await resp.json();
    recsCache[id] = allRecs[id] || [];
    return recsCache[id];
  } catch(e) { return []; }
}

// ===== 提成计算系统 =====
function getCommissionRate(p) {
  if (p <= 50000) return 0.025;
  if (p <= 100000) return 0.03;
  if (p <= 200000) return 0.035;
  if (p <= 300000) return 0.04;
  return 0.05;
}

function getBaseSalary(p) {
  if (p <= 80000) return 2000;
  if (p <= 130000) return 2500;
  if (p <= 200000) return 3000;
  return 3500;
}

function getCashBonus(p) {
  if (p >= 260000) return 2000;
  if (p >= 200000) return 1500;
  if (p >= 130000) return 1000;
  return 0;
}

function calculateCommission(salesmanName) {
  var result = { weightedProfit: 0, commission: 0, baseSalary: 0, perfSalary: 0, cashBonus: 0, totalSalary: 0, completionRate: 0, monthlyProfit: 0, monthlyTarget: 0 };
  if (!dailyReportData || !dailyReportData['核心经营指标']) return result;
  var coreData = dailyReportData['核心经营指标'];
  for (var i = 0; i < coreData.length; i++) {
    if (coreData[i]['业务经理'] === salesmanName) {
      result.monthlyProfit = coreData[i]['月累计毛利额'] || 0;
      result.monthlyTarget = coreData[i]['月度目标'] || 17500000;
      result.completionRate = result.monthlyTarget > 0 ? (result.monthlyProfit / result.monthlyTarget * 100).toFixed(1) : 0;
      result.weightedProfit = result.monthlyProfit * 1.2;
      result.commission = result.weightedProfit * getCommissionRate(result.weightedProfit);
      result.baseSalary = getBaseSalary(result.monthlyProfit);
      result.perfSalary = Math.round((result.monthlyProfit / result.monthlyTarget) * 1000);
      result.cashBonus = getCashBonus(result.monthlyProfit);
      result.totalSalary = result.baseSalary + result.perfSalary + result.commission + result.cashBonus;
      break;
    }
  }
  return result;
}

(function() {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initData);
  } else {

function fmtAmt(amt) {
    if (typeof amt !== 'number') return amt || '0';
    if (amt >= 10000) return (amt / 10000).toFixed(1) + 'w';
    return amt.toLocaleString('zh-CN', {maximumFractionDigits: 0});
}

// ===== 辅助函数 =====
// 获取产品系数
function getProductCoef(productCode) {
    if (!productCode) return {coef: 1.0, cat: '常规'};
    var data = productCoefMap[productCode];
    if (data) return data;
    return {coef: 1.0, cat: '常规'}; // 查不到就是常规×1.0
}

// 获取产品系数标签
function getProductCoefLabel(productCode) {
    var data = getProductCoef(productCode);
    return data.cat + '×' + data.coef;
}

// 获取客户系数
function getCustomerCoef(customerCode) {
    if (!customerCode) return {coef: 1.0, cat: '批发C', salesman: ''};
    var data = customerCoefMap[customerCode];
    if (data) return data;
    return {coef: 1.0, cat: '批发C', salesman: ''}; // 查不到默认批发C
}

// 获取客户系数标签
function getCustomerCoefLabel(customerCode) {
    var data = getCustomerCoef(customerCode);
    return data.cat + '×' + data.coef;
}

// 获取毛利率%
function getProductMargin(productCode, productName) {
    // 优先按编码查
    if (productCode) {
        var margin = productMarginMap[productCode];
        if (margin !== undefined) return margin;
    }
    // 其次按名称查
    if (productName) {
        var margin = productMarginNameMap[productName];
        if (margin !== undefined) return margin;
    }
    return null;
}

// 获取毛利率显示文本
function getProductMarginText(productCode, productName) {
    var margin = getProductMargin(productCode, productName);
    if (margin === null) return '-';
    return margin.toFixed(1) + '%';
}

// 获取业务员月度目标
function getSalesTarget(salesmanName) {
    var target = salesTargetMap[salesmanName];
    if (target) return target;
    return {salesTarget: 0, profitTarget: 0};
}

// ===== v14固定数据表接入：用权威数据覆盖画像增强的毛利率和系数 =====
function applyFixedDataMaps() {
    var marginCount = 0;
    var coefCount = 0;
    productsData.forEach(function(p) {
        // 1. 用productMarginMap（按编码）或productMarginNameMap（按名称）设置权威毛利率
        var margin = productMarginMap[p.code];
        if (margin === undefined) {
            margin = productMarginNameMap[p.name];
        }
        if (margin !== undefined) {
            p.realProfitRate = margin;
            p.profit = margin;
            marginCount++;
        }
        
        // 2. 用productCoefMap设置权威产品系数和类别
        var coefInfo = productCoefMap[p.code];
        if (coefInfo) {
            p.coefCat = coefInfo.cat;
            p.coef = coefInfo.coef;
            coefCount++;
        } else {
            p.coefCat = '常规';
            p.coef = 1.0;
        }
    });
    console.log('✅ v14固定数据接入完成: 毛利率覆盖' + marginCount + '个产品, 系数覆盖' + coefCount + '个产品');
}
// 首次加载时立即执行
applyFixedDataMaps();

// ===== 用客户系数表覆盖客户分层和评分 =====
function applyCustomerTier() {
    var tierCount = 0;
    customersData.forEach(function(c) {
        var info = customerCoefMap[c.id];
        if (info) {
            c.level = info.tier || c.level;      // 用26财年分类替换level
            c.coefCat = info.cat;                  // 分层类别
            c.coef = info.coef;                    // 系数
            c.score = info.score;                  // 综合评分
            tierCount++;
        }
    });
    console.log('✅ 客户分层覆盖完成: ' + tierCount + '个客户');
}
applyCustomerTier();

        var valA = sortField === 'sales' ? a.sales : a.profit;

                || p.code.toLowerCase().indexOf(kw) >= 0

// 点击排序按钮显示下拉选项菜单
function showSortOptions(field) {
    event.stopPropagation();
    var existingMenu = document.getElementById('sortMenu');
    if (existingMenu) {
        existingMenu.remove();
        return;
    }
    
    var btn = event.currentTarget;
    var rect = btn.getBoundingClientRect();
    
    var menu = document.createElement('div');
    menu.id = 'sortMenu';
    menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 5) + 'px;left:' + Math.min(rect.left, window.innerWidth - 170) + 'px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;min-width:160px;padding:6px 0;';
    
    var currentField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    
    var options = field === 'sales' ? [
        {'value': 'sales_desc', 'label': '📊 销售额从高到低'},
        {'value': 'sales_asc', 'label': '📊 销售额从低到高'}
    ] : [
        {'value': 'profit_desc', 'label': '💰 毛利率从高到低'},
        {'value': 'profit_asc', 'label': '💰 毛利率从低到高'}
    ];
    
    options.forEach(function(opt) {
        var item = document.createElement('div');
        var isActive = currentSort === opt.value;
        item.style.cssText = 'padding:12px 16px;cursor:pointer;font-size:12px;' + (isActive ? 'background:#e8f0fe;color:#1a73e8;font-weight:600;' : 'color:#333;');
        item.innerHTML = opt.label + (isActive ? ' ✓' : '');
        item.onclick = function(e) {
            e.stopPropagation();
            setSort(opt.value);
            menu.remove();
        };
        item.onmouseenter = function() {
            if (!isActive) this.style.background = '#f5f5f5';
        };
        item.onmouseleave = function() {
            if (!isActive) this.style.background = '#fff';
        };
        menu.appendChild(item);
    });
    
    document.body.appendChild(menu);
    
    // 点击其他地方关闭菜单
    setTimeout(function() {
        var closeHandler = function(e) {
            var m = document.getElementById('sortMenu');
            if (m && !m.contains(e.target)) {
                m.remove();
                document.removeEventListener('click', closeHandler);
            }
        };
        document.addEventListener('click', closeHandler);
    }, 10);
}

// 产品详情弹窗
// 从规格型号中提取每件包数
function getSpecCount(spec) {
    if (!spec) return 1;
    // 匹配 "300G*20包" 或 "125g*100包" 等格式
    var match = spec.match(/\*(\d+)/);
    return match ? parseInt(match[1]) : 1;
}

function applyCustomerFilter(){
var k=document.getElementById('cSk').value.toLowerCase();
var lv=document.getElementById('cLevel').value;
var sl=document.getElementById('cSales').value;
var nd=document.getElementById('cNextDate').value;
var pf=document.getElementById('cProfitRange').value;
var today=new Date();today.setHours(0,0,0,0);
var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+(7-today.getDay()));
var monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
filteredCustomers=allCustomers.filter(function(c){
if(k&&c.name.toLowerCase().indexOf(k)<0)return false;
if(lv&&c.level!==lv)return false;
if(sl&&c.salesman!==sl)return false;
if(nd){
if(c.nextDate){
var ndD=new Date(c.nextDate);
if(nd==='thisWeek'&&(ndD<today||ndD>weekEnd))return false;
if(nd==='thisMonth'&&(ndD<today||ndD>monthEnd))return false;
if(nd==='overdue'&&ndD>=today)return false;
if(nd==='unknown')return false;
}else{if(nd!=='unknown')return false;}
}
if(pf){
if(pf==='high'&&(c.profitRate||0)<15)return false;
if(pf==='mid'&&((c.profitRate||0)<10||(c.profitRate||0)>=15))return false;
if(pf==='low'&&(c.profitRate||0)>=10)return false;
}
return true;
});
currentPage=1;
document.getElementById('custStat').textContent='筛选结果:'+filteredCustomers.length+'个客户';
renderCustomerList();
}

    h += '<span>毛利额目标达成率</span><span style="color:' + (profitProgress >= 100 ? '#137333' : '#e53935') + ';font-weight:600">' + profitProgress.toFixed(1) + '%</span>';
    h += '</div>';
    h += '<div style="height:8px;background:#e0e0e0;border-radius:4px">';
    h += '<div style="width:' + Math.min(profitProgress, 100) + '%;height:100%;background:' + (profitProgress >= 100 ? '#137333' : '#e53935') + ';border-radius:4px"></div>';
    h += '</div></div>';
    
    // 销售额达成进度条
    h += '<div style="margin-top:8px">';
    h += '<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:4px">';
    h += '<span>销售额完成进度</span><span style="color:' + (salesProgress >= 100 ? '#137333' : '#1a73e8') + ';font-weight:600">' + salesProgress.toFixed(1) + '%</span>';
    h += '</div>';
    h += '<div style="height:6px;background:#e0e0e0;border-radius:3px">';
    h += '<div style="width:' + Math.min(salesProgress, 100) + '%;height:100%;background:' + (salesProgress >= 100 ? '#137333' : '#1a73e8') + ';border-radius:3px"></div>';
    h += '</div></div>';
    h += '</div>';
    
    // ===== 2. 产品系数贡献分析（基于5月销货单）=====
    var commInfo2 = commissionData[name] || {productBreakdown: {}};
    var pb = commInfo2.productBreakdown || {};
    var productAnalysis = {
        '常规产品': {count: 0, profit: pb['常规'] ? pb['常规'].profit : 0, weightedProfit: pb['常规'] ? pb['常规'].weightedProfit : 0},
        '核心产品': {count: 0, profit: pb['核心1类'] ? pb['核心1类'].profit : 0, weightedProfit: pb['核心1类'] ? pb['核心1类'].weightedProfit : 0},
        '自主产品': {count: 0, profit: pb['自主'] ? pb['自主'].profit : 0, weightedProfit: pb['自主'] ? pb['自主'].weightedProfit : 0}
    };
    
    h += '<div style="background:#f8f9fa;padding:12px;border-radius:10px;margin-bottom:12px">';
    h += '<div style="font-size:14px;font-weight:600;color:#1a73e8;margin-bottom:10px">📦 产品系数贡献分析（5月实际）</div>';
    h += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
    h += '<tr style="background:#e8f0fe"><th style="padding:6px;text-align:left">分类</th><th style="padding:6px">系数</th><th style="padding:6px;text-align:right">毛利额</th><th style="padding:6px;text-align:right">加权毛利</th></tr>';
    
    var categoryConfig = [
        {'name': '常规产品', 'coef': 1, 'color': '#666'},
        {'name': '核心产品', 'coef': 1.15, 'color': '#c5221f'},
        {'name': '自主产品', 'coef': 1.2, 'color': '#1a73e8'}
    ];
    
    categoryConfig.forEach(function(cat) {
        var data = productAnalysis[cat.name];
        var contribution = data.weightedProfit - data.profit;
        h += '<tr>';
        h += '<td style="padding:6px;color:' + cat.color + '">' + cat.name + '</td>';
        h += '<td style="padding:6px;text-align:center">×' + cat.coef + '</td>';
        h += '<td style="padding:6px;text-align:right">' + (data.profit >= 10000 ? (data.profit/10000).toFixed(1) + '万' : data.profit.toFixed(0)) + '</td>';
        h += '<td style="padding:6px;text-align:right;color:' + (contribution > 0 ? '#137333' : '#999') + '">' + (contribution > 0 ? '+' : '') + (Math.abs(contribution) >= 10000 ? (contribution/10000).toFixed(1) + '万' : contribution.toFixed(0)) + '</td>';
        h += '</tr>';
    });
    h += '</table></div>';
    
    // ===== 3. 客户系数分层分析（基于5月销货单）=====
    var commInfo = commissionData[name] || {customers: {}};
    var customerAnalysis = {
        '终端A': {count: 0, profit: 0},
        '终端B': {count: 0, profit: 0},
        '终端C': {count: 0, profit: 0},
        '终端D': {count: 0, profit: 0},
        '批发A': {count: 0, profit: 0},
        '批发B': {count: 0, profit: 0},
        '批发C': {count: 0, profit: 0},
        '批发D': {count: 0, profit: 0},
        '沉默': {count: 0, profit: 0}
    };
    
    Object.keys(commInfo.customers || {}).forEach(function(cid) {
        var c = commInfo.customers[cid];
        var category = c.tierCategory || '';
        if (category === '沉默') {
            customerAnalysis['沉默'].count++;
            customerAnalysis['沉默'].profit += c.weightedProfit || 0;
        } else if (customerAnalysis[category]) {
            customerAnalysis[category].count++;
            customerAnalysis[category].profit += c.weightedProfit || 0;
        }
    });
    
    h += '<div style="background:#fff;border:1px solid #e0e0e0;padding:12px;border-radius:10px;margin-bottom:12px">';
    h += '<div style="font-size:14px;font-weight:600;color:#333;margin-bottom:10px">👥 客户系数分层分析</div>';
    h += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
    h += '<tr style="background:#fce8e6"><th style="padding:6px;text-align:left">分层</th><th style="padding:6px">系数</th><th style="padding:6px;text-align:right">售卖家数</th><th style="padding:6px;text-align:right">加权毛利</th></tr>';
    
    var customerConfig = [
        {'name': '终端A', 'coef': 1.5, 'color': '#137333'},
        {'name': '终端B', 'coef': 1.35, 'color': '#1a73e8'},
        {'name': '终端C', 'coef': 1.2, 'color': '#e37400'},
        {'name': '终端D', 'coef': 1.1, 'color': '#666'},
        {'name': '批发A', 'coef': 1.2, 'color': '#1a73e8'},
        {'name': '批发B', 'coef': 1.1, 'color': '#e37400'},
        {'name': '批发C', 'coef': 1.0, 'color': '#666'},
        {'name': '批发D', 'coef': 1.0, 'color': '#666'},
        {'name': '沉默', 'coef': 1.5, 'color': '#7b1fa2'}
    ];
    
    customerConfig.forEach(function(cat) {
        var data = customerAnalysis[cat.name];
        if (data && data.count > 0) {
            h += '<tr>';
            h += '<td style="padding:6px;color:' + cat.color + '">' + cat.name + '</td>';
            h += '<td style="padding:6px;text-align:center">×' + cat.coef + '</td>';
            h += '<td style="padding:6px;text-align:right">' + data.count + '个</td>';
            h += '<td style="padding:6px;text-align:right">' + (data.profit >= 10000 ? (data.profit/10000).toFixed(1) + '万' : data.profit.toFixed(0)) + '</td>';
            h += '</tr>';
        }
    });
    h += '</table></div>';
    
    // ===== 4. 薪资预估（2026薪酬体系·月度估算） =====
    // 基于6天数据推算月度收入（×5倍）
    // 动态计算已过去的天数
var currentDate = dailyReportData && dailyReportData.date ? new Date(dailyReportData.date) : new Date();
var monthStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
var DAYS_ELAPSED = Math.ceil((currentDate - monthStart) / (1000 * 60 * 60 * 24));
    var DAYS_IN_MONTH = 30;
    var projectionFactor = DAYS_IN_MONTH / DAYS_ELAPSED; // 5倍推算

    // 月度销售额推算
    var sales6d = salesData['月销售额'] || 0;
    var salesMonthly = sales6d * projectionFactor;

    // 月度毛利额推算
    var profitRateNum = parseFloat(salesData['月累计毛利率'] || '13') / 100;
    var profit6d = sales6d * profitRateNum;
    var profitMonthly = profit6d * projectionFactor;

    // 月度目标毛利额（销售目标×13%）
    var salesTargetMonthly = targetInfo.salesTarget || salesData['月度目标'] || 800000;
    var profitTargetMonthly = targetInfo.profitTarget || (salesTargetMonthly * 0.13);

    // 毛利额完成率（按月度推算，封顶120%）
    var profitCompletionRate = profitTargetMonthly > 0 ? Math.min(profitMonthly / profitTargetMonthly, 1.2) : 1.0;

    // 基本+绩效工资（按月度毛利额档位）
    var basePerfSalary = 4000; // 默认0-8万档
    var salaryLevel = '0-8万';
    if (profitMonthly >= 200000)      { basePerfSalary = 7000; salaryLevel = '20万+'; }
    else if (profitMonthly >= 130000) { basePerfSalary = 6000; salaryLevel = '13-20万'; }
    else if (profitMonthly >= 80000)  { basePerfSalary = 5000; salaryLevel = '8-13万'; }

    // 达标现金奖励
    var milestoneBonus = 0;
    var milestoneTip = '未达标';
    if (profitMonthly >= 260000)      { milestoneBonus = 2000; milestoneTip = '达26万✅'; }
    else if (profitMonthly >= 200000) { milestoneBonus = 1500; milestoneTip = '达20万✅'; }
    else if (profitMonthly >= 130000) { milestoneBonus = 1000; milestoneTip = '达13万✅'; }

    // 加权毛利（使用commissionData实际系数×5倍推算）
    var commInfo = commissionData[name] || {weightedProfit: 0};
    var weightedProfit6d = commInfo.weightedProfit || 0;
    var weightedProfitMonthly = weightedProfit6d * projectionFactor;

    // 应用毛利额完成率
    var taxableProfit = weightedProfitMonthly * profitCompletionRate;

    // 分段累进提成
    var commission = 0;
    var brackets = [
        {min: 0,      max: 50000,   rate: 0.025},
        {min: 50000,  max: 100000,  rate: 0.030},
        {min: 100000, max: 200000,  rate: 0.035},
        {min: 200000, max: 300000,  rate: 0.040},
        {min: 300000, max: Infinity,rate: 0.050}
    ];
    var remaining = taxableProfit;
    var prevMax = 0;
    var mainRateLabel = '2.5%';
    for (var i = 0; i < brackets.length; i++) {
        if (remaining <= 0) break;
        var seg = Math.min(remaining, brackets[i].max - brackets[i].min);
        commission += seg * brackets[i].rate;
        mainRateLabel = (brackets[i].rate * 100).toFixed(1) + '%';
        remaining -= seg;
    }
    commission = commission * 1; // 已乘以完成率

    var totalSalary = basePerfSalary + milestoneBonus + commission;

    h += '<div style="background:#fff3e0;padding:12px;border-radius:10px;margin-bottom:12px">';
    h += '<div style="font-size:14px;font-weight:600;color:#e65100;margin-bottom:10px">💰 5月薪资预估（2026薪酬体系）</div>';

    // 三列：基本+绩效 / 提成 / 达标奖励
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">';

    h += '<div style="background:#fff;padding:10px;border-radius:8px;text-align:center">';
    h += '<div style="font-size:10px;color:#888">基本+绩效工资</div>';
    h += '<div style="font-size:16px;font-weight:700;color:#1565c0">' + basePerfSalary.toLocaleString() + '<span style="font-size:11px">元</span></div>';
    h += '<div style="font-size:10px;color:#aaa">毛利' + salaryLevel + '</div>';
    h += '</div>';

    h += '<div style="background:#fff;padding:10px;border-radius:8px;text-align:center">';
    h += '<div style="font-size:10px;color:#888">分段累进提成</div>';
    h += '<div style="font-size:16px;font-weight:700;color:#e53935">' + Math.round(commission).toLocaleString() + '<span style="font-size:11px">元</span></div>';
    h += '<div style="font-size:10px;color:#aaa">主档' + mainRateLabel + '×完成率' + (profitCompletionRate*100).toFixed(0) + '%</div>';
    h += '</div>';

    h += '<div style="background:#fff;padding:10px;border-radius:8px;text-align:center">';
    h += '<div style="font-size:10px;color:#888">达标奖励</div>';
    h += '<div style="font-size:16px;font-weight:700;color:' + (milestoneBonus > 0 ? '#2e7d32' : '#bbb') + '">' + milestoneBonus.toLocaleString() + '<span style="font-size:11px">元</span></div>';
    h += '<div style="font-size:10px;color:#aaa">' + milestoneTip + '</div>';
    h += '</div>';

    h += '</div>';

    // 月收入总计
    h += '<div style="background:linear-gradient(135deg,#e53935,#c62828);padding:12px;border-radius:8px;text-align:center;margin-bottom:10px">';
    h += '<div style="font-size:11px;color:rgba(255,255,255,0.8)">预估月收入</div>';
    h += '<div style="font-size:22px;font-weight:700;color:#fff">' + Math.round(totalSalary).toLocaleString() + '<span style="font-size:13px">元</span></div>';
    h += '</div>';

    // 详细说明
    h += '<div style="font-size:11px;color:#888;line-height:1.9;background:#fff;padding:8px;border-radius:6px">';
    h += '<div>📊 6天毛利额：' + (profit6d/10000).toFixed(2) + '万 → 月估算：<b>' + (profitMonthly/10000).toFixed(2) + '万</b>（目标' + (profitTargetMonthly/10000).toFixed(1) + '万，完成' + (profitCompletionRate*100).toFixed(1) + '%）</div>';
    h += '<div>⚖️ 加权毛利：6天' + (weightedProfit6d/10000).toFixed(2) + '万 → 月估算：<b>' + (weightedProfitMonthly/10000).toFixed(2) + '万</b>（已含客户+产品系数）</div>';
    h += '<div>📅 推算方式：6天数据×5倍估算全月（仅供参考）</div>';
    h += '</div>';

    h += '</div>';

    // ===== 3. 销售建议 =====
    if (adviceData['建议']) {
        h += '<div style="background:#fff;border:1px solid #e0e0e0;padding:12px;border-radius:10px;margin-bottom:12px">';
        h += '<div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">📋 销售建议</div>';
        h += '<div style="font-size:13px;color:#666;line-height:1.6">' + adviceData['建议'] + '</div>';
        h += '</div>';
    }
    
    h += '<div style="text-align:center;color:#999;font-size:12px">点击其他地方关闭</div>';
    h += '</div>';
    
    document.getElementById('mdBd').innerHTML = h;
    document.getElementById('md').classList.add('on');
}
