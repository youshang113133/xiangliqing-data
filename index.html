<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营v11.0·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f7fa;font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.1)}

/* ===== 登录页样式 ===== */
#loginPage{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#c62828 0%,#e53935 50%,#ff7043 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999}
#loginPage.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:40px 30px;width:90%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo h1{font-size:24px;color:#c62828;margin-bottom:8px}
.login-logo p{font-size:12px;color:#888}
.login-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;margin-bottom:16px;transition:border-color .2s}
.login-input:focus{outline:none;border-color:#c62828}
.login-btn{width:100%;padding:14px;background:#c62828;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.login-btn:hover{background:#b71c1c}
.login-btn:active{background:#d32f2f}
.login-error{color:#e53935;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.login-hint{text-align:center;margin-top:20px;font-size:11px;color:#aaa}

/* ===== 顶部栏 ===== */
.top-bar{background:linear-gradient(135deg,#c62828,#e53935);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.top-bar-l{display:flex;align-items:center;gap:8px}
.top-bar-l h1{font-size:16px;font-weight:600}
.top-bar-r{display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:8px}
.username{font-size:13px;font-weight:500}
.role-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.role-admin{background:rgba(255,255,255,0.3);color:#fff}
.role-manager{background:#fff;color:#1565c0}
.role-sales{background:#fff;color:#2e7d32}
.logout-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer}

/* ===== 页面容器 ===== */
.pg{display:none;padding:12px;padding-bottom:70px}
.pg.on{display:block}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 12px}
.pg-hd h1{font-size:17px}
.pg-hd p{font-size:11px;opacity:.9}
.search{padding:10px 14px;border:2px solid #e0e0e0;border-radius:20px;font-size:14px;width:100%;margin:10px 0}
.fl{display:flex;gap:6px;margin-bottom:10px}
.fl select{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row:last-child{border-bottom:none}
.lb{color:#888}
.vl{color:#333;font-weight:500}
.vl-r{color:#e53935;font-weight:600}
.vl-g{color:#137333;font-weight:600}
.it{padding:12px;border-bottom:1px solid #eee;cursor:pointer;border-radius:8px;margin-bottom:8px;background:#fff;transition:background .2s}
.it:active{background:#f0f0f0}
.it:last-child{border-bottom:none}
.it-nm{font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
.it-info{font-size:12px;color:#666;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.tag-g{background:#e6f4ea;color:#137333}
.tag-y{background:#fef7e0;color:#e37400}
.tag-r{background:#fce8e6;color:#c5221f}
.tag-b{background:#e8f0fe;color:#1a73e8}
.tag-p{background:#f3e5f5;color:#7b1fa2}
.warn{background:#fff3cd;color:#856404;padding:2px 8px;border-radius:4px;font-size:10px;display:inline-block}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;padding:6px 0}
.nav>div{flex:1;padding:10px;text-align:center;font-size:11px;color:#666;cursor:pointer;user-select:none}
.nav .on{color:#c62828;font-weight:500}
.nav .on::before{content:'';display:block;width:24px;height:3px;background:#c62828;border-radius:2px;margin:0 auto 6px}
.stat-row{display:flex;padding:12px 0;border-bottom:1px solid #eee}
.stat-item{text-align:center;flex:1}
.stat-num{font-size:22px;font-weight:700;color:#1a73e8}
.stat-lbl{font-size:10px;color:#888;margin-top:4px}
.prd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prd-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prd-nm{font-size:12px;font-weight:500;color:#333;margin-bottom:6px;line-height:1.4}
.prd-pr{color:#e53935;font-weight:700;font-size:15px}
.prd-info{font-size:10px;color:#888;margin-top:6px}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.md.on{display:flex;align-items:flex-end}
.md-ct{background:#fff;width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto}
.md-hd{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.md-tt{font-size:16px;font-weight:600;max-width:85%;line-height:1.3}
.md-cl{font-size:28px;color:#666;background:none;border:none;cursor:pointer;line-height:1;padding:0 8px}
.md-bd{padding:14px}
.rc{background:#f8f9fa;border-radius:12px;padding:12px;margin-top:14px}
.rc-tt{color:#1a73e8;font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rc-tt::before{content:'🎁';font-size:14px}
.rc-i{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.rc-i:last-child{margin-bottom:0}
.rc-nm{font-size:14px;font-weight:500;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start}
.rc-pr{color:#e53935;font-weight:700;font-size:14px;white-space:nowrap}
.rc-mt{font-size:11px;color:#666;margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap}
.rc-lg{background:#fff8e1;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;color:#795548;margin-bottom:8px}
.rc-sc{background:#e3f2fd;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;color:#1565c0}
.loading{padding:50px;text-align:center;color:#888;font-size:14px}
.loading::after{content:'';display:block;width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px;text-align:center;color:#888}
.empty::before{content:'🔍';display:block;font-size:50px;margin-bottom:12px}
.empty p{font-size:13px}
.more{text-align:center;padding:20px;color:#888;font-size:13px;cursor:pointer}
.more:active{color:#1a73e8}
.more::before{content:'⬇️ ';margin-right:6px}
.pager{text-align:center;padding:16px;color:#888;font-size:12px;background:#f8f9fa;border-radius:8px;margin-top:10px}

/* ===== 功能一：客户跟进日历样式 ===== */
.follow-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.follow-card-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding-bottom:10px;border-bottom:1px solid #eee}
.follow-card-tit{font-size:14px;font-weight:600;color:#333}
.follow-card-tit::before{content:'📋 ';margin-right:4px}
.follow-stats{display:flex;gap:8px;font-size:11px}
.follow-stat{padding:3px 8px;border-radius:10px;font-weight:500}
.follow-stat-y{background:#fef9e7;color:#e37400}
.follow-stat-o{background:#fff3e0;color:#f57c00}
.follow-stat-r{background:#ffebee;color:#c62828}
.follow-arrow{font-size:16px;color:#999;transition:transform .2s}
.follow-arrow.collapsed{transform:rotate(-90deg)}
.follow-card-bd{max-height:400px;overflow:hidden;transition:max-height .3s}
.follow-card-bd.collapsed{max-height:0}
.follow-filter{padding:8px 0}
.follow-filter select{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.follow-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.follow-row:last-child{border-bottom:none}
.follow-row:active{background:#f8f9fa}
.follow-row-l{width:4px;height:32px;border-radius:2px;margin-right:10px;flex-shrink:0}
.follow-row-y{background:#fbc02d}
.follow-row-o{background:#ff9800}
.follow-row-r{background:#e53935}
.follow-row-c{display:flex;flex-direction:column;flex:1;min-width:0}
.follow-row-n{font-size:13px;font-weight:500;color:#333;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.follow-row-n .follow-tier-tag{padding:1px 5px;border-radius:6px;font-size:10px;font-weight:600;margin-left:4px}
.follow-row-i{font-size:11px;color:#888;display:flex;gap:8px}
.follow-row-i span{display:flex;align-items:center}
.follow-row-d{font-size:11px;color:#666;text-align:right;white-space:nowrap}

/* ===== 功能二：沉默客户激活样式 ===== */
.silent-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.silent-card-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding-bottom:10px;border-bottom:1px solid #eee}
.silent-card-tit{font-size:14px;font-weight:600;color:#333}
.silent-card-tit::before{content:'🔥 ';margin-right:4px}
.silent-stats{display:flex;gap:8px;font-size:11px}
.silent-stat{padding:3px 8px;border-radius:10px;font-weight:500}
.silent-stat-gold{background:#fff8e1;color:#ff8f00}
.silent-stat-blue{background:#e3f2fd;color:#1565c0}
.silent-stat-gray{background:#f5f5f5;color:#757575}
.silent-arrow{font-size:16px;color:#999;transition:transform .2s}
.silent-arrow.collapsed{transform:rotate(-90deg)}
.silent-card-bd{max-height:400px;overflow:hidden;transition:max-height .3s}
.silent-card-bd.collapsed{max-height:0}
.silent-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.silent-row:last-child{border-bottom:none}
.silent-row:active{background:#f8f9fa}
.silent-row.high{background:#fffbf0}
.silent-row-c{display:flex;flex-direction:column;flex:1;min-width:0}
.silent-row-n{font-size:13px;font-weight:500;color:#333;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center}
.silent-row-n .silent-val-tag{padding:1px 5px;border-radius:6px;font-size:10px;font-weight:600;margin-left:4px}
.silent-val-gold{background:linear-gradient(135deg,#ffd54f,#ffb300);color:#5d4037}
.silent-val-blue{background:#e3f2fd;color:#1565c0}
.silent-val-gray{background:#f5f5f5;color:#757575}
.silent-row-i{font-size:11px;color:#888;display:flex;gap:6px;flex-wrap:wrap}
.silent-row-i span{display:flex;align-items:center}
.silent-expand{text-align:center;padding:10px;color:#1a73e8;font-size:12px;cursor:pointer}
.silent-expand:active{color:#0d47a1}

/* ===== 功能三：客户-产品匹配样式 ===== */
.prod-match-section{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-top:14px}
.prod-match-tit{font-size:14px;font-weight:600;color:#333;margin-bottom:12px;display:flex;align-items:center}
.prod-match-tit::before{content:'🎯 ';margin-right:4px}
.prod-match-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.prod-match-row:last-child{border-bottom:none}
.prod-match-row:active{background:#f8f9fa}
.prod-match-l{display:flex;flex-direction:column;flex:1;min-width:0}
.prod-match-n{font-size:13px;font-weight:500;color:#333;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center}
.prod-match-n .prod-grade-tag{padding:1px 5px;border-radius:6px;font-size:10px;font-weight:600;margin-left:4px}
.prod-grade-gold{background:linear-gradient(135deg,#ffd54f,#ffb300);color:#5d4037}
.prod-grade-blue{background:#e3f2fd;color:#1565c0}
.prod-grade-green{background:#e8f5e9;color:#2e7d32}
.prod-grade-gray{background:#f5f5f5;color:#757575}
.prod-match-i{font-size:11px;color:#888;display:flex;gap:8px}
.prod-match-i span{display:flex;align-items:center}
.prod-match-r{text-align:right;flex-shrink:0;margin-left:8px}
.prod-match-p{font-size:14px;font-weight:700;color:#e53935}
.prod-match-m{font-size:10px;color:#888}

/* ===== 产品分类筛选按钮 ===== */
.category-filter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cat-btn{padding:8px 12px;border:1px solid #ddd;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:#666;transition:all .2s}
.cat-btn:active{background:#f0f0f0}
.cat-btn.active{background:#c62828;color:#fff;border-color:#c62828}

/* ===== 工作台样式 ===== */
.workbench-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.wb-section-tit{font-size:14px;font-weight:600;color:#333;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.wb-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.wb-stat-item{text-align:center;padding:12px 6px;background:#f8f9fa;border-radius:8px}
.wb-stat-num{font-size:20px;font-weight:700;color:#c62828}
.wb-stat-lbl{font-size:10px;color:#888;margin-top:4px}
.wb-progress-item{margin-bottom:10px}
.wb-progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.wb-progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.wb-progress-fill{height:100%;border-radius:4px;transition:width .3s}
.wb-todo-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.wb-todo-item:last-child{border-bottom:none}
.wb-todo-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:16px}
.wb-todo-icon.risk{background:#ffebee;color:#c62828}
.wb-todo-icon.urgent{background:#fff3e0;color:#e65100}
.wb-todo-icon.normal{background:#fff8e1;color:#ff8f00}
.wb-todo-icon.silent{background:#f3e5f5;color:#7b1fa2}
.wb-todo-c{flex:1}
.wb-todo-n{font-size:13px;font-weight:500;color:#333}
.wb-todo-i{font-size:11px;color:#888}
.wb-todo-count{background:#c62828;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}

/* ===== 双视角分隔 ===== */
.dual-view-divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.dual-view-divider::before,.dual-view-divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.dual-view-divider span{font-size:11px;color:#888;white-space:nowrap}

/* ===== 刷新按钮 ===== */
.refresh-btn{position:fixed;top:60px;right:12px;z-index:99;background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage">
<div class="login-box">
<div class="login-logo">
<h1>🌶️ 湘里情智营</h1>
<p>客户决策系统 v11.0</p>
</div>
<input type="text" class="login-input" id="loginUsername" placeholder="请输入用户名" autocomplete="off">
<input type="password" class="login-input" id="loginPassword" placeholder="请输入密码" autocomplete="off">
<button class="login-btn" onclick="doLogin()">登 录</button>
<div class="login-error" id="loginError"></div>
</div>
<div class="login-hint">默认账号: admin / admin123</div>
</div>

<!-- 顶部栏 -->
<div id="topBar" class="top-bar" style="display:none">
<div class="top-bar-l">
<h1>🌶️ 湘里情智营</h1>
</div>
<div class="top-bar-r">
<div class="user-info">
<span class="username" id="currentUsername">-</span>
<span class="role-tag" id="currentRoleTag">-</span>
</div>
<button class="logout-btn" onclick="doLogout()">退出</button>
</div>
</div>

<!-- 日报页 -->
<div id="pgReport" class="pg">
<div class="pg-hd"><h1>📊 日报</h1><p id="rptDate"></p><div id="dataStatusBar" style="font-size:10px;color:#fff;opacity:0.8;margin-top:4px;padding:4px 0;"></div></div>
<div id="rptContent"></div>
</div>

<!-- 工作台页（业务员/区域经理个人视角） -->
<div id="pgWorkbench" class="pg">
<div class="pg-hd"><h1>💼 工作台</h1><p id="wbDate"></p></div>
<div id="wbContent"></div>
</div>

<!-- 产品页 -->
<div id="pgProduct" class="pg">
<div class="pg-hd"><h1>📦 产品中心</h1><p>高毛利产品推荐</p></div>
<input type="search" class="search" id="pSk" placeholder="搜索产品名称..." oninput="renderProduct()">
<div class="category-filter" id="categoryFilter">
<button class="cat-btn" data-cat="全部" onclick="filterProductCategory('全部')">全部</button>
<button class="cat-btn active" data-cat="核心1类" onclick="filterProductCategory('核心1类')">核心1类</button>
<button class="cat-btn" data-cat="核心2类" onclick="filterProductCategory('核心2类')">核心2类</button>
<button class="cat-btn" data-cat="八方宏泰" onclick="filterProductCategory('八方宏泰')">八方宏泰</button>
<button class="cat-btn" data-cat="自主产品" onclick="filterProductCategory('自主产品')">自主产品</button>
</div>
<div class="fl" style="margin-top:0">
<select id="pProfitRange" onchange="renderProduct()" style="flex:1">
  <option value="">全部毛利率</option>
  <option value="high">高毛利≥15%</option>
  <option value="mid">中毛利10-15%</option>
  <option value="low">低毛利&lt;10%</option>
</select>
</div>
<div id="prdContent"></div>
</div>

<!-- 客户页 -->
<div id="pgCustomer" class="pg">
<div class="pg-hd"><h1>👥 客户管理</h1><p id="custStat"></p></div>
<input type="search" class="search" id="cSk" placeholder="搜索客户名称..." oninput="resetCustomerPage()">
<!-- 功能一：客户跟进日历 -->
<div id="followCard" class="follow-card">
  <div class="follow-card-hd" onclick="toggleFollowCard()">
    <div class="follow-card-tit">待跟进客户</div>
    <div class="follow-stats" id="followStats"></div>
    <span class="follow-arrow" id="followArrow">▼</span>
  </div>
  <div class="follow-card-bd" id="followCardBd">
    <div class="follow-filter">
      <select id="followSalesFilter" onchange="renderFollowList()">
        <option value="">全部业务员</option>
      </select>
    </div>
    <div id="followList"></div>
  </div>
</div>
<!-- 功能二：沉默客户激活 -->
<div id="silentCard" class="silent-card">
  <div class="silent-card-hd" onclick="toggleSilentCard()">
    <div class="silent-card-tit">沉默客户激活</div>
    <div class="silent-stats" id="silentStats"></div>
    <span class="silent-arrow" id="silentArrow">▼</span>
  </div>
  <div class="silent-card-bd" id="silentCardBd">
    <div class="follow-filter">
      <select id="silentSalesFilter" onchange="renderSilentList()">
        <option value="">全部业务员</option>
      </select>

// ===== 页面切换 =====
function switchTab(tab) {
  // 权限检查
  if (!canAccessTab(tab)) {
    alert('您没有权限访问此页面');
    return;
  }
  
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('.nav>div').forEach(function(n) { n.classList.remove('on'); });
  document.getElementById('pg' + tab).classList.add('on');
  var navEl = document.getElementById('nav' + tab);
  if (navEl) navEl.classList.add('on');
  
  if (tab === 'Report') {
    if (!dataLoaded.data_report) {
      showLoading('加载日报数据...');
      loadDataFile('data_report').then(function() { renderReport(); hideLoading(); });
    } else {
      renderReport();
    }
  } else if (tab === 'Workbench') {
    renderWorkbench();
  } else if (tab === 'Product') {
    if (!dataLoaded.data_product) {
      showLoading('加载产品数据...');
      loadDataFile('data_product').then(function() {
        applyFixedDataMaps();
        renderProduct();
        hideLoading();
      });
    } else {
      renderProduct();
    }
  } else if (tab === 'Customer') {
    if (!dataLoaded.data_customer) {
      showLoading('加载客户数据...');
      loadDataFile('data_customer').then(function() {
        applyCustomerTier();
        loadCustomerList();
        hideLoading();
      });
    } else {
      loadCustomerList();
    }
  } else if (tab === 'Target') {
    renderTargetPage();
  }
}

// 获取今日数据
function getTodayData(username) {
  var result = { todaySales: 0, todayOrders: 0, todayNewCust: 0 };
  if (!salesProgressData) return result;
  
  for (var i = 0; i < salesProgressData.length; i++) {
    var p = salesProgressData[i];
    if (p['业务经理'] === username) {
      result.todaySales = p['当日销售额'] || 0;
      result.todayOrders = p['当日订单数'] || 0;
      // 新增客户需要从客户数据统计
      break;
    }
  }
  
  // 统计今日新增客户
  if (customersData) {
    var today = new Date().toISOString().slice(0, 10);
    customersData.forEach(function(c) {
      if (c.salesman === username && c.createDate && c.createDate.slice(0, 10) === today) {
        result.todayNewCust++;
      }
    });
  }
  
  return result;
}

// 获取我的进度
function getMyProgress(username) {
  var result = { totalRate: 0, core1Rate: 0, core2Rate: 0, selfRate: 0, commission: 0 };
  if (!salesProgressData) return result;
  
  var myData = null;
  for (var i = 0; i < salesProgressData.length; i++) {
    if (salesProgressData[i]['业务经理'] === username) {
      myData = salesProgressData[i];
      break;
    }
  }
  
  if (!myData) return result;
  
  var sales = myData['月销售额'] || 0;
  var target = getSalesTarget(username);
  var profitTarget = target.profitTarget || (target.salesTarget * 0.13);
  var actualProfit = sales * parseFloat(myData['月累计毛利率'] || 0) / 100;
  
  result.totalRate = profitTarget > 0 ? Math.min(actualProfit / profitTarget * 100, 100) : 0;
  result.core1Rate = Math.random() * 40 + 30; // 模拟数据
  result.core2Rate = Math.random() * 35 + 25;
  result.selfRate = Math.random() * 20 + 15;
  
  // 计算提成
  var comm = commissionData[username] || {};
  result.commission = comm.commission || calculateCommission(username);
  
  return result;
}

// 获取我的待办
function getMyTodos(username) {
  var result = { riskCount: 0, urgentCount: 0, normalCount: 0, silentCount: 0 };
  if (!customerPortraitData) return result;
  
  Object.keys(customerPortraitData).forEach(function(id) {
    var fp = customerPortraitData[id];
    if (fp.sm !== username) return;
    
    var tc = fp.tc || '';
    if (tc === '沉默') {
      result.silentCount++;
      return;
    }
    
    var lpd = fp.lpd || '';
    if (!lpd) return;
    
    var days = getDaysSince(lpd);
    if (days > 30) result.riskCount++;
    else if (days > 15) result.urgentCount++;
    else if (days > 7) result.normalCount++;
  });
  
  return result;
}

async function loadDataFile(key) {
  var info = DATA_FILES[key];
  if (!info) return false;
  if (dataLoaded[key]) return true;
  
  try {
    var cacheKey = 'xlq_' + key;
    var cached = localStorage.getItem(cacheKey);
    var cacheVer = localStorage.getItem(cacheKey + '_ver');
    var fileVer = '';
    if (window._versionData && window._versionData.files && window._versionData.files[key]) {
      fileVer = window._versionData.files[key].ver || '';
    }
    if (cached && cacheVer === fileVer && fileVer) {
      var data = JSON.parse(cached);
      applyDataToGlobals(key, data);
      dataFromCache = true;
      return true;
    }
    
    var url = DATA_BASE + info.file + '?v=' + (fileVer || Date.now());
    var response = await fetch(url);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var data = await response.json();
    
    // 缓存
    try {
      var dataSize = JSON.stringify(data).length;
      if (dataSize < 4 * 1024 * 1024) {
        localStorage.setItem(cacheKey, JSON.stringify(data));
        localStorage.setItem(cacheKey + '_ver', fileVer);
      }
    } catch(e) {}
    
    applyDataToGlobals(key, data);
    return true;
  } catch(e) {
    // 尝试缓存
    var cacheKey = 'xlq_' + key;
    var cached = localStorage.getItem(cacheKey);
    if (cached) {
      try {
        var data = JSON.parse(cached);
        applyDataToGlobals(key, data);
        dataFromCache = true;
        return true;
      } catch(e2) {}
    }
    if (info.required) {
      showError('数据加载失败: ' + key);
      return false;
    }
    return false;
  }
}

function applyDataToGlobals(key, data) {
  switch(key) {
    case 'data_report':
      dailyReportData = data.dailyReportData || {};
      salesProgressData = data.salesProgressData || [];
      break;
    case 'data_product':
      productsData = data.productsData || [];
      break;
    case 'data_customer':
      customersData = data.customersData || [];
      channelTypeMap = data.channelTypeMap || {};
      break;
    case 'data_coef':
      productCoefMap = data.productCoefMap || {};
      customerCoefMap = data.customerCoefMap || {};
      productMarginMap = data.productMarginMap || {};
      productMarginNameMap = data.productMarginNameMap || {};
      salesTargetMap = data.salesTargetMap || {};
      break;
    case 'data_extra':
      customerTierMap = data.customerTierMap || {};
      commissionData = data.commissionData || {};
      productSalesmen = data.productSalesmen || [];
      productPortraitData = data.productPortraitData || {};
      customerPortraitData = data.customerPortraitData || {};
      productPriceMap = data.productPriceMap || {};
      taskManagerData = data.taskManagerData || {};
      break;
    case 'data_recs':
      window.recsDataCache = data || {};
      break;
    case 'data_commission':
      commissionData = data || {};
      break;
  }
  dataLoaded[key] = true;
}

// ===== 提成计算系统 =====
function getCommissionRate(p) {
  if (p <= 50000) return 0.025;
  if (p <= 100000) return 0.03;
  if (p <= 200000) return 0.035;
  if (p <= 300000) return 0.04;
  return 0.05;
}

function getBaseSalary(p) {
  return 2000;
}

function getPerfSalary(monthlyProfit) {
  if (monthlyProfit >= 200000) return 3500;
  if (monthlyProfit >= 130000) return 3000;
  if (monthlyProfit >= 80000) return 2500;
  return 2000;
}

function getCashBonus(p) {
  if (p >= 260000) return 2000;
  if (p >= 200000) return 1500;
  if (p >= 130000) return 1000;
  return 0;
}

function calculateCommission(salesmanName) {
  var result = { commission: 0 };
  if (!dailyReportData || !dailyReportData['核心经营指标']) return result;
  var coreData = dailyReportData['核心经营指标'];
  for (var i = 0; i < coreData.length; i++) {
    if (coreData[i]['业务经理'] === salesmanName) {
      var monthlyProfit = coreData[i]['月累计毛利额'] || 0;
      var weightedProfit = monthlyProfit * 1.2;
      result.commission = weightedProfit * getCommissionRate(weightedProfit);
      break;
    }
  }
  return result;
}

function renderProduct() {
  var sortField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
  var sortOrder = currentSort.indexOf('desc') >= 0 ? -1 : 1;
  var sorted = productsData.slice().sort(function(a, b) {
    var valA = sortField === 'sales' ? a.sales : a.profit;
    var valB = sortField === 'sales' ? b.sales : b.profit;
    return (valB - valA) * sortOrder;
  });
  
  // 搜索过滤
  var k = document.getElementById('pSk').value.toLowerCase().trim();
  if (k) {
    var keywords = k.split(/\s+/);
    sorted = sorted.filter(function(p) {
      return keywords.every(function(kw) {
        return p.name.toLowerCase().indexOf(kw) >= 0 
            || p.code.toLowerCase().indexOf(kw) >= 0
            || (p.spec && p.spec.toLowerCase().indexOf(kw) >= 0)
            || (p.category && p.category.toLowerCase().indexOf(kw) >= 0);
      });
    });
  }
  
  // 分类筛选
  if (currentProductCategory && currentProductCategory !== '全部') {
    sorted = sorted.filter(function(p) {
      if (currentProductCategory === '八方宏泰') {
        var supplier = productPortraitData[p.code] || {};
        var coreSupplier = String(supplier['核心供应商'] || '');
        return coreSupplier.indexOf('宏泰') >= 0 || coreSupplier.indexOf('八方') >= 0;
      }
      return p.coefCat === currentProductCategory;

function showSortOptions(field) {
  event.stopPropagation();
  var existingMenu = document.getElementById('sortMenu');
  if (existingMenu) { existingMenu.remove(); return; }
  
  var btn = event.currentTarget;
  var rect = btn.getBoundingClientRect();
  
  var menu = document.createElement('div');
  menu.id = 'sortMenu';
  menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 5) + 'px;left:' + Math.min(rect.left, window.innerWidth - 170) + 'px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;min-width:160px;padding:6px 0;';
  
  var options = field === 'sales' ? [
    {value: 'sales_desc', label: '📊 销售额从高到低'},
    {value: 'sales_asc', label: '📊 销售额从低到高'}
  ] : [

    {value: 'profit_asc', label: '💰 毛利率从低到高'}
  ];
  
  options.forEach(function(opt) {
    var item = document.createElement('div');
    var isActive = currentSort === opt.value;
    item.style.cssText = 'padding:12px 16px;cursor:pointer;font-size:12px;' + (isActive ? 'background:#ffebee;color:#c62828;font-weight:600;' : 'color:#333;');

    item.onclick = function(e) { e.stopPropagation(); setSort(opt.value); menu.remove(); };
    menu.appendChild(item);
  });
  
  document.body.appendChild(menu);
}

function resetCustomerPage() {
  currentPage = 1;
  applyCustomerFilter();
}

function applyCustomerFilter() {
  var k = document.getElementById('cSk').value.toLowerCase();
  var lv = document.getElementById('cLevel').value;
  var sl = document.getElementById('cSales').value;
  var nd = document.getElementById('cNextDate').value;
  var pf = document.getElementById('cProfitRange').value;
  
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var weekEnd = new Date(today);
  weekEnd.setDate(weekEnd.getDate() + (7 - today.getDay()));
  var monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  
  // 基础过滤（基于权限）
  var baseCustomers = filteredCustomers.slice();
  
  filteredCustomers = baseCustomers.filter(function(c) {
    if (k && c.name.toLowerCase().indexOf(k) < 0) return false;
    if (lv && c.level !== lv) return false;
    if (sl && c.salesman !== sl) return false;
    if (nd) {
      if (c.nextDate) {
        var ndD = new Date(c.nextDate);
        if (nd === 'thisWeek' && (ndD < today || ndD > weekEnd)) return false;
        if (nd === 'thisMonth' && (ndD < today || ndD > monthEnd)) return false;
        if (nd === 'overdue' && ndD >= today) return false;
        if (nd === 'unknown') return false;
      } else {
        if (nd !== 'unknown') return false;
      }
    }
    if (pf) {
      var profitRate = c.profitRate25 || c.profitRate || c.整体毛利率 || 0;
      if (profitRate > 1) profitRate = profitRate;
      else profitRate = profitRate * 100;
      if (pf === 'high' && profitRate < 15) return false;
      if (pf === 'mid' && (profitRate < 10 || profitRate >= 15)) return false;
      if (pf === 'low' && profitRate >= 10) return false;
    }
    return true;
  });
  
  currentPage = 1;
  document.getElementById('custStat').textContent = '筛选结果:' + filteredCustomers.length + '个客户';
  renderCustomerList();
}

var allCustomers = [];

var currentPage = 1;
var custPageSize = 50;

function renderCustomerList() {
  var start = (currentPage - 1) * custPageSize;
  var end = Math.min(start + custPageSize, filteredCustomers.length);
  var pageData = filteredCustomers.slice(start, end);
  var today = new Date();
  var weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay());
  var weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  
  var h = '';
  pageData.forEach(function(c) {
    var nextDateText = '-';
    if (c.nextDate) {
      var nextD = new Date(c.nextDate);
      var isThisWeek = nextD >= weekStart && nextD <= weekEnd;
      if (c.isOverdue) {
        var overdueDays = Math.floor((today - new Date(c.nextDate)) / (1000 * 60 * 60 * 24));
        nextDateText = '<span style="color:#c5221f;font-weight:600">预计' + c.nextDate.slice(5) + '(已逾期' + overdueDays + '天)</span>';
      } else if (isThisWeek) {
        nextDateText = '<span style="color:#e37400;font-weight:700;background:#fef7e0;padding:2px 6px;border-radius:4px">📌 马上跟进(' + c.nextDate.slice(5) + ')</span>';
      } else {
        nextDateText = '<span style="color:#1a73e8">预计' + c.nextDate.slice(5) + '</span>';
      }
    }
    
    var cChannel = channelTypeMap[c.id] || c.channelType || '-';
    var cChannelColor = '#666';
    if (cChannel === '流通') cChannelColor = '#1a73e8';
    else if (cChannel === '餐饮') cChannelColor = '#e37400';
    else if (cChannel === '沉默') cChannelColor = '#888';
    
    var tierInfo = customerCoefMap[c.id];
    var cGradeTag = '';
    if (tierInfo) {
      var tierCategory = tierInfo.cat || '';
      var tierCoef = tierInfo.coef || 1.0;
      if (tierCategory === '沉默') {
        cGradeTag = '<span style="background:#fce4ec;color:#c62828;border-radius:10px;font-size:10px;font-weight:bold;margin-left:4px;padding:2px 6px">沉默×' + tierCoef + '</span>';
      } else if (tierCategory.indexOf('A') >= 0) {
        cGradeTag = '<span style="background:#e8f5e9;color:#137333;border-radius:10px;font-size:10px;font-weight:bold;margin-left:4px;padding:2px 6px">' + tierCategory + '×' + tierCoef + '</span>';
      } else if (tierCategory.indexOf('B') >= 0) {
        cGradeTag = '<span style="background:#e8f0fe;color:#1a73e8;border-radius:10px;font-size:10px;font-weight:bold;margin-left:4px;padding:2px 6px">' + tierCategory + '×' + tierCoef + '</span>';
      }
    }
    
    var profitRateDisplay = c.profitRate25 || c.profitRate || c.整体毛利率 || 0;
    if (profitRateDisplay > 1) profitRateDisplay = profitRateDisplay;
    else profitRateDisplay = profitRateDisplay * 100;
    
    h += '<div class="it" onclick="showCustomerDetail(\'' + c.id + '\')">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    h += '<span class="it-nm" style="flex:1">' + c.name + cGradeTag + '</span>';
    h += '<span style="font-size:10px;padding:2px 6px;border-radius:8px;background:' + cChannelColor + '22;color:' + cChannelColor + ';font-weight:500">' + cChannel + '</span>';
    h += '</div>';
    h += '<div class="it-info">';
    h += '<span>' + (c.salesman || '-') + '</span>';
    h += '<span class="tag tag-g">毛利' + (profitRateDisplay || 0).toFixed(1) + '%</span>';
    h += '</div>';
    h += '<div class="it-info" style="margin-top:4px">' + nextDateText + '</div>';
    if (c.warning || c.流失预警) h += '<div style="margin-top:6px"><span class="warn">' + (c.warning || c.流失预警) + '</span></div>';
    h += '</div>';
  });
  
  if (filteredCustomers.length === 0) h = '<div class="empty"><p>无匹配客户</p></div>';
  else if (end < filteredCustomers.length) {
    h += '<div class="more" onclick="loadMoreCustomer()">加载更多 (' + end + '/' + filteredCustomers.length + ')</div>';

  }
  
  document.getElementById('custContent').innerHTML = h;

function getActualProgress(type, salesman) {
  if (!salesProgressData || salesProgressData.length === 0) return Math.random() * 100000;

  salesProgressData.forEach(function(p) {
    if (!salesman || p['业务经理'] === salesman || (salesman === '' && EXCLUDE_SALESMAN.indexOf(p['业务经理']) === -1 && p['业务经理'] !== '小计' && p['业务经理'] !== '公司合计')) {

    }
  });
  
  var ratios = { core1: 0.30, core2: 0.35, bf8: 0.25, self: 0.10 };

}

function getDaysSince(dateStr) {
  if (!dateStr) return 999;
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var lastDate = new Date(dateStr);
  lastDate.setHours(0, 0, 0, 0);
  return Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
}

function renderFollowList() {
  var salesFilter = document.getElementById('followSalesFilter') ? document.getElementById('followSalesFilter').value : '';
  var urgentCount = 0, riskCount = 0, normalCount = 0;
  var followCustomers = [];
  
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    var tc = fp.tc || '';
    var salesman = fp.sm || '';
    if (tc === '沉默' || EXCLUDE_SALESMAN.indexOf(salesman) !== -1) return;
    if (salesFilter && salesman !== salesFilter) return;
    
    var lpd = fp.lpd || '';
    var days = getDaysSince(lpd);
    if (days < 7) return;
    
    var urgency = 'normal';
    if (days > 30) { urgency = 'risk'; riskCount++; }
    else if (days > 15) { urgency = 'urgent'; urgentCount++; }
    else { normalCount++; }
    
    followCustomers.push({ id: id, name: fp.n || '-', tc: tc, lpd: lpd, days: days, salesman: salesman, urgency: urgency });
  });
  
  followCustomers.sort(function(a, b) {
    var priority = { risk: 3, urgent: 2, normal: 1 };
    if (priority[a.urgency] !== priority[b.urgency]) return priority[b.urgency] - priority[a.urgency];
    return b.days - a.days;
  });
  
  var statsEl = document.getElementById('followStats');
  if (statsEl) {
    var statsHtml = '';
    if (normalCount > 0) statsHtml += '<span class="follow-stat follow-stat-y">待跟进' + normalCount + '家</span>';
    if (urgentCount > 0) statsHtml += '<span class="follow-stat follow-stat-o">急待跟进' + urgentCount + '家</span>';
    if (riskCount > 0) statsHtml += '<span class="follow-stat follow-stat-r">流失风险' + riskCount + '家</span>';
    statsEl.innerHTML = statsHtml;
  }
  
  var listEl = document.getElementById('followList');
  if (!listEl) return;
  
  if (followCustomers.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:#888;font-size:12px">暂无待跟进客户 👍</div>';
    return;
  }
  
  var h = '';
  followCustomers.slice(0, 20).forEach(function(c) {
    var tierTag = getTierTagHtml(c.tc);
    var urgencyClass = c.urgency === 'risk' ? 'follow-row-r' : (c.urgency === 'urgent' ? 'follow-row-o' : 'follow-row-y');
    h += '<div class="follow-row" onclick="showCustomerDetail(\'' + c.id + '\')">';
    h += '<div class="follow-row-l ' + urgencyClass + '"></div>';
    h += '<div class="follow-row-c">';
    h += '<div class="follow-row-n">' + c.name + tierTag + '</div>';
    h += '<div class="follow-row-i"><span>' + (c.salesman || '-') + '</span></div>';
    h += '</div>';
    h += '<div class="follow-row-d">' + c.days + '天前</div>';
    h += '</div>';
  });
  
  listEl.innerHTML = h;
}

function getTierTagHtml(tc) {
  if (!tc) return '';
  var tagClass = '';
  if (tc.indexOf('A') >= 0) tagClass = 'background:#e8f5e9;color:#137333';
  else if (tc.indexOf('B') >= 0) tagClass = 'background:#e8f0fe;color:#1a73e8';
  else if (tc.indexOf('沉默') >= 0) tagClass = 'background:#fce4ec;color:#c62828';
  return '<span class="follow-tier-tag" style="' + tagClass + '">' + tc + '</span>';
}

function renderSilentList() {
  var salesFilter = document.getElementById('silentSalesFilter') ? document.getElementById('silentSalesFilter').value : '';
  var silentCustomers = [];
  var totalCount = 0;
  
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    var tc = fp.tc || '';
    var salesman = fp.sm || '';
    if (tc !== '沉默' || EXCLUDE_SALESMAN.indexOf(salesman) !== -1) return;
    if (salesFilter && salesman !== salesFilter) return;
    
    totalCount++;
    silentCustomers.push({ id: id, name: fp.n || '-', sm: fp.sm || 0, pc: fp.pc || 0, salesman: salesman });
  });
  
  silentCustomers.sort(function(a, b) { return (b.sm || 0) - (a.sm || 0); });
  
  var statsEl = document.getElementById('silentStats');
  if (statsEl) {
    statsEl.innerHTML = '<span class="silent-stat silent-stat-gray">共' + totalCount + '家</span>';
  }
  
  var listEl = document.getElementById('silentList');
  if (!listEl) return;
  
  if (silentCustomers.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:#888;font-size:12px">暂无沉默客户 👍</div>';
    return;
  }
  
  var displayCount = silentExpanded ? silentCustomers.length : Math.min(10, silentCustomers.length);

    h += '<div class="silent-row-i">';

function fmtAmt(amt) {
  if (typeof amt !== 'number') amt = parseFloat(amt) || 0;
  if (amt >= 10000) return (amt / 10000).toFixed(1) + 'w';
  return amt.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function getProductCoef(productCode) {
  if (!productCode) return { coef: 1.0, cat: '常规' };
  var data = productCoefMap[productCode];
  if (data) return data;
  return { coef: 1.0, cat: '常规' };
}

function getCustomerCoef(customerCode) {
  if (!customerCode) return { coef: 1.0, cat: '批发C', salesman: '' };
  var data = customerCoefMap[customerCode];
  if (data) return data;
  return { coef: 1.0, cat: '批发C', salesman: '' };
}

function getProductMargin(productCode, productName) {
  if (productCode) {
    var margin = productMarginMap[productCode];
    if (margin !== undefined) return margin;
  }
  if (productName) {
    var margin = productMarginNameMap[productName];
    if (margin !== undefined) return margin;
  }
  return null;
}

function getSalesTarget(salesmanName) {
  var target = salesTargetMap[salesmanName];
  if (target) return target;
  return { salesTarget: 0, profitTarget: 0 };
}

function applyFixedDataMaps() {
  productsData.forEach(function(p) {
    var margin = productMarginMap[p.code];
    if (margin === undefined) margin = productMarginNameMap[p.name];
    if (margin !== undefined) {
      p.realProfitRate = margin;
      p.profit = margin;
    }
    
    var coefInfo = productCoefMap[p.code];
    if (coefInfo) {
      p.coefCat = coefInfo.cat;
      p.coef = coefInfo.coef;
    } else {
      p.coefCat = '常规';
      p.coef = 1.0;
    }
  });
}

function applyCustomerTier() {
  customersData.forEach(function(c) {
    var info = customerCoefMap[c.id];
    if (info) {
      c.level = info.tier || c.level;
      c.coefCat = info.cat;
      c.coef = info.coef;
      c.score = info.score;
    }
  });
}
