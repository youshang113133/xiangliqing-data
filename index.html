<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f7fa;font-size:14px}
.pg{display:none;padding:12px;padding-bottom:70px}
.pg.on{display:block}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 12px;position:sticky;top:0;z-index:100}
.pg-hd h1{font-size:17px}
.pg-hd p{font-size:11px;opacity:.9}
.search{padding:10px 14px;border:2px solid #e0e0e0;border-radius:20px;font-size:14px;width:100%;margin:10px 0}
.fl{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fl select{flex:1;min-width:80px;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row:last-child{border-bottom:none}
.lb{color:#888}
.vl{color:#333;font-weight:500}
.vl-r{color:#e53935;font-weight:600}
.vl-g{color:#137333;font-weight:600}
.it{padding:12px;border-bottom:1px solid #eee;cursor:pointer;border-radius:8px;margin-bottom:8px;background:#fff;transition:background .2s}
.it:active{background:#f0f0f0}
.it:last-child{border-bottom:none}
.it-nm{font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
.it-info{font-size:12px;color:#666;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.tag-g{background:#e6f4ea;color:#137333}
.tag-y{background:#fef7e0;color:#e37400}
.tag-r{background:#fce8e6;color:#c5221f}
.tag-b{background:#e8f0fe;color:#1a73e8}
.tag-p{background:#f3e5f5;color:#7b1fa2}
.warn{background:#fff3cd;color:#856404;padding:2px 8px;border-radius:4px;font-size:10px;display:inline-block}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;padding:6px 0}
.nav>div{flex:1;padding:10px;text-align:center;font-size:11px;color:#666;cursor:pointer;user-select:none}
.nav .on{color:#1a73e8;font-weight:500}
.nav .on::before{content:'';display:block;width:24px;height:3px;background:#1a73e8;border-radius:2px;margin:0 auto 6px}
.stat-row{display:flex;padding:12px 0;border-bottom:1px solid #eee}
.stat-item{text-align:center;flex:1}
.stat-num{font-size:22px;font-weight:700;color:#1a73e8}
.stat-lbl{font-size:10px;color:#888;margin-top:4px}
.loading{text-align:center;padding:40px;color:#888}
.error{color:#c5221f;padding:20px;text-align:center;background:#fce8e6;border-radius:8px;margin:10px}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.md.on{display:flex;align-items:center;justify-content:center}
.md-ct{background:#fff;border-radius:12px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
.md-hd{display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid #eee}
.md-tt{font-size:16px;font-weight:600}
.md-cl{background:none;border:none;font-size:24px;cursor:pointer;color:#666}
.md-bd{padding:14px}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#1a73e8;transition:width .3s}
</style>
</head>
<body>

<!-- 日报页 -->
<div id="pgReport" class="pg on">
<div class="pg-hd">
<h1>📊 湘里情智营·日报</h1>
<p id="reportStat">加载中...</p>
</div>
<div id="reportContent"></div>
</div>

<!-- 产品页 -->
<div id="pgProduct" class="pg">
<div class="pg-hd">
<h1>📦 产品中心</h1>
<p id="productStat">加载中...</p>
</div>
<input type="search" class="search" id="pSearch" placeholder="搜索产品名称/编码..." oninput="filterProducts()">
<div class="fl">
<select id="pType" onchange="filterProducts()">
<option value="">全部类型</option>
<option value="核心产品">核心产品</option>
<option value="自主产品">自主产品</option>
<option value="其他">其他</option>
</select>
<select id="pGrade" onchange="filterProducts()">
<option value="">全部等级</option>
<option value="S级">S级</option>
<option value="A级">A级</option>
<option value="B级">B级</option>
</select>
</div>
<div id="productList"></div>
<div id="productMore" style="text-align:center;padding:10px;color:#1a73e8;cursor:pointer" onclick="loadMoreProducts()">加载更多</div>
</div>

<!-- 客户页 -->
<div id="pgCustomer" class="pg">
<div class="pg-hd">
<h1>👥 客户中心</h1>
<p id="customerStat">加载中...</p>
</div>
<input type="search" class="search" id="cSearch" placeholder="搜索客户名称..." oninput="filterCustomers()">
<div class="fl">
<select id="cLevel" onchange="filterCustomers()">
<option value="">全部分层</option>
<option value="A">A类</option>
<option value="B">B类</option>
<option value="C">C类</option>
<option value="D">D类</option>
</select>
<select id="cSales" onchange="filterCustomers()">
<option value="">全部业务员</option>
</select>
</div>
<div class="fl">
<select id="cNextDate" onchange="filterCustomers()">
<option value="">预测采购时间</option>
<option value="thisWeek">本周内</option>
<option value="thisMonth">本月内</option>
<option value="overdue">已逾期</option>
<option value="unknown">待预测</option>
</select>
</div>
<div id="customerList"></div>
<div id="customerMore" style="text-align:center;padding:10px;color:#1a73e8;cursor:pointer" onclick="loadMoreCustomers()">加载更多</div>
</div>

<!-- 详情弹窗 -->
<div id="modal" class="md" onclick="closeModal()">
<div class="md-ct" onclick="event.stopPropagation()">
<div class="md-hd">
<div class="md-tt" id="modalTitle">详情</div>
<button class="md-cl" onclick="closeModal()">×</button>
</div>
<div class="md-bd" id="modalBody"></div>
</div>
</div>

<!-- 底部导航 -->
<div class="nav">
<div id="navReport" class="on" onclick="switchTab('Report')">日报</div>
<div id="navProduct" onclick="switchTab('Product')">产品</div>
<div id="navCustomer" onclick="switchTab('Customer')">客户</div>
</div>

<!-- 刷新按钮 -->
<div style="position:fixed;top:60px;right:12px;z-index:99">
<button onclick="refreshData()" style="background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
🔄 刷新
</button>
</div>

<script>
// 数据URL
var DATA_URL = 'https://testingcf.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@main/data_v202604221930.json';

// 全局数据
var productsData = [];
var customersData = [];
var dailyReportData = null;
var salesProgressData = [];
var updateTime = '';

// 分页状态
var productPage = 0;
var customerPage = 0;
var pageSize = 20;

// 初始化
document.addEventListener('DOMContentLoaded', loadData);

// 加载数据
async function loadData() {
  try {
    document.getElementById('reportStat').textContent = '正在加载数据...';
    
    var response = await fetch(DATA_URL);
    if (!response.ok) throw new Error('网络错误: ' + response.status);
    
    var data = await response.json();
    
    productsData = data.productsData || [];
    customersData = data.customersData || [];
    dailyReportData = data.dailyReportData;
    salesProgressData = data.salesProgressData || [];
    updateTime = data.updateTime || '';
    
    console.log('数据加载成功:', productsData.length + '产品', customersData.length + '客户');
    
    // 渲染各页面
    renderReport();
    initProductPage();
    initCustomerPage();
    
  } catch(e) {
    console.error('加载失败:', e);
    document.getElementById('reportStat').textContent = '加载失败';
    document.getElementById('reportContent').innerHTML = '<div class="error">错误: ' + e.message + '</div>';
  }
}

// 刷新数据
function refreshData() {
  loadData();
}

// 切换标签页
function switchTab(tab) {
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('.nav>div').forEach(function(n) { n.classList.remove('on'); });
  document.getElementById('pg' + tab).classList.add('on');
  document.getElementById('nav' + tab).classList.add('on');
}

// 渲染日报
function renderReport() {
  if (!dailyReportData) return;
  
  document.getElementById('reportStat').textContent = '数据: 云端 | 更新: ' + updateTime;
  
  var html = '';
  var kpi = dailyReportData.核心经营指标;
  
  // 核心指标
  html += '<div class="card"><div class="card-tit">📊 核心经营指标</div>';
  html += '<div class="row"><span>当日销售额</span><span class="vl-r">' + kpi.销售额.当日.toLocaleString() + ' 元</span></div>';
  html += '<div class="row"><span>月累计销售额</span><span class="vl-r">' + kpi.销售额.月累计.toLocaleString() + ' 元</span></div>';
  html += '<div class="row"><span>当日毛利率</span><span>' + (kpi.毛利率.当日 * 100).toFixed(1) + '%</span></div>';
  html += '<div class="row"><span>月累计毛利率</span><span>' + (kpi.毛利率.月累计 * 100).toFixed(1) + '%</span></div>';
  html += '<div class="row"><span>当日订单数</span><span>' + kpi.订单数.当日 + '</span></div>';
  html += '<div class="row"><span>月累计订单数</span><span>' + kpi.订单数.月累计 + '</span></div>';
  html += '</div>';
  
  // 毛利区间
  html += '<div class="card"><div class="card-tit">📈 毛利区间分布</div>';
  dailyReportData.毛利区间.月累计.forEach(function(item) {
    html += '<div class="row"><span>' + item.区间 + '</span><span>' + item.销售额.toLocaleString() + '元 (' + (item.占比*100).toFixed(1) + '%)</span></div>';
  });
  html += '</div>';
  
  // 销售进度
  if (salesProgressData && salesProgressData.length > 0) {
    html += '<div class="card"><div class="card-tit">🎯 区域销售进度</div>';
    salesProgressData.forEach(function(item) {
      // 处理完成进度（可能是字符串"21.31%"或数字）
      var progressStr = item['完成进度'] || '0%';
      var progress = parseFloat(progressStr.toString().replace('%', '')) || 0;
      var color = progress >= 100 ? '#137333' : progress >= 80 ? '#e37400' : '#c5221f';
      html += '<div class="row"><span>' + (item['区域'] || '未知') + '</span><span style="color:' + color + '">' + progressStr + '</span></div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(progress, 100) + '%;background:' + color + '"></div></div>';
    });
    html += '</div>';
  }
  
  // 统计
  html += '<div class="card"><div class="card-tit">📦 数据统计</div>';
  html += '<div class="row"><span>产品数量</span><span>' + productsData.length + ' 个</span></div>';
  html += '<div class="row"><span>客户数量</span><span>' + customersData.length + ' 个</span></div>';
  html += '</div>';
  
  document.getElementById('reportContent').innerHTML = html;
}

// 初始化产品页
function initProductPage() {
  document.getElementById('productStat').textContent = '共 ' + productsData.length + ' 个产品';
  productPage = 0;
  renderProducts();
}

// 筛选产品
function filterProducts() {
  productPage = 0;
  renderProducts();
}

// 渲染产品列表
function renderProducts() {
  var search = document.getElementById('pSearch').value.toLowerCase();
  var type = document.getElementById('pType').value;
  var grade = document.getElementById('pGrade').value;
  
  var filtered = productsData.filter(function(p) {
    if (search && !p.name.toLowerCase().includes(search) && !p.code.toLowerCase().includes(search)) return false;
    if (type && p.type !== type) return false;
    if (grade && p.grade !== grade) return false;
    return true;
  });
  
  var list = filtered.slice(0, (productPage + 1) * pageSize);
  
  var html = '';
  list.forEach(function(p) {
    html += '<div class="it" onclick="showProduct(\'' + p.code + '\')">';
    html += '<div class="it-nm">' + p.name + '</div>';
    html += '<div class="it-info">';
    html += '<span class="tag tag-b">' + (p.type || '其他') + '</span>';
    if (p.grade) html += '<span class="tag tag-g">' + p.grade + '</span>';
    if (p.profit !== undefined) html += '<span class="tag tag-y">' + p.profit.toFixed(1) + '%毛利</span>';
    if (p.stock !== undefined && p.stock > 0) html += '<span>库存:' + p.stock.toLocaleString() + '</span>';
    html += '</div></div>';
  });
  
  document.getElementById('productList').innerHTML = html || '<div class="loading">暂无数据</div>';
  document.getElementById('productMore').style.display = list.length < filtered.length ? 'block' : 'none';
}

// 加载更多产品
function loadMoreProducts() {
  productPage++;
  renderProducts();
}

// 显示产品详情
function showProduct(code) {
  var p = productsData.find(function(x) { return x.code === code; });
  if (!p) return;
  
  document.getElementById('modalTitle').textContent = p.name;
  var html = '<div class="row"><span>编码</span><span>' + p.code + '</span></div>';
  html += '<div class="row"><span>规格</span><span>' + (p.spec || '-') + '</span></div>';
  html += '<div class="row"><span>类型</span><span>' + (p.type || '-') + '</span></div>';
  html += '<div class="row"><span>分类</span><span>' + (p.category || '-') + '</span></div>';
  html += '<div class="row"><span>等级</span><span>' + (p.grade || '-') + '</span></div>';
  html += '<div class="row"><span>毛利率</span><span class="vl-r">' + (p.profit || 0).toFixed(1) + '%</span></div>';
  html += '<div class="row"><span>销售额</span><span>' + (p.sales || 0).toLocaleString() + '</span></div>';
  html += '<div class="row"><span>库存</span><span class="vl-g">' + (p.stock || 0).toLocaleString() + '</span></div>';
  html += '<div class="row"><span>业务员</span><span>' + (p.salesperson || '-') + '</span></div>';
  html += '<div class="row"><span>状态</span><span>' + (p.status || '-') + '</span></div>';
  
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('on');
}

// 初始化客户页
function initCustomerPage() {
  document.getElementById('customerStat').textContent = '共 ' + customersData.length + ' 个客户';
  
  // 填充业务员下拉
  var salesmen = [...new Set(customersData.map(function(c) { return c.salesperson; }).filter(Boolean))].sort();
  var salesSelect = document.getElementById('cSales');
  salesSelect.innerHTML = '<option value="">全部业务员</option>';
  salesmen.forEach(function(s) {
    salesSelect.innerHTML += '<option value="' + s + '">' + s + '</option>';
  });
  
  customerPage = 0;
  renderCustomers();
}

// 筛选客户
function filterCustomers() {
  customerPage = 0;
  renderCustomers();
}

// 渲染客户列表
function renderCustomers() {
  var search = document.getElementById('cSearch').value.toLowerCase();
  var level = document.getElementById('cLevel').value;
  var sales = document.getElementById('cSales').value;
  var nextDate = document.getElementById('cNextDate').value;
  
  var today = new Date();
  var weekLater = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
  var monthLater = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000);
  
  var filtered = customersData.filter(function(c) {
    if (search && !c.name.toLowerCase().includes(search)) return false;
    if (level && c.level !== level) return false;
    if (sales && c.salesperson !== sales) return false;
    if (nextDate) {
      var nd = c.nextDate ? new Date(c.nextDate) : null;
      if (nextDate === 'thisWeek' && (!nd || nd > weekLater)) return false;
      if (nextDate === 'thisMonth' && (!nd || nd > monthLater)) return false;
      if (nextDate === 'overdue' && (!nd || nd >= today)) return false;
      if (nextDate === 'unknown' && nd) return false;
    }
    return true;
  });
  
  var list = filtered.slice(0, (customerPage + 1) * pageSize);
  
  var html = '';
  list.forEach(function(c) {
    var nextDateStr = c.nextDate ? new Date(c.nextDate).toLocaleDateString() : '待预测';
    var nextDateClass = '';
    if (c.nextDate) {
      var nd = new Date(c.nextDate);
      if (nd < today) nextDateClass = 'tag-r';
      else if (nd <= weekLater) nextDateClass = 'tag-y';
      else nextDateClass = 'tag-g';
    }
    
    html += '<div class="it" onclick="showCustomer(\'' + c.code + '\')">';
    html += '<div class="it-nm">' + c.name + '</div>';
    html += '<div class="it-info">';
    if (c.level) html += '<span class="tag tag-b">' + c.level + '类</span>';
    if (c.salesperson) html += '<span>' + c.salesperson + '</span>';
    html += '<span class="tag ' + nextDateClass + '">预计:' + nextDateStr + '</span>';
    html += '</div></div>';
  });
  
  document.getElementById('customerList').innerHTML = html || '<div class="loading">暂无数据</div>';
  document.getElementById('customerMore').style.display = list.length < filtered.length ? 'block' : 'none';
}

// 加载更多客户
function loadMoreCustomers() {
  customerPage++;
  renderCustomers();
}

// 显示客户详情
function showCustomer(code) {
  var c = customersData.find(function(x) { return x.code === code; });
  if (!c) return;
  
  document.getElementById('modalTitle').textContent = c.name;
  var html = '<div class="row"><span>编码</span><span>' + c.code + '</span></div>';
  html += '<div class="row"><span>分层</span><span>' + (c.level || '-') + '类</span></div>';
  html += '<div class="row"><span>业务员</span><span>' + (c.salesperson || '-') + '</span></div>';
  html += '<div class="row"><span>渠道类型</span><span>' + (c.channelType || '-') + '</span></div>';
  html += '<div class="row"><span>预计进货</span><span class="vl-g">' + (c.nextDate ? new Date(c.nextDate).toLocaleDateString() : '待预测') + '</span></div>';
  html += '<div class="row"><span>月销售额</span><span>' + (c.monthSales || 0).toLocaleString() + '</span></div>';
  html += '<div class="row"><span>毛利率</span><span>' + (c.profitRate || 0).toFixed(1) + '%</span></div>';
  html += '<div class="row"><span>地址</span><span>' + (c.address || '-') + '</span></div>';
  
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('on');
}

// 关闭弹窗
function closeModal() {
  document.getElementById('modal').classList.remove('on');
}
</script>
</body>
</html>
