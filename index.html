<script>
function forceRefresh() {
    var btn = document.querySelector('.refresh-btn');
    btn.textContent = '刷新中...';
    btn.classList.add('loading');
    
    // 清除localStorage
    localStorage.clear();
    
    // 强制重新加载（带时间戳）
    var timestamp = new Date().getTime();
    window.location.href = window.location.pathname + '?t=' + timestamp;
}

// 页面加载时检查版本
window.addEventListener('load', function() {
    var storedVersion = localStorage.getItem('dataVersion');
    var currentVersion = (typeof DATA !== 'undefined') ? DATA.cdnRefresh : '';

    if (storedVersion !== currentVersion) {
        localStorage.setItem('dataVersion', currentVersion);
        console.log('数据已更新: ' + currentVersion);
    }
});

// ===== 异步加载外部数据 =====
async function loadExternalData() {
    const loadJson = async (url, name) => {
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            console.log(name + ' 加载成功: ' + data.length + ' 条记录');
            return data;
        } catch(e) {
            console.error(name + ' 加载失败:', e);
            return [];
        }
    };

    try {
        const [customers, products] = await Promise.all([
            loadJson('./data_customers.json', '客户数据'),
            loadJson('./data_products.json', '产品数据')
        ]);
        
        // 更新全局变量
        customersData = customers;
        productsData = products;
        
        // 触发各模块重新渲染
        if (typeof renderProduct === 'function') renderProduct();
        if (typeof renderCustomerFilters === 'function') renderCustomerFilters();
        if (typeof renderCustomerList === 'function') renderCustomerList();
        
        console.log('外部数据加载完成');
    } catch(e) {
        console.error('数据加载异常:', e);
    }
}

// 页面加载完成后自动加载外部数据
setTimeout(loadExternalData, 100);
</script>

// ===== 双模式数据加载系统 =====
var DATA_URL_PRODUCTS = './data_products.json';
var DATA_URL_CUSTOMERS = './data_customers.json';
var DATA_URL_CORE = './data_core_lite.json'; // 请替换为实际云端地址
var dataSource = 'embedded';  // 数据已嵌入HTML // 'embedded' 或 'cloud'
var dataUpdateTime = DATA.updateTime || '';

// 尝试从云端获取数据
async function fetchCloudData() {
    // 数据已内嵌，跳过云端加载
    if (customersData.length > 0 && productsData.length > 0) {
        console.log('数据已内嵌，跳过云端加载');
        dataSource = 'embedded';
        updateDataStatus();
        return;
    }
  try {
    // 并行加载所有数据文件
    var fetches = [];
    var urls = [
      {url: DATA_URL_PRODUCTS, key: 'productsData'},
      {url: DATA_URL_CUSTOMERS, key: 'customersData'},
      {url: DATA_URL_CORE, key: 'core'}
    ];
    
    var results = await Promise.allSettled(urls.map(function(item) {
      return fetch(item.url + '?t=' + Date.now(), {
        method: 'GET',
        headers: {'Accept': 'application/json'},
        signal: AbortSignal.timeout(30000)
      }).then(function(r) { return r.ok ? r.json() : null; });
    }));
    
    var loaded = 0;
    results.forEach(function(result, i) {
      if (result.status === 'fulfilled' && result.value) {
        var data = result.value;
        var key = urls[i].key;
        if (key === 'productsData' && Array.isArray(data)) {
          productsData = data;
          loaded++;
        } else if (key === 'customersData' && Array.isArray(data)) {
          customersData = data;
          allCustomers = data;
          filteredCustomers = data;
          loaded++;
        } else if (key === 'core') {
          if (data.dailyReportData) dailyReportData = data.dailyReportData;
          if (data.salesProgressData) salesProgressData = data.salesProgressData;
          if (data.updateTime) dataUpdateTime = data.updateTime;
          loaded++;
        }
      }
    });
    
    if (loaded > 0) {
      dataSource = 'cloud';
      console.log('✅ 云端数据加载成功，加载了' + loaded + '个文件');
      updateDataStatus();
      refreshCurrentPage();
      
      // 重新初始化客户和产品过滤
      if (productsData.length > 0) {
        var categories = {};
        productsData.forEach(function(p) { if(p.category) categories[p.category] = true; });
        var catSelect = document.getElementById('pCategory');
        if(catSelect){
          catSelect.innerHTML = '<option value="">全部分类</option>';
          Object.keys(categories).sort().forEach(function(cat) {
            var opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            catSelect.appendChild(opt);
          });
        }
        renderProduct();
      }
      if (customersData.length > 0) {
        renderCustomerFilters();
        renderCustomerList();
      }
    }
  } catch (e) {
    console.log('⚠️ 云端数据获取失败，使用本地数据：' + e.message);
  }
}

// 刷新当前页面
function refreshCurrentPage() {
  var activeTab = document.querySelector('.pg.on');
  if (activeTab) {
    var tabId = activeTab.id;
    if (tabId === 'pgReport') renderReport();
    if (tabId === 'pgProduct') renderProduct();
    if (tabId === 'pgCustomer') loadCustomerList();
  }
}

// 更新数据状态栏
function updateDataStatus() {
  var statusBar = document.getElementById('dataStatusBar');
  if (statusBar) {
    var onlineIcon = navigator.onLine ? '🟢' : '🔴';
    var sourceText = dataSource === 'cloud' ? '☁️ 云端' : '📦 嵌入';
    statusBar.innerHTML = '数据: ' + sourceText + 
                          ' | ' + onlineIcon + ' 网络: ' + (navigator.onLine ? '在线' : '离线') + 
                          ' | 更新时间: ' + dataUpdateTime;
  }
}

window.addEventListener('offline', function() {

function fmtAmt(n){
  if(n==null||n===undefined)return '-';
  if(typeof n==='string')n=parseFloat(n);
  if(isNaN(n))return '-';
  if(Math.abs(n)>=10000)return (n/10000).toFixed(1)+'万';
  return n.toFixed(0);
}
function fmtPct(n){
  if(n==null||n===undefined)return '-';
  if(typeof n==='string')n=parseFloat(n);
  if(isNaN(n))return '-';
  return (n*100).toFixed(1)+'%';
}

// 更新后的productsData（按销售额从高到低排序，一品蓝鲸排第一）
// 默认按销售额排序

// 产品渲染函数
// 产品排序状态
var currentSort = 'sales_desc';

function renderProduct() {
    // 根据排序状态进行排序
    var sortField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    var sortOrder = currentSort.indexOf('desc') >= 0 ? -1 : 1;
    var sorted = productsData.slice().sort(function(a, b) {
        var valA = sortField === 'sales' ? a.sales : a.profit;
        var valB = sortField === 'sales' ? b.sales : b.profit;
        return (valB - valA) * sortOrder;
    });
    
    // 搜索过滤
    // 搜索过滤（支持多关键词关联搜索）
    var k = document.getElementById('pSk').value.toLowerCase().trim();
    var filtered = k ? sorted.filter(function(p) {
        var keywords = k.split(/\s+/);
        return keywords.every(function(kw) {
            return p.name.toLowerCase().indexOf(kw) >= 0 
                || p.code.toLowerCase().indexOf(kw) >= 0
                || (p.spec && p.spec.toLowerCase().indexOf(kw) >= 0)
                || (p.category && p.category.toLowerCase().indexOf(kw) >= 0);
        });
    }) : sorted;
    
    // 分类筛选
    var catFilter = document.getElementById('pCategory').value;
    if (catFilter) {
        filtered = filtered.filter(function(p) { return p.category === catFilter; });
    }
    
    // 毛利率筛选
    var profitFilter = document.getElementById('pProfitRange').value;
    if (profitFilter === 'high') {
        filtered = filtered.filter(function(p) { return p.profit >= 15; });
    } else if (profitFilter === 'mid') {
        filtered = filtered.filter(function(p) { return p.profit >= 10 && p.profit < 15; });
    } else if (profitFilter === 'low') {
        filtered = filtered.filter(function(p) { return p.profit < 10; });
    }
    
    var h = '';
    
    // 搜索和筛选栏
    h += '<div style="display:flex;gap:6px;margin-bottom:10px">';
    h += '<button onclick="showSortOptions(\'sales\')" style="flex:1;padding:8px;font-size:11px;border:' + (currentSort === 'sales' ? '2px solid #1a73e8' : '1px solid #ddd') + ';border-radius:6px;background:' + (currentSort === 'sales' ? '#e8f0fe' : '#fff') + ';color:' + (currentSort === 'sales' ? '#1a73e8' : '#666') + ';cursor:pointer">📊 销售额</button>';
    h += '<button onclick="showSortOptions(\'profit\')" style="flex:1;padding:8px;font-size:11px;border:' + (currentSort === 'profit' ? '2px solid #1a73e8' : '1px solid #ddd') + ';border-radius:6px;background:' + (currentSort === 'profit' ? '#e8f0fe' : '#fff') + ';color:' + (currentSort === 'profit' ? '#1a73e8' : '#666') + ';cursor:pointer">💰 毛利率</button>';
    h += '</div>';
    
    // 统计信息
    h += '<div style="font-size:11px;color:#888;margin-bottom:10px">共 ' + filtered.length + ' 个产品</div>';
    
    h += '<div class="prd-grid">';
    
    filtered.forEach(function(p, i) {
        var realIdx = productsData.indexOf(p);
        var profitColor = p.profit >= 15 ? '#137333' : (p.profit >= 10 ? '#1a73e8' : '#e53935');
        var rank = i + 1;
        
        h += '<div class="prd-card" onclick="showProductDetail(' + realIdx + ')" style="cursor:pointer;padding:10px">';
        
        // 排名和编码
        h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">';
        h += '<div style="font-size:10px;font-weight:700;color:#fff;background:' + (rank <= 3 ? '#e53935' : '#888') + ';padding:2px 5px;border-radius:4px">#' + rank + '</div>';
        h += '<div style="font-size:9px;color:#666">' + p.code + '</div>';
        h += '</div>';
        
        // 产品名称
        h += '<div style="font-size:12px;font-weight:600;color:#333;margin-bottom:4px;line-height:1.3">' + p.name + '</div>';
        
        // 规格
        // type标签（只显示核心产品和自主产品）
        var typeTag = '';
        if (p.type === '核心产品') {
            typeTag = '<span style="background:#fce8e6;color:#c5221f;padding:1px 4px;border-radius:3px;font-size:8px;margin-left:4px">核心</span>';
        } else if (p.type === '自主产品') {
            typeTag = '<span style="background:#e8f0fe;color:#1a73e8;padding:1px 4px;border-radius:3px;font-size:8px;margin-left:4px">自主</span>';
        }
        h += '<div style="font-size:10px;color:#888;margin-bottom:8px">' + (p.spec || '-') + typeTag + '</div>';
        
        // 四个指标卡片
        h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
        
        // 一批价格
        h += '<div style="background:#f8f9fa;padding:6px;border-radius:6px;text-align:center">';
        h += '<div style="font-size:8px;color:#888">一批价</div>';
        h += '<div style="font-size:12px;font-weight:700;color:#e53935">¥' + (p.batchPrice > 0 ? p.batchPrice.toFixed(1) : '-') + '</div>';
        h += '</div>';
        
        // 库存（计算件数）
        h += '<div style="background:#f8f9fa;padding:6px;border-radius:6px;text-align:center">';
        h += '<div style="font-size:8px;color:#888">库存</div>';
        var specCount = getSpecCount(p.spec);
        var stockDisplay = '-';
        if (p.stock > 0) {
            var stockPieces = p.stock / specCount;
            // 大于1的取整，小于1的保留2位小数
            var piecesDisplay = stockPieces >= 1 ? Math.floor(stockPieces) : stockPieces.toFixed(2);
            stockDisplay = piecesDisplay;
        }
        h += '<div style="font-size:12px;font-weight:700;color:#666">' + stockDisplay + '</div>';
        h += '</div>';
        
        // 毛利率
        h += '<div style="background:#f8f9fa;padding:6px;border-radius:6px;text-align:center">';
        h += '<div style="font-size:8px;color:#888">毛利率</div>';
        h += '<div style="font-size:12px;font-weight:700;color:' + profitColor + '">' + p.profit.toFixed(1) + '%</div>';
        h += '</div>';
        
        // 售卖家数
        h += '<div style="background:#f8f9fa;padding:6px;border-radius:6px;text-align:center">';
        h += '<div style="font-size:8px;color:#888">采购家数</div>';
        h += '<div style="font-size:12px;font-weight:700;color:#1a73e8">' + (p.sellerCount > 0 ? p.sellerCount : '-') + '</div>';
        h += '</div>';
        
        h += '</div></div>';
    });
    
    h += '</div>';
    
    if (filtered.length === 0) h = '<div class="empty"><p>未找到匹配的产品</p></div>';
    
    document.getElementById('prdContent').innerHTML = h;
}

function setSort(sortType) {
    currentSort = sortType;
    renderProduct();
}

// 点击排序按钮显示下拉选项菜单
function showSortOptions(field) {
    event.stopPropagation();
    var existingMenu = document.getElementById('sortMenu');
    if (existingMenu) {
        existingMenu.remove();
        return;
    }
    
    var btn = event.currentTarget;
    var rect = btn.getBoundingClientRect();
    
    var menu = document.createElement('div');
    menu.id = 'sortMenu';
    menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 5) + 'px;left:' + Math.min(rect.left, window.innerWidth - 170) + 'px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;min-width:160px;padding:6px 0;';
    
    var currentField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    
    var options = field === 'sales' ? [
        {'value': 'sales_desc', 'label': '📊 销售额从高到低'},
        {'value': 'sales_asc', 'label': '📊 销售额从低到高'}
    ] : [
        {'value': 'profit_desc', 'label': '💰 毛利率从高到低'},
        {'value': 'profit_asc', 'label': '💰 毛利率从低到高'}
    ];
    
    options.forEach(function(opt) {
        var item = document.createElement('div');
        var isActive = currentSort === opt.value;
        item.style.cssText = 'padding:12px 16px;cursor:pointer;font-size:12px;' + (isActive ? 'background:#e8f0fe;color:#1a73e8;font-weight:600;' : 'color:#333;');
        item.innerHTML = opt.label + (isActive ? ' ✓' : '');
        item.onclick = function(e) {
            e.stopPropagation();
            setSort(opt.value);
            menu.remove();
        };
        item.onmouseenter = function() {
            if (!isActive) this.style.background = '#f5f5f5';
        };
        item.onmouseleave = function() {
            if (!isActive) this.style.background = '#fff';
        };
        menu.appendChild(item);
    });
    
    document.body.appendChild(menu);
    
    // 点击其他地方关闭菜单
    setTimeout(function() {
        var closeHandler = function(e) {
            var m = document.getElementById('sortMenu');
            if (m && !m.contains(e.target)) {
                m.remove();
                document.removeEventListener('click', closeHandler);
            }
        };
        document.addEventListener('click', closeHandler);
    }, 10);
}

// 产品详情弹窗
// 从规格型号中提取每件包数
function getSpecCount(spec) {
    if (!spec) return 1;
    // 匹配 "300G*20包" 或 "125g*100包" 等格式
    var match = spec.match(/\*(\d+)/);
    return match ? parseInt(match[1]) : 1;
}

function applyCustomerFilter(){
var k=document.getElementById('cSk').value.toLowerCase();
var lv=document.getElementById('cLevel').value;
var sl=document.getElementById('cSales').value;
var nd=document.getElementById('cNextDate').value;
var pf=document.getElementById('cProfitRange').value;
var today=new Date();today.setHours(0,0,0,0);
var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+(7-today.getDay()));
var monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
filteredCustomers=allCustomers.filter(function(c){
if(k&&c.name.toLowerCase().indexOf(k)<0)return false;
if(lv&&(!c.level||c.level.indexOf(lv)<0))return false;
if(sl&&c.salesman!==sl)return false;
if(nd){
if(c.nextDate){
var ndD=new Date(c.nextDate);
if(nd==='thisWeek'&&(ndD<today||ndD>weekEnd))return false;
if(nd==='thisMonth'&&(ndD<today||ndD>monthEnd))return false;
if(nd==='overdue'&&ndD>=today)return false;
if(nd==='unknown')return false;
}else{if(nd!=='unknown')return false;}
}
if(pf){
if(pf==='high'&&(c.profitRate||0)<15)return false;
if(pf==='mid'&&((c.profitRate||0)<10||(c.profitRate||0)>=15))return false;
if(pf==='low'&&(c.profitRate||0)>=10)return false;
}
return true;
});
currentPage=1;
document.getElementById('custStat').textContent='筛选结果:'+filteredCustomers.length+'个客户';
renderCustomerList();
}

function renderCustomerList(){
var start=(currentPage-1)*custPageSize;
var end=Math.min(start+custPageSize,filteredCustomers.length);
var pageData=filteredCustomers.slice(start,end);
var h='';
var todayStr=new Date().toISOString().slice(0,10);
var today=new Date();
var weekStart=new Date(today);
weekStart.setDate(today.getDate()-today.getDay());
var weekEnd=new Date(weekStart);
weekEnd.setDate(weekStart.getDate()+6);
pageData.forEach(function(c){
var lv=c.level?(c.level.indexOf('A')===0?'g':c.level.indexOf('B')===0?'y':c.level.indexOf('D')===0?'r':'b'):'b';
var isOverdue=c.nextDate&&c.nextDate<todayStr&&(!c.lastDate||c.lastDate<c.nextDate);
var isThisWeek=false;
var nextDateText='<span style="color:#999">待预测</span>';
if(c.nextDate){
var nextD=new Date(c.nextDate);
isThisWeek=nextD>=weekStart && nextD<=weekEnd;

nextDateText='<span style="color:#c5221f;font-weight:600">预计'+c.nextDate.slice(5)+'(已逾期'+overdueDays+'天)</span>';
}else if(isThisWeek){
nextDateText='<span style="color:#e37400;font-weight:700;background:#fef7e0;padding:2px 6px;border-radius:4px">📌 马上跟进('+c.nextDate.slice(5)+')</span>';
}else{
nextDateText='<span style="color:#1a73e8">预计'+c.nextDate.slice(5)+'</span>';

}
var addressStr='';
if(c.address){
addressStr=c.address;
}else if(c.name){

var monthlyAmountStr='';

monthlyAmountStr='¥'+c.monthlyAmount.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});

function loadCustomerRecs(id){
// 使用内嵌的推荐商品数据
var recsData = {};
var recs=recsData[id]||recsData["default"]||[];
if(recs.length===0){
document.getElementById('recsContainer').innerHTML='<div class="rc"><div class="rc-tt">暂无推荐商品</div></div>';
return;
}
var h='<div class="rc"><div class="rc-tt">🎁 推荐商品 ('+recs.length+'个)</div>';
recs.forEach(function(r){
// 从productsData匹配获取一批价格和售卖家数
var matchedProduct = productsData.find(function(p) { return p.name === r.name; });
if (matchedProduct) {
    if (!r.price && matchedProduct.batchPrice) r.price = matchedProduct.batchPrice;
    if (!r.sellerCount && matchedProduct.sellerCount) r.sellerCount = matchedProduct.sellerCount;
}
var typeTagClass='tag-b';
var typeBgColor='#e8f0fe';
if(r.type==='品类相关高毛利'||r.type==='品类相关高毛利产品'){
typeTagClass='tag-g';
typeBgColor='#e6f4ea';
}else if(r.type==='高复购率'||r.type==='高复购率产品'){
typeTagClass='tag-y';
typeBgColor='#fef7e0';
}else if(r.type==='行业趋势'||r.type==='行业趋势爆品'){
typeTagClass='tag-p';
typeBgColor='#f3e5f5';
}
var profitDisplay=0;
if(r.profit!==undefined){
profitDisplay=r.profit;
}else if(r.毛利率!==undefined){
profitDisplay=r.毛利率>1?r.毛利率:(r.毛利率*100);
}
var profitColor=profitDisplay>=18?'#137333':(profitDisplay>=13?'#1a73e8':'#e53935');
var priceDisplay=r.price||r.一批价格||0;
var salesCountDisplay=r.sellerCount||r.salesCount||r.售卖家数||r.购买客户数||'-';
var reasonDisplay=r.reason||r.recommend||r.reason||r.recommended||'';
if(!reasonDisplay){
if(r.type==='品类相关高毛利'||r.type==='品类相关高毛利产品'){
reasonDisplay='品类关联高毛利产品，毛利率'+profitDisplay.toFixed(1)+'%';
}else if(r.type==='高复购率'||r.type==='高复购率产品'){
reasonDisplay='高复购率爆品，'+salesCountDisplay+'个客户购买';
}else if(r.type==='行业趋势'||r.type==='行业趋势爆品'){
reasonDisplay='行业趋势爆品，冷冻食材热门品类';
}else if(r.type==='渠道适配'||r.type==='渠道适配爆品'){
reasonDisplay='渠道适配爆品(流通渠道畅销)';
}else{
reasonDisplay=r.type||'系统智能推荐';
}
}
var logicDisplay=r.logic||r.reason||r.recommend||'';
if(!logicDisplay&&r.选品逻辑){
logicDisplay=r.选品逻辑;
}
var scriptDisplay=r.script||r.话术||r.AI话术||r.推销话术||'';
if(!scriptDisplay&&r.AI润色话术){
scriptDisplay=r.AI润色话术;
}
h+='<div class="rc-i">';
h+='<div class="rc-nm"><span style="flex:1;font-weight:600;font-size:13px">'+r.name+'</span></div>';
h+='<div style="display:flex;gap:6px;margin:8px 0;flex-wrap:wrap">';
h+='<div style="flex:1;min-width:70px;padding:6px 8px;background:#f8f9fa;border-radius:6px">';
h+='<div style="font-size:10px;color:#888">一批价格</div>';
h+='<div style="font-size:14px;font-weight:700;color:#e53935">¥'+(priceDisplay>0?priceDisplay.toLocaleString():'-')+'</div>';
h+='</div>';
h+='<div style="flex:1;min-width:70px;padding:6px 8px;background:#f8f9fa;border-radius:6px">';
h+='<div style="font-size:10px;color:#888">售卖家数</div>';
h+='<div style="font-size:14px;font-weight:700;color:#1a73e8">'+(salesCountDisplay!=='-'?salesCountDisplay+'家':salesCountDisplay)+'</div>';
h+='</div>';
h+='<div style="flex:1;min-width:70px;padding:6px 8px;background:#f8f9fa;border-radius:6px">';
h+='<div style="font-size:10px;color:#888">毛利率</div>';
h+='<div style="font-size:14px;font-weight:700;color:'+profitColor+'">'+profitDisplay.toFixed(1)+'%</div>';
h+='</div>';
h+='</div>';
h+='<div style="margin-bottom:6px"><span class="tag '+typeTagClass+'" style="background:'+typeBgColor+'">'+r.type+'</span></div>';
if(reasonDisplay){
h+='<div style="background:#fff3e0;padding:6px 8px;border-radius:6px;font-size:11px;line-height:1.4;color:#e65100;margin-bottom:6px">';
h+='📌 推荐理由：'+reasonDisplay;
h+='</div>';
}
if(logicDisplay){
h+='<div class="rc-lg">📋 选品逻辑：'+logicDisplay+'</div>';
}
if(scriptDisplay){
h+='<div class="rc-sc">💬 '+scriptDisplay+'</div>';
}
h+='</div>';
});
h+='</div>';
document.getElementById('recsContainer').innerHTML=h;
}

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', function() {
    // 短key名映射（压缩数据体积）
    if (customersData.length > 0 && customersData[0].n !== undefined) {
        customersData = customersData.map(function(c) {
            return {id:c.id||'',name:c.n||'',salesman:c.s||'',level:c.l||'',monthSales:c.ms||0,profitRate:c.pr||0,margin:c.m||0,orderCount:c.oc||0,lastDate:c.ld||'',lastOrderDate:c.ld||'',warning:c.w||'',code:c.id||'',nextDate:'',advice:'',isOverdue:false};
        });
        allCustomers = customersData;
        filteredCustomers = customersData;
        DATA.customersData = customersData;
    }
    if (productsData.length > 0 && productsData[0].n !== undefined) {
        productsData = productsData.map(function(p) {
            return {name:p.n||'',category:p.c||'',monthSales:p.ms||0,profitRate:p.pr||0,margin:p.m||0,orderCount:p.oc||0,unit:p.u||'',code:'',spec:'',type:'',profit:p.m||0,sales:p.ms||0,stock:0,sellerCount:0,salesperson:'',grade:'',healthLevel:'',riskLevel:'',status:'',salesTimes:0,batchPrice:0,costPrice:0,marginSource:''};
        });
        DATA.productsData = productsData;
    }
    allCustomers = customersData;
    filteredCustomers = customersData;
    
    // 初始化产品分类选项
    var categories = {};
    productsData.forEach(function(p) { if(p.category) categories[p.category] = true; });
    var catSelect = document.getElementById('pCategory');
    if(catSelect){
        Object.keys(categories).sort().forEach(function(cat) {
            var opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            catSelect.appendChild(opt);
        });
    }
    
    // 初始渲染（可能数据还没加载）
    renderReport();
    renderProduct();
    renderCustomerFilters();
    renderCustomerList();
    
    // 立即尝试加载产品和客户数据
    if (navigator.onLine) {
        fetchCloudData();
    }
});
