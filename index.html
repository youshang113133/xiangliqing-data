<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>湘里情智营·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f7fa}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 12px;position:sticky;top:0;z-index:100}
.pg-hd h1{font-size:17px}
.pg-hd p{font-size:11px;opacity:.9}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin:12px}
.card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.vl-r{color:#e53935;font-weight:600}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;padding:6px 0}
.nav>div{flex:1;padding:10px;text-align:center;font-size:11px;color:#666}
.nav .on{color:#1a73e8;font-weight:500}
.error{color:#c5221f;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="pg-hd">
<h1>📊 湘里情智营·客户决策</h1>
<p id="status">加载中...</p>
</div>
<div id="content"></div>
<div class="nav">
<div class="on">日报</div>
<div onclick="location.reload()" style="cursor:pointer">🔄刷新</div>
</div>
<script>
var DATA_URL = 'https://testingcf.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@main/data_v202604221930.json';

async function load() {
    try {
        document.getElementById('status').textContent = '正在加载数据...';
        
        var response = await fetch(DATA_URL);
        if (!response.ok) throw new Error('网络错误: ' + response.status);
        
        var data = await response.json();
        document.getElementById('status').textContent = '数据: 云端 | 更新: ' + data.updateTime;
        
        var html = '';
        
        // 核心指标
        var kpi = data.dailyReportData.核心经营指标;
        html += '<div class="card"><div class="card-tit">📊 核心经营指标</div>';
        html += '<div class="row"><span>当日销售额</span><span class="vl-r">' + kpi.销售额.当日.toLocaleString() + ' 元</span></div>';
        html += '<div class="row"><span>月累计销售额</span><span class="vl-r">' + kpi.销售额.月累计.toLocaleString() + ' 元</span></div>';
        html += '<div class="row"><span>当日毛利率</span><span>' + (kpi.毛利率.当日 * 100).toFixed(1) + '%</span></div>';
        html += '<div class="row"><span>月累计毛利率</span><span>' + (kpi.毛利率.月累计 * 100).toFixed(1) + '%</span></div>';
        html += '<div class="row"><span>当日订单数</span><span>' + kpi.订单数.当日 + '</span></div>';
        html += '<div class="row"><span>月累计订单数</span><span>' + kpi.订单数.月累计 + '</span></div>';
        html += '</div>';
        
        // 毛利区间
        html += '<div class="card"><div class="card-tit">📈 毛利区间分布</div>';
        data.dailyReportData.毛利区间.月累计.forEach(function(item) {
            html += '<div class="row"><span>' + item.区间 + '</span><span>' + item.销售额.toLocaleString() + '元 (' + (item.占比*100).toFixed(1) + '%)</span></div>';
        });
        html += '</div>';
        
        // 产品客户数
        html += '<div class="card"><div class="card-tit">📦 数据统计</div>';
        html += '<div class="row"><span>产品数量</span><span>' + data.productsData.length + ' 个</span></div>';
        html += '<div class="row"><span>客户数量</span><span>' + data.customersData.length + ' 个</span></div>';
        html += '</div>';
        
        document.getElementById('content').innerHTML = html;
        
    } catch(e) {
        document.getElementById('status').textContent = '加载失败';
        document.getElementById('content').innerHTML = '<div class="error">错误: ' + e.message + '</div>';
    }
}

load();
</script>
</body>
</html>
