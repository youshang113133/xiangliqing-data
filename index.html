<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f7fa;font-size:14px}
.pg{display:none;padding:12px;padding-bottom:70px}
.pg.on{display:block}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 12px;position:sticky;top:0;z-index:100}
.pg-hd h1{font-size:17px}
.pg-hd p{font-size:11px;opacity:.9}
.search{padding:10px 14px;border:2px solid #e0e0e0;border-radius:20px;font-size:14px;width:100%;margin:10px 0}
.fl{display:flex;gap:6px;margin-bottom:10px}
.fl select{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row:last-child{border-bottom:none}
.lb{color:#888}
.vl{color:#333;font-weight:500}
.vl-r{color:#e53935;font-weight:600}
.vl-g{color:#137333;font-weight:600}
.it{padding:12px;border-bottom:1px solid #eee;cursor:pointer;border-radius:8px;margin-bottom:8px;background:#fff;transition:background .2s}
.it:active{background:#f0f0f0}
.it:last-child{border-bottom:none}
.it-nm{font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
.it-info{font-size:12px;color:#666;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.tag-g{background:#e6f4ea;color:#137333}
.tag-y{background:#fef7e0;color:#e37400}
.tag-r{background:#fce8e6;color:#c5221f}
.tag-b{background:#e8f0fe;color:#1a73e8}
.tag-p{background:#f3e5f5;color:#7b1fa2}
.warn{background:#fff3cd;color:#856404;padding:2px 8px;border-radius:4px;font-size:10px;display:inline-block}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;padding:6px 0}
.nav>div{flex:1;padding:10px;text-align:center;font-size:11px;color:#666;cursor:pointer;user-select:none}
.nav .on{color:#1a73e8;font-weight:500}
.nav .on::before{content:'';display:block;width:24px;height:3px;background:#1a73e8;border-radius:2px;margin:0 auto 6px}
.stat-row{display:flex;padding:12px 0;border-bottom:1px solid #eee}
.stat-item{text-align:center;flex:1}
.stat-num{font-size:22px;font-weight:700;color:#1a73e8}
.stat-lbl{font-size:10px;color:#888;margin-top:4px}
.prd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prd-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prd-nm{font-size:12px;font-weight:500;color:#333;margin-bottom:6px;line-height:1.4}
.prd-pr{color:#e53935;font-weight:700;font-size:15px}
.prd-info{font-size:10px;color:#888;margin-top:6px}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.md.on{display:flex;align-items:flex-end}
.md-ct{background:#fff;width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto}
.md-hd{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.md-tt{font-size:16px;font-weight:600;max-width:85%;line-height:1.3}
.md-cl{font-size:28px;color:#666;background:none;border:none;cursor:pointer;line-height:1;padding:0 8px}
.md-bd{padding:14px}
.rc{background:#f8f9fa;border-radius:12px;padding:12px;margin-top:14px}
.rc-tt{color:#1a73e8;font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rc-tt::before{content:'🎁';font-size:14px}
.rc-i{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.rc-i:last-child{margin-bottom:0}
.rc-nm{font-size:14px;font-weight:500;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start}
.rc-pr{color:#e53935;font-weight:700;font-size:14px;white-space:nowrap}
.rc-mt{font-size:11px;color:#666;margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap}
.rc-lg{background:#fff8e1;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;color:#795548;margin-bottom:8px}
.rc-sc{background:#e3f2fd;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;color:#1565c0}
.loading{padding:50px;text-align:center;color:#888;font-size:14px}
.loading::after{content:'';display:block;width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px;text-align:center;color:#888}
.empty::before{content:'🔍';display:block;font-size:50px;margin-bottom:12px}
.empty p{font-size:13px}
.more{text-align:center;padding:20px;color:#888;font-size:13px;cursor:pointer}
.more:active{color:#1a73e8}
.more::before{content:'⬇️ ';margin-right:6px}
.pager{text-align:center;padding:16px;color:#888;font-size:12px;background:#f8f9fa;border-radius:8px;margin-top:10px}

/* TOP10表格样式 */
.task-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.task-table th{background:#1a73e8;color:#fff;padding:8px 6px;text-align:left;font-weight:500;white-space:nowrap}
.task-table td{padding:8px 6px;border-bottom:1px solid #eee;vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:nth-child(even){background:#f8f9fa}
.task-table .num{text-align:center;font-weight:600;color:#1a73e8}
.task-table .amount{text-align:right;color:#e53935;font-weight:600}
.task-table .count{text-align:center}
.task-table .rate{text-align:center;font-weight:600}
.task-table .rate-g{color:#137333}
.task-table .rate-y{color:#e37400}
.task-table .rate-r{color:#c5221f}
.task-table .name{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 推荐卡片样式 */
.task-recommend-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-top:12px}
.task-recommend-card .card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.task-recommend-item{padding:10px 0;border-bottom:1px solid #eee}
.task-recommend-item:last-child{border-bottom:none}
.task-recommend-title{font-size:13px;font-weight:500;color:#333;margin-bottom:6px}
.task-recommend-info{font-size:11px;color:#666;display:flex;flex-wrap:wrap;gap:8px}
.task-recommend-tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500}

</style>

<script>
// 页面加载时自动获取云端数据
document.addEventListener('DOMContentLoaded', async function() {
  console.log('页面加载完成，开始获取云端数据...');
  document.getElementById('rptDate').textContent = '数据加载中...';
  try {
    await fetchCloudData();
    console.log('数据加载完成，刷新页面');
  } catch(e) {
    console.log('数据加载失败:', e);
    // 即使失败也尝试渲染
    if (dailyReportData) renderReport();
  }
});
</script>
</head>
<body>

<!-- 日报页 -->
<div id="pgReport" class="pg on">
<div class="pg-hd" style="position:relative"><h1>📊 湘里情智营·客户决策</h1><p id="rptDate"></p><div id="dataStatusBar" style="font-size:10px;color:#fff;opacity:0.8;margin-top:4px;padding:4px 0;"></div><button onclick="forceRefresh()" style="position:absolute;top:10px;right:10px;padding:6px 12px;background:#fff;color:#1a73e8;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">🔄 刷新</button></div>

</div>

<!-- 任务跟进页 -->

    <div class="card-tit">🎯 推荐跟进客户</div>

  </div>
</div>
<!-- 详情弹窗 -->
<div id="md" class="md" onclick="closeMd()">

<div class="md-hd"><div class="md-tt" id="mdTt"></div><button class="md-cl" onclick="closeMd()">×</button></div>

</div>

<!-- 底部导航 -->

<!-- 刷新按钮 -->
<div style="position:fixed;top:60px;right:12px;z-index:99;">
  <button onclick="manualRefreshData()" style="background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    🔄 刷新数据
  </button>
</div>

<script>

// ===== 双模式数据加载系统 =====
// 使用commit hash确保CDN加载最新版本
var DATA_COMMIT = "c4335c1"
var DATA_URL = "https://cdn.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@" + DATA_COMMIT + "/data_core.json"
var RECS_URL = "https://cdn.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@" + DATA_COMMIT + "/data_recs.json"

// 全局数据变量初始化（等待云端加载）
var dailyReportData = null;
var salesProgressData = [];
var productsData = [];
var customersData = [];
var recsData = {};
var productPortraitData = {};
var salesmanMarginRange = {};
var productSalesmen = {};
var channelTypeMap = {};
var recsDataLoaded = false;

// 异步加载推荐数据
async function fetchRecsData() {
  try {
    var response = await fetch(RECS_URL + "?t=" + Date.now(), {
      method: 'GET',
      headers: {'Accept': 'application/json'},
      signal: AbortSignal.timeout(300000)
    });
    if (response.ok) {
      var recsDataRes = await response.json();
      recsData = recsDataRes.recsData || {};
      recsDataLoaded = true;
      console.log('推荐数据加载完成');
    }
  } catch(e) {
    console.log('推荐数据加载失败:', e);
  }
}
; // 请替换为实际云端地址
var dataSource = 'cloud'; // 'embedded' 或 'cloud'
var dataUpdateTime = "2026-04-24 08:10:00"; '2026-04-24 08:00:00';

// 强制刷新数据
async function forceRefresh() {
  var btn = event.target;
  btn.textContent = '刷新中...';
  btn.disabled = true;
  
  try {
    // 清除CDN缓存
    await fetch('https://purge.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@main/data_core.json');
    await fetch('https://purge.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@main/data_recs.json');
    await fetch('https://purge.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@main/index.html');
    
    // 延迟后重新加载页面
    setTimeout(function() {
      location.href = location.pathname + '?t=' + Date.now();
    }, 1000);
  } catch(e) {
    alert('刷新失败，请手动刷新页面');
    btn.textContent = '🔄 刷新';
    btn.disabled = false;
  }
}

// 尝试从云端获取数据
async function fetchCloudData() {
  try {
    // 先加载核心数据
    var response = await fetch(DATA_URL + "?t=" + Date.now(), {
      method: 'GET',
      headers: {'Accept': 'application/json'},
      signal: AbortSignal.timeout(180000)
    });
    if (response.ok) {
      var cloudData = await response.json();
      // 异步加载推荐数据（不阻塞页面渲染）
      fetchRecsData();
      // 更新全局数据变量
      if (cloudData.productsData) productsData = cloudData.productsData;
      if (cloudData.customersData) customersData = cloudData.customersData;
      if (cloudData.recsData) recsData = cloudData.recsData;
      if (cloudData.productPortraitData) productPortraitData = cloudData.productPortraitData;
      if (cloudData.productSalesmen) productSalesmen = cloudData.productSalesmen;
      // 已改用customersData（4247个客户），不再使用allCustomers（267个）
      if (cloudData.dailyReportData) {
      dailyReportData = cloudData.dailyReportData;
      // 补充缺失字段
      if (!dailyReportData['核心经营指标']['亏损订单数']) {
        dailyReportData['核心经营指标']['亏损订单数'] = {'当日': 0, '月累计': 0, '预警': ''};
      }
      if (!dailyReportData['核心经营指标']['亏损金额']) {
        dailyReportData['核心经营指标']['亏损金额'] = {'当日': 0, '月累计': 0};
      }
      if (!dailyReportData['核心经营指标']['成本']) {
        dailyReportData['核心经营指标']['成本'] = {
          '当日': dailyReportData['核心经营指标']['销售额']['当日'] - dailyReportData['核心经营指标']['毛利额']['当日'],
          '月累计': dailyReportData['核心经营指标']['销售额']['月累计'] - dailyReportData['核心经营指标']['毛利额']['月累计']
        };
      }
      // 补充达标字段
      if (!dailyReportData['核心经营指标']['毛利率']['当日达标']) {
        dailyReportData['核心经营指标']['毛利率']['当日达标'] = dailyReportData['核心经营指标']['毛利率']['当日'] >= 0.13;
      }
      if (!dailyReportData['核心经营指标']['毛利率']['月累计达标']) {
        dailyReportData['核心经营指标']['毛利率']['月累计达标'] = dailyReportData['核心经营指标']['毛利率']['月累计'] >= 0.13;
      }
      if (!dailyReportData['核心经营指标']['销售额']['目标完成率']) {
        dailyReportData['核心经营指标']['销售额']['目标完成率'] = dailyReportData['核心经营指标']['销售额']['月累计'] / 17500000; // 假设月目标1750万
      }
    }
      // 加载业务员毛利区间数据
      if (cloudData.salesmanMarginRange) salesmanMarginRange = cloudData.salesmanMarginRange;
      
      if (cloudData.salesProgressData) {
      // 转换字段名以匹配页面代码
      // 先转换个人数据
      var tempProgress = cloudData.salesProgressData.map(function(item) {
        return {
          '区域': item.region || '长株潭业务部',
          '业务经理': item.name,
          '月销售额': item.sales,
          '月度目标': item.target,
          '完成进度': item.progress + '%',
          '月累计毛利率': item.margin,
          '月累计达标': item.progress >= 100 ? '✅' : ''
        };
      });
      
      // 按区域分组计算小计
      var regions = ['省外业务部', '省内业务部', '长株潭业务部', '大客户部'];
      regions.forEach(function(region) {
        var regionItems = tempProgress.filter(function(p) { return p['区域'] === region; });
        if (regionItems.length > 0) {
          var subSales = regionItems.reduce(function(sum, p) { return sum + (p['月销售额'] || 0); }, 0);
          var subTarget = regionItems.reduce(function(sum, p) { return sum + (p['月度目标'] || 0); }, 0);
          var subMargin = regionItems.reduce(function(sum, p) { return sum + (p['月累计毛利率'] || 0) * (p['月销售额'] || 0); }, 0) / (subSales || 1);
          var subProgress = subTarget > 0 ? (subSales / subTarget * 100).toFixed(1) : 0;
          tempProgress.push({
            '区域': region,
            '业务经理': '小计',
            '月销售额': subSales,
            '月度目标': subTarget,
            '完成进度': subProgress + '%',
            '月累计毛利率': subMargin,
            '月累计达标': subProgress >= 100 ? '✅' : ''
          });
        }
      });
      
      // 【修复1】公司合计改用dailyReportData中的月累计销售额，确保与月累计数据一致
      var companyTotal = dailyReportData['核心经营指标']['销售额']['月累计'];
      var companyMargin = dailyReportData['核心经营指标']['毛利率']['月累计'];
      tempProgress.push({
        '区域': '公司合计',
        '业务经理': '公司合计',
        '月销售额': companyTotal,
        '月度目标': 17500000,
        '完成进度': (companyTotal / 17500000 * 100).toFixed(1) + '%',
        '月累计毛利率': companyMargin,
        '月累计达标': ''
      });
      
      salesProgressData = tempProgress;
    }
      if (cloudData.channelTypeMap) channelTypeMap = cloudData.channelTypeMap;
      
      dataSource = 'cloud';
      dataUpdateTime = "2026-04-24 08:10:00"; cloudData.updateTime || new Date().toLocaleString();
      console.log('✅ 云端数据加载成功，更新时间：' + dataUpdateTime);
      
      // 更新状态栏
      updateDataStatus();
      
      // 刷新当前页面
      refreshCurrentPage();
    }
  } catch (e) {
    console.log('⚠️ 云端数据获取失败，使用本地数据：' + e.message);
  }
}

// 刷新当前页面
function refreshCurrentPage() {
  var activeTab = document.querySelector('.pg.on');
  if (activeTab) {
    var tabId = activeTab.id;
    if (tabId === 'pgReport') renderReport();
    if (tabId === 'pgProduct') renderProduct();
    if (tabId === 'pgCustomer') loadCustomerList();
  }
}

// 更新数据状态栏
function updateDataStatus() {
  var statusBar = document.getElementById('dataStatusBar');
  if (statusBar) {
    var onlineIcon = navigator.onLine ? '🟢' : '🔴';
    var sourceIcon = dataSource === 'cloud' ? '☁️' : '📦';
    statusBar.innerHTML = sourceIcon + ' 数据: ' + (dataSource === 'cloud' ? '云端' : '本地') + 
                          ' | ' + onlineIcon + ' 网络: ' + (navigator.onLine ? '在线' : '离线') + 
                          ' | 更新时间: ' + dataUpdateTime;
  }
}

// 初始化：先使用本地数据，然后尝试获取云端更新
(function initDualMode() {
  updateDataStatus();
  if (navigator.onLine) {
    fetchCloudData();
  }
})();

// 监听网络状态变化

function renderReport() {
    var data = dailyReportData;
    var progress = salesProgressData;

    }

    var h = '';

    // ===== 1. 核心经营指标 =====

    h += '<div style="background:#f8f9fa;padding:10px;border-radius:8px">';
    h += '<div style="font-size:11px;color:#888;margin-bottom:6px">当日数据</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + fmtAmt(data['核心经营指标']['销售额']['当日']) + '</div><div style="font-size:10px;color:#888">销售额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(data['核心经营指标']['毛利额']['当日']) + '</div><div style="font-size:10px;color:#888">毛利额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:' + (data['核心经营指标']['毛利率']['当日达标'] ? '#137333' : '#e53935') + '">' + (data['核心经营指标']['毛利率']['当日'] * 100).toFixed(1) + '%</div><div style="font-size:10px;color:#888">毛利率</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + data['核心经营指标']['订单数']['当日'] + '</div><div style="font-size:10px;color:#888">订单数</div></div>';
    h += '</div></div>';
    
    // 月累计指标
    h += '<div style="background:#e8f0fe;padding:10px;border-radius:8px">';
    h += '<div style="font-size:11px;color:#1a73e8;margin-bottom:6px">月累计</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + fmtAmt(data['核心经营指标']['销售额']['月累计']) + '</div><div style="font-size:10px;color:#888">销售额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(data['核心经营指标']['毛利额']['月累计']) + '</div><div style="font-size:10px;color:#888">毛利额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:' + (data['核心经营指标']['毛利率']['月累计达标'] ? '#137333' : '#e53935') + '">' + (data['核心经营指标']['毛利率']['月累计'] * 100).toFixed(1) + '%</div><div style="font-size:10px;color:#888">毛利率</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + data['核心经营指标']['订单数']['月累计'] + '</div><div style="font-size:10px;color:#888">订单数</div></div>';
    h += '</div></div>';
    h += '</div>';

    // 亏损预警
    if (data['核心经营指标']['亏损订单数']['预警']) {
        h += '<div style="margin-top:10px;padding:8px 10px;background:#fff3cd;border-radius:6px;font-size:12px;color:#856404">';
        h += '⚠️ 亏损订单: 今日' + data['核心经营指标']['亏损订单数']['当日'] + '单, 月累计' + data['核心经营指标']['亏损订单数']['月累计'] + '单';
        h += '</div>';
    }
    h += '</div>';

    // ===== 2. 毛利区间分布 =====
    h += '<div class="card"><div class="card-tit">📈 毛利区间分布（当日）</div>';
    h += '<div style="overflow-x:auto">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:11px">';
    h += '<tr style="background:#1a73e8;color:#fff">';
    h += '<th style="padding:8px 4px;text-align:left">区间</th>';
    h += '<th style="padding:8px 4px;text-align:right">销售额</th>';
    h += '<th style="padding:8px 4px;text-align:right">占比</th>';
    h += '<th style="padding:8px 4px;text-align:right">目标</th>';
    h += '<th style="padding:8px 4px;text-align:center">状态</th>';
    h += '</tr>';
    
    data['毛利区间']['当日'].forEach(function(item) {
        var isWarn = item['预警'] && item['预警'].indexOf('预警') >= 0;
        var bgColor = isWarn ? '#fff3cd' : (item['预警'] && item['预警'].indexOf('正常') >= 0 ? '#e6f4ea' : '');
        h += '<tr style="background:' + bgColor + ';border-bottom:1px solid #eee">';
        h += '<td style="padding:8px 4px">' + item['区间'] + '</td>';
        h += '<td style="padding:8px 4px;text-align:right;font-weight:500">' + fmtAmt(item['销售额']) + '</td>';
        h += '<td style="padding:8px 4px;text-align:right">' + (item['占比'] * 100).toFixed(1) + '%</td>';
        h += '<td style="padding:8px 4px;text-align:right;color:#888">' + (item['目标占比'] * 100).toFixed(0) + '%</td>';
        h += '<td style="padding:8px 4px;text-align:center;font-size:12px">' + item['预警'] + '</td>';
        h += '</tr>';
    });
    h += '</table></div></div>';

    // ===== 3. 销售目标进度 =====
    h += '<div class="card"><div class="card-tit">🎯 销售目标进度（月累计）</div>';

    var regions = ['省外业务部', '省内业务部', '长株潭业务部', '大客户部'];
    regions.forEach(function(region) {
        var regionData = progress.filter(function(p) { return p['区域'] === region; });
        if (regionData.length === 0) return;
        
        var subtotal = regionData.find(function(p) { return p['业务经理'] === '小计'; });
        if (subtotal) {
            var subProgress = parseFloat(subtotal['完成进度'].replace('%','')).toFixed(1);
            var subColor = parseFloat(subtotal['月累计毛利率']) >= 13 ? '#137333' : '#e53935';
            h += '<div style="background:#e8f0fe;padding:10px;margin-bottom:10px;border-radius:8px">';
            h += '<div style="display:flex;justify-content:space-between;align-items:center">';
            h += '<span style="font-weight:600;color:#1a73e8">' + region + '</span>';
            h += '<span style="font-size:12px">';
            h += '' + fmtAmt(subtotal['月销售额']) + ' | 进度 <b style="color:#1a73e8">' + subProgress + '%</b> | 毛利 <b style="color:' + subColor + '">' + (subtotal['月累计毛利率'] * 100).toFixed(1) + '%</b>';
            h += '</span></div>';
            h += '<div style="margin-top:6px;height:8px;background:#fff;border-radius:4px;overflow:hidden">';
            h += '<div style="height:100%;width:' + Math.min(subProgress, 100) + '%;background:linear-gradient(90deg,#1a73e8,#0d47a1);border-radius:4px"></div>';
            h += '</div>';
            h += '</div>';
        }

        regionData.filter(function(p) { return p['业务经理'] !== '小计' && p['业务经理'] !== '公司合计'; }).forEach(function(p) {
            var pProgress = parseFloat(p['完成进度']) || 0;
            var pColor = parseFloat(p['月累计毛利率']) >= 13 ? '#137333' : '#e53935';
            var isWang = p['月累计达标'] === '✅';
            
            h += '<div style="padding:8px 0;border-bottom:1px solid #f0f0f0">';
            h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
            h += '<span style="font-weight:500;font-size:12px;cursor:pointer;color:#1a73e8" onclick="showSalesmanAdvice(\'' + p['业务经理'] + '\')">' + p['业务经理'] + '</span>';
            h += '<span style="font-size:11px">' + fmtAmt(p['月销售额']) + ' / ' + fmtAmt(p['月度目标']) + ' ' + p['月累计达标'] + '</span></div>';
            h += '<div style="height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden">';
            h += '<div style="height:100%;width:' + Math.min(pProgress, 100) + '%;background:' + (isWang ? '#137333' : '#f57c00') + ';border-radius:3px"></div>';
            h += '</div>';
            h += '<div style="font-size:10px;color:#888;margin-top:2px">进度' + pProgress + '% | 毛利 <span style="color:' + pColor + '">' + (typeof p['月累计毛利率'] === 'number' ? (p['月累计毛利率'] * 100).toFixed(1) + '%' : p['月累计毛利率']) + '</span></div>';
            h += '</div>';
        });
    });

    var total = progress.find(function(p) { return p['业务经理'] === '公司合计'; });
    if (total) {
        var tProgress = parseFloat(total['完成进度']) || 0;
        h += '<div style="background:#fce8e6;padding:12px;margin-top:10px;border-radius:8px">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center">';
        h += '<span style="font-weight:700;color:#c5221f">公司合计</span>';
        h += '<span style="font-size:13px">' + fmtAmt(total['月销售额']) + ' / ' + fmtAmt(total['月度目标']) + '</span></div>';
        h += '<div style="margin-top:8px;height:10px;background:#fff;border-radius:5px;overflow:hidden">';
        h += '<div style="height:100%;width:' + Math.min(tProgress, 100) + '%;background:linear-gradient(90deg,#c5221f,#e53935);border-radius:5px"></div>';
        h += '</div>';
        h += '<div style="text-align:center;margin-top:6px;font-size:12px;font-weight:600;color:#c5221f">完成进度: ' + tProgress + '%</div>';
        h += '</div>';
    }
    h += '</div>';

    document.getElementById('rptContent').innerHTML = h;
}

function fmtAmt(amt) {
    if (typeof amt !== 'number') return amt || '0';
    if (amt >= 10000) return (amt / 10000).toFixed(1) + 'w';
    return amt.toLocaleString('zh-CN', {maximumFractionDigits: 0});
}

// 点击排序按钮显示下拉选项菜单
function showSortOptions(field) {
    event.stopPropagation();
    var existingMenu = document.getElementById('sortMenu');
    if (existingMenu) {
        existingMenu.remove();
        return;
    }
    
    var btn = event.currentTarget;
    var rect = btn.getBoundingClientRect();
    
    var menu = document.createElement('div');
    menu.id = 'sortMenu';
    menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 5) + 'px;left:' + Math.min(rect.left, window.innerWidth - 170) + 'px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;min-width:160px;padding:6px 0;';
    
    var currentField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    
    var options = field === 'sales' ? [
        {'value': 'sales_desc', 'label': '📊 销售额从高到低'},
        {'value': 'sales_asc', 'label': '📊 销售额从低到高'}
    ] : [
        {'value': 'profit_desc', 'label': '💰 毛利率从高到低'},
        {'value': 'profit_asc', 'label': '💰 毛利率从低到高'}
    ];
    
    options.forEach(function(opt) {
        var item = document.createElement('div');
        var isActive = currentSort === opt.value;
        item.style.cssText = 'padding:12px 16px;cursor:pointer;font-size:12px;' + (isActive ? 'background:#e8f0fe;color:#1a73e8;font-weight:600;' : 'color:#333;');
        item.innerHTML = opt.label + (isActive ? ' ✓' : '');
        item.onclick = function(e) {
            e.stopPropagation();
            setSort(opt.value);
            menu.remove();
        };
        item.onmouseenter = function() {
            if (!isActive) this.style.background = '#f5f5f5';
        };
        item.onmouseleave = function() {
            if (!isActive) this.style.background = '#fff';
        };
        menu.appendChild(item);
    });
    
    document.body.appendChild(menu);
    
    // 点击其他地方关闭菜单
    setTimeout(function() {
        var closeHandler = function(e) {
            var m = document.getElementById('sortMenu');
            if (m && !m.contains(e.target)) {
                m.remove();
                document.removeEventListener('click', closeHandler);
            }
        };
        document.addEventListener('click', closeHandler);
    }, 10);
}

// 产品详情弹窗
// 从规格型号中提取每件包数
function getSpecCount(spec) {
    if (!spec) return 1;
    // 匹配 "300G*20包" 或 "125g*100包" 等格式
    var match = spec.match(/\*(\d+)/);
    return match ? parseInt(match[1]) : 1;
}

function applyCustomerFilter(){
var k=document.getElementById('cSk').value.toLowerCase();
var lv=document.getElementById('cLevel').value;
var sl=document.getElementById('cSales').value;
var nd=document.getElementById('cNextDate').value;
var pf=document.getElementById('cProfitRange').value;
var ct=document.getElementById('cType').value;
var today=new Date();today.setHours(0,0,0,0);
var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+(7-today.getDay()));
var monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
filteredCustomers=allCustomers.filter(function(c){
if(k&&c.name.toLowerCase().indexOf(k)<0)return false;
if(lv&&(!c.level||c.level.indexOf(lv)<0))return false;
if(sl&&c.salesman!==sl)return false;
if(nd){
if(c.nextDate){
var ndD=new Date(c.nextDate);
if(nd==='thisWeek'&&(ndD<today||ndD>weekEnd))return false;
if(nd==='thisMonth'&&(ndD<today||ndD>monthEnd))return false;
if(nd==='overdue'&&ndD>=today)return false;
if(nd==='unknown')return false;
}else{if(nd!=='unknown')return false;}
}
if(pf){
if(pf==='high'&&(c.profitRate||0)<15)return false;
if(pf==='mid'&&((c.profitRate||0)<10||(c.profitRate||0)>=15))return false;
if(pf==='low'&&(c.profitRate||0)>=10)return false;
}
if(ct&&c.type!==ct)return false;
return true;
});
currentPage=1;
document.getElementById('custStat').textContent='筛选结果:'+filteredCustomers.length+'个客户';
renderCustomerList();

}

// 初始化任务页面
function initTaskPage() {
    // 填充业务员下拉框
    var select = document.getElementById('taskManagerSelect');
    select.innerHTML = '<option value="">请选择</option>';
    
    // 获取所有业务经理（排除小计和公司合计）
    var managers = [];
    var regionSet = new Set();
    
    salesProgressData.forEach(function(item) {
        var name = item['业务经理'];
        if (name && name !== '小计' && name !== '公司合计') {
            if (!managers.includes(name)) {
                managers.push(name);
            }
        }
    });
    
    managers.sort();
    managers.forEach(function(name) {
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    });
    
    // 默认选中第一个
    if (managers.length > 0) {
        select.value = managers[0];
        renderTaskManager();
    }
}

// 渲染选中业务经理的任务情况
function renderTaskManager() {
    var managerName = document.getElementById('taskManagerSelect').value;
    var taskOverview = document.getElementById('taskOverview');
    var taskTop10Card = document.getElementById('taskTop10Card');
    var taskRecommendCard = document.getElementById('taskRecommendCard');
    
    if (!managerName) {
        taskOverview.style.display = 'none';
        taskTop10Card.style.display = 'none';
        if (taskRecommendCard) taskRecommendCard.style.display = 'none';
        return;
    }
    
    // 优先从 taskManagerData 获取数据
    var managerTaskData = taskManagerData.salesman_data[managerName];
    
    // 从 salesProgressData 获取月销售数据
    var managerSalesData = salesProgressData.find(function(item) {
        return item['业务经理'] === managerName;
    });
    
    if (!managerSalesData && !managerTaskData) {
        taskOverview.style.display = 'none';
        taskTop10Card.style.display = 'none';
        if (taskRecommendCard) taskRecommendCard.style.display = 'none';
        return;
    }
    
    taskOverview.style.display = 'block';
    taskTop10Card.style.display = 'block';
    
    // 更新任务概览 - 使用 salesProgressData 中的月销售额
    var targetAmount = managerSalesData ? (managerSalesData['月度目标'] / 10000).toFixed(1) : '--';
    var finishedAmount = managerSalesData ? (managerSalesData['月销售额'] / 10000).toFixed(1) : '--';
    var progress = managerSalesData ? managerSalesData['完成进度'] : '--';
    
    document.getElementById('taskTargetAmount').textContent = targetAmount;
    
    // 渲染TOP10客户表格
    renderTaskTop10Customers(managerName);
}

// 渲染TOP10客户完成情况（表格形式）
function renderTaskTop10Customers(managerName) {
    var container = document.getElementById('taskTop10Customers');
    
    // 从 taskManagerData 获取该业务经理的TOP10客户数据
    var managerData = taskManagerData.salesman_data[managerName];
    if (!managerData || !managerData.customers) {
        container.innerHTML = '<div class="empty"><p>暂无客户数据</p></div>';
        return;
    }
    
    var customers = managerData.customers.slice(0, 10); // 取前10个客户
    
    if (customers.length === 0) {
        container.innerHTML = '<div class="empty"><p>暂无客户数据</p></div>';
        return;
    }
    
    // 获取该业务员的件数目标
    var totalTarget = taskTargetsData[managerName] || 0;
    
    // 计算TOP10客户总销售额
    var totalAmount = customers.reduce(function(sum, c) { return sum + (c.amount || 0); }, 0);
    
    // 生成表格HTML - 新增件数目标、完成、完成率列
    var html = '<table class="task-table">';
    html += '<thead><tr>';
    html += '<th style="width:30px">排名</th>';
    html += '<th>客户名称</th>';
    html += '<th style="text-align:right">销售额</th>';
    html += '<th style="text-align:center">目标</th>';
    html += '<th style="text-align:center">完成</th>';
    html += '<th style="text-align:center">完成率</th>';
    html += '</tr></thead>';
    html += '<tbody>';
    
    customers.forEach(function(customer, index) {
        var name = customer.customer || '未知';
        var amount = customer.amount || 0;
        var count = customer.count || 0;
        
        // 按销售额占比分配目标件数
        var customerTargetRatio = totalAmount > 0 ? (amount / totalAmount) : 0;
        var customerTarget = Math.round(totalTarget * customerTargetRatio);
        var customerCompleted = count;
        var completionRate = customerTarget > 0 ? (customerCompleted / customerTarget * 100).toFixed(0) : 0;
        
        // 截断过长的客户名称
        var displayName = name.length > 12 ? name.substring(0, 12) + '...' : name;
        
        // 根据完成率设置颜色
        var rateClass = 'rate';
        var rateColor = '';
        if (completionRate >= 100) {
            rateClass = 'rate rate-g';
            rateColor = 'color:#137333';
        } else if (completionRate >= 50) {
            rateClass = 'rate rate-y';
            rateColor = 'color:#e37400';
        } else {
            rateClass = 'rate rate-r';
            rateColor = 'color:#c5221f';
        }
        
        html += '<tr>';
        html += '<td class="num">' + (index + 1) + '</td>';
        html += '<td class="name" title="' + name + '">' + displayName + '</td>';
        html += '<td class="amount">' + amount.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + '</td>';
        html += '<td class="count">' + customerTarget.toLocaleString() + '</td>';
        html += '<td class="count">' + customerCompleted.toLocaleString() + '</td>';
        html += '<td class="' + rateClass + '" style="' + rateColor + '">' + completionRate + '%</td>';
        html += '</tr>';
    });
    
    html += '</tbody></table>';
    
    // 计算合计
    var sumCount = customers.reduce(function(sum, c) { return sum + (c.count || 0); }, 0);
    var avgCompletionRate = totalTarget > 0 ? (sumCount / totalTarget * 100).toFixed(0) : 0;
    
    html += '<div style="margin-top:10px;padding:8px;background:#f0f4ff;border-radius:6px;font-size:12px;color:#1a73e8;text-align:center">';
    html += 'TOP10汇总 金额:<strong>' + totalAmount.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + '</strong> ';
    html += '目标:<strong>' + totalTarget.toLocaleString() + '</strong>件 ';
    html += '完成:<strong>' + sumCount.toLocaleString() + '</strong>件 ';
    html += '完成率:<strong>' + avgCompletionRate + '%</strong>';
    html += '</div>';
    
    container.innerHTML = html;
    
    // 调用推荐客户
    renderTaskRecommendCustomers(managerName, managerData);
}

function renderTaskRecommendCustomers(managerName, managerData) {
    var container = document.getElementById('taskRecommendList');
    var recommendCard = document.getElementById('taskRecommendCard');
    
    // 从POI数据中筛选推荐客户
    var districts = salesmanPOIMapping[managerName] || ['雨花区', '长沙县'];
    
    // 筛选该业务员的区域匹配的POI门店
    var matchedPOI = poiRecommendData.filter(function(poi) {
        return districts.indexOf(poi.district) >= 0;
    });
    
    // 优先推荐：农贸市场、生鲜超市、冷冻冷链、食材类型
    var priorityTypes = ['农贸市场', '生鲜', '冷冻', '食材', '仓储', '批发', '超市'];
    var priorityPOI = [];
    var otherPOI = [];
    
    matchedPOI.forEach(function(poi) {
        var isPriority = priorityTypes.some(function(t) {
            return poi.name.indexOf(t) >= 0 || poi.type.indexOf(t) >= 0;
        });
        if (isPriority) {
            priorityPOI.push(poi);
        } else {
            otherPOI.push(poi);
        }
    });
    
    // 合并：优先取前5个优先级高的，再取其他类型补充到10个
    var recommends = priorityPOI.slice(0, 8).concat(otherPOI.slice(0, 5)).slice(0, 10);
    
    if (recommends.length === 0) {
        recommendCard.style.display = 'none';
        return;
    }
    
    recommendCard.style.display = 'block';
    
    var html = '';
    html += '<div style="margin-bottom:12px;padding:8px;background:#fff3e0;border-radius:6px;font-size:11px;color:#e65100">';
    html += '💡 根据您负责的区域，从高德POI数据中筛选潜在客户';
    html += '</div>';
    
    recommends.forEach(function(poi, index) {
        var name = poi.name || '未知';
        var address = poi.address || '地址未知';
        var phone = poi.phone || '电话未知';
        var district = poi.district || '';
        var type = poi.type || '门店';
        
        // 判断门店类型
        var tagClass = 'tag-b';
        var tagText = '普通门店';
        if (poi.name.indexOf('农贸市场') >= 0 || poi.name.indexOf('批发') >= 0) {
            tagClass = 'tag-g';
            tagText = '农贸批发';
        } else if (poi.name.indexOf('生鲜') >= 0 || poi.name.indexOf('超市') >= 0) {
            tagClass = 'tag-y';
            tagText = '生鲜超市';
        } else if (poi.name.indexOf('冷冻') >= 0 || poi.name.indexOf('食材') >= 0) {
            tagClass = 'tag-r';
            tagText = '冷冻食材';
        } else if (poi.name.indexOf('餐饮') >= 0 || poi.name.indexOf('餐厅') >= 0) {
            tagClass = 'tag-p';
            tagText = '餐饮门店';
        }
        
        // 截断地址
        var displayAddress = address.length > 25 ? address.substring(0, 25) + '...' : address;
        
        html += '<div class="task-recommend-item">';
        html += '<div class="task-recommend-title">📍 ' + name + '</div>';
        html += '<div class="task-recommend-info">';
        html += '<span class="task-recommend-tag ' + tagClass + '">' + tagText + '</span>';
        html += '<span>区域: <strong>' + district + '</strong></span>';
        html += '</div>';
        html += '<div style="font-size:11px;color:#666;margin-top:6px">';
        html += '<div>📍 ' + displayAddress + '</div>';
        if (phone && phone !== 'nan' && phone !== '电话未知') {
            html += '<div>📞 ' + phone + '</div>';
        }
        html += '</div>';
        html += '</div>';
    });
    
    container.innerHTML = html;
}
