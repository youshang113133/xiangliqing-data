    localStorage.clear();
    
    // 强制重新加载（带时间戳）

    window.location.href = window.location.pathname + '?t=' + timestamp;
}

// 页面加载时检查版本
window.addEventListener('load', function() {

        localStorage.setItem('dataVersion', currentVersion);

});

// 页面加载完成后自动加载外部数据
setTimeout(loadExternalData, 100);

<script>


// ===== 双模式数据加载系统 =====
var DATA_URL_PRODUCTS = './data_products.json';
var DATA_URL_CUSTOMERS = './data_customers.json';
var DATA_URL_CORE = './data_core_lite.json'; // 请替换为实际云端地址
var dataSource = 'embedded';  // 数据已嵌入HTML // 'embedded' 或 'cloud'
var dataUpdateTime = DATA.updateTime || '';

// 尝试从云端获取数据
async function fetchCloudData(){console.log("fetchCloudData skipped, using loadExtraData");}

// 刷新当前页面
function refreshCurrentPage() {
  var activeTab = document.querySelector('.pg.on');
  if (activeTab) {
    var tabId = activeTab.id;
    if (tabId === 'pgReport') renderReport();
    if (tabId === 'pgProduct') renderProduct();

}

// 更新数据状态栏
function updateDataStatus() {
  var statusBar = document.getElementById('dataStatusBar');
  if (statusBar) {
    var onlineIcon = navigator.onLine ? '🟢' : '🔴';
    var sourceText = dataSource === 'cloud' ? '☁️ 云端' : '📦 嵌入';
    statusBar.innerHTML = '数据: ' + sourceText + 
                          ' | ' + onlineIcon + ' 网络: ' + (navigator.onLine ? '在线' : '离线') + 
                          ' | 更新时间: ' + dataUpdateTime;
  }
}

// 初始化：使用嵌入数据，云端更新可选
(function initDualMode() {
  // 从嵌入的DATA加载数据
  if (DATA.productsData) productsData = DATA.productsData;
  if (DATA.customersData) customersData = DATA.customersData;
  if (DATA.dailyReportData) dailyReportData = DATA.dailyReportData;
  if (DATA.salesProgressData) salesProgressData = DATA.salesProgressData;
  if (DATA.channelTypeMap) channelTypeMap = DATA.channelTypeMap;
  if (DATA.productPortraitData) productPortraitData = DATA.productPortraitData;
  if (DATA.productSalesmen) productSalesmen = DATA.productSalesmen;
  dataUpdateTime = DATA.updateTime || '';
  updateDataStatus();
})();

// 监听网络状态变化
window.addEventListener('online', function() {
  console.log('🟢 网络已连接，尝试更新数据...');
  updateDataStatus();
  fetchCloudData();
});

window.addEventListener('offline', function() {
  console.log('🔴 网络已断开，使用本地数据');
  updateDataStatus();
});

// 手动刷新数据
function manualRefreshData() {
  if (navigator.onLine) {
    console.log('手动刷新数据...');
    fetchCloudData();
  } else {
    alert('当前网络不可用，请检查网络连接');
  }
}



// ===== 全局变量 =====
var allCustomers = [];
var filteredCustomers=[]; // 筛选后的客户
var displayedCount=50;   // 每页显示数量
var currentPage=1;
var custPageSize=50;

// ===== 页面切换 =====
function switchTab(tab){
document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
document.querySelectorAll('.nav>div').forEach(n=>n.classList.remove('on'));
document.getElementById('pg'+tab).classList.add('on');
document.getElementById('nav'+tab).classList.add('on');
if(tab==='Report')renderReport();
if(tab==='Product'){if(productsData.length>0&&productsData[0].name){renderProduct();}else if(productsData.length===0){loadExtraData('Product');}else{loadExtraData('Product');}}
if(tab==='Customer'){if(customersData.length===0||!customersData[0].name){loadExtraData('Customer');}else{loadCustomerList();}}
}

// ===== COS增量数据加载 =====
var COS_BASE='https://xiangliqing-data-1423818390.cos.ap-guangzhou.myqcloud.com/';
var _dataLoading=false;

function loadExtraData(tab){
  if(_dataLoading)return;
  _dataLoading=true;
  var el=document.getElementById(tab==='Product'?'prdContent':'custContent');
  if(el)el.innerHTML='<div style="text-align:center;padding:40px;color:#666"><div class="spinner" style="margin:0 auto 16px;width:32px;height:32px;border:3px solid #e0e0e0;border-top:3px solid #1a73e8;border-radius:50%;animation:spin .8s linear infinite"></div>正在加载数据...</div>';
  var url=tab==='Product'?COS_BASE+'data_products_tiny.json':COS_BASE+'data_customers_tiny.json';
  fetch(url,{mode:'cors',cache:'force-cache'}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(data){
    if(tab==='Product'){
      if(data.length>0&&data[0].n!==undefined){data=data.map(function(p){return{code:p.c||'',name:p.n||'',spec:'',type:'',category:p.ct||'',sales:p.sl||0,profit:p.pf||0,stock:0,sellerCount:p.sc||0,batchPrice:p.bp||0,profitRate:p.pf||0,orderCount:0,monthSales:p.sl||0,margin:p.pf||0,grade:'',healthLevel:'',salesperson:'',unitPrice:p.bp||0};});}
      productsData=data;DATA.productsData=data;
      // 初始化产品分类选项
      var categories={};
      productsData.forEach(function(p){if(p.category)categories[p.category]=true;});
      var catSelect=document.getElementById('pCategory');
      if(catSelect){
        catSelect.innerHTML='<option value="">全部分类</option>';
        Object.keys(categories).sort().forEach(function(cat){
          var opt=document.createElement('option');opt.value=cat;opt.textContent=cat;catSelect.appendChild(opt);
        });
      }
      renderProduct();
    }else{
      if(data.length>0&&data[0].n!==undefined){data=data.map(function(c){return{id:c.i||'',name:c.n||'',salesman:c.s||'',level:c.l||'',monthSales:c.m||0,monthlyAmount:c.m||0,profitRate:c.p||0,margin:0,orderCount:c.o||0,lastDate:c.d||'',lastOrderDate:c.d||'',nextDate:'',warning:'',code:c.i||'',advice:'',isOverdue:false,channelType:'','主要对接业务员':c.s||'','整体毛利率':c.p||0,'月均采购额':c.m||0,'流失预警':''};});}
      customersData=data;DATA.customersData=data;allCustomers=data;filteredCustomers=data;
      loadCustomerList();
    }
    _dataLoading=false;
  }).catch(function(e){
    console.error('fetch error:',e);

    _dataLoading=false;
  });
}

// ===== 报表数据 =====



// ===== 日报页 =====
function fmtAmt(n){
  if(n==null||n===undefined)return '-';
  if(typeof n==='string')n=parseFloat(n);
  if(isNaN(n))return '-';
  if(Math.abs(n)>=10000)return (n/10000).toFixed(1)+'万';
  return n.toFixed(0);
}
function fmtPct(n){
  if(n==null||n===undefined)return '-';
  if(typeof n==='string')n=parseFloat(n);
  if(isNaN(n))return '-';
  return (n*100).toFixed(1)+'%';
}

function renderReport() {
    var data = dailyReportData;
    var progress = salesProgressData;
    var now = new Date();
    var todayStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
    document.getElementById('rptDate').textContent = todayStr + ' ' + ['周日','周一','周二','周三','周四','周五','周六'][now.getDay()];

    var h = '';

    // ===== 1. 核心经营指标 =====
    h += '<div class="card"><div class="card-tit">📊 核心经营指标</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    
    // 当日指标
    h += '<div style="background:#f8f9fa;padding:10px;border-radius:8px">';
    h += '<div style="font-size:11px;color:#888;margin-bottom:6px">当日数据</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + fmtAmt(data['核心经营指标']['销售额']['当日']) + '</div><div style="font-size:10px;color:#888">销售额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(data['核心经营指标']['毛利额']['当日']) + '</div><div style="font-size:10px;color:#888">毛利额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:' + ((data['核心经营指标']['毛利率']['当日达标'] || data['核心经营指标']['毛利率']['当日'] >= 0.13) ? '#137333' : '#e53935') + '">' + (data['核心经营指标']['毛利率']['当日'] * 100).toFixed(1) + '%</div><div style="font-size:10px;color:#888">毛利率</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + data['核心经营指标']['订单数']['当日'] + '</div><div style="font-size:10px;color:#888">订单数</div></div>';
    h += '</div></div>';
    
    // 月累计指标
    h += '<div style="background:#e8f0fe;padding:10px;border-radius:8px">';
    h += '<div style="font-size:11px;color:#1a73e8;margin-bottom:6px">月累计</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + fmtAmt(data['核心经营指标']['销售额']['月累计']) + '</div><div style="font-size:10px;color:#888">销售额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(data['核心经营指标']['毛利额']['月累计']) + '</div><div style="font-size:10px;color:#888">毛利额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:' + ((data['核心经营指标']['毛利率']['月累计达标'] || data['核心经营指标']['毛利率']['月累计'] >= 0.13) ? '#137333' : '#e53935') + '">' + (data['核心经营指标']['毛利率']['月累计'] * 100).toFixed(1) + '%</div><div style="font-size:10px;color:#888">毛利率</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + data['核心经营指标']['订单数']['月累计'] + '</div><div style="font-size:10px;color:#888">订单数</div></div>';
    h += '</div></div>';
    h += '</div>';

    // 亏损预警
    if (data['核心经营指标']['亏损订单数'] && data['核心经营指标']['亏损订单数']['预警']) {
        h += '<div style="margin-top:10px;padding:8px 10px;background:#fff3cd;border-radius:6px;font-size:12px;color:#856404">';
        h += '⚠️ 亏损订单: 今日' + data['核心经营指标']['亏损订单数']['当日'] + '单, 月累计' + data['核心经营指标']['亏损订单数']['月累计'] + '单';
        h += '</div>';
    }
    h += '</div>';

    // ===== 2. 毛利区间分布 =====
    h += '<div class="card"><div class="card-tit">📈 毛利区间分布（当日）</div>';
    h += '<div style="overflow-x:auto">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:11px">';
    h += '<tr style="background:#1a73e8;color:#fff">';
    h += '<th style="padding:8px 4px;text-align:left">区间</th>';
    h += '<th style="padding:8px 4px;text-align:right">销售额</th>';
    h += '<th style="padding:8px 4px;text-align:right">占比</th>';
    h += '<th style="padding:8px 4px;text-align:right">目标</th>';
    h += '<th style="padding:8px 4px;text-align:center">状态</th>';
    h += '</tr>';
    
    data['毛利区间']['当日'].forEach(function(item) {
        var isWarn = item['预警'] && item['预警'].indexOf('预警') >= 0;
        var bgColor = isWarn ? '#fff3cd' : (item['预警'] && item['预警'].indexOf('正常') >= 0 ? '#e6f4ea' : '');
        h += '<tr style="background:' + bgColor + ';border-bottom:1px solid #eee">';
        h += '<td style="padding:8px 4px">' + item['区间'] + '</td>';
        h += '<td style="padding:8px 4px;text-align:right;font-weight:500">' + fmtAmt(item['销售额']) + '</td>';
        h += '<td style="padding:8px 4px;text-align:right">' + (item['占比'] * 100).toFixed(1) + '%</td>';
        h += '<td style="padding:8px 4px;text-align:right;color:#888">' + (item['目标占比'] * 100).toFixed(0) + '%</td>';
        h += '<td style="padding:8px 4px;text-align:center;font-size:12px">' + item['预警'] + '</td>';
        h += '</tr>';
    });
    h += '</table></div></div>';

    // ===== 3. 销售目标进度 =====
    h += '<div class="card"><div class="card-tit">🎯 销售目标进度（月累计）</div>';

    var regions = ['省外业务部', '省内业务部', '长株潭业务部', '大客户部'];
    regions.forEach(function(region) {
        var regionData = progress.filter(function(p) { return p['region'] === region || p['区域'] === region; });
        if (regionData.length === 0) return;
        
        // 计算小计
        var totalSales = 0, totalTarget = 0;
        regionData.forEach(function(p) {
            totalSales += p['sales'] || p['月销售额'] || 0;
            totalTarget += p['target'] || p['月度目标'] || 0;
        });
        var avgProgress = totalTarget > 0 ? (totalSales / totalTarget * 100) : 0;
        
        h += '<div class="progress-row" style="background:#e3f2fd;font-weight:bold;">' +
            '<span>' + region + '</span>' +
            '<span>' + (totalSales/10000).toFixed(1) + '万/' + (totalTarget/10000).toFixed(0) + '万</span>' +
            '<span>' + avgProgress.toFixed(1) + '%</span>' +
            '<span style="width:80px;height:8px;background:#e0e0e0;border-radius:4px;display:inline-block;">' +
            '<span style="width:' + Math.min(100, avgProgress) + '%;height:100%;background:#2196f3;border-radius:4px;display:block;"></span></span>' +
            '</div>';
        
        regionData.forEach(function(p) {
            var name = p['name'] || p['业务经理'] || '';
            var sales = (p['sales'] || p['月销售额'] || 0) / 10000;

            var prog = p['progress'] || p['完成进度'] || 0;
            if (typeof prog !== 'number') prog = parseFloat(prog) || 0;
            prog = Math.min(prog, 999);
            
            h += '<div class="progress-row">' +
                '<span>' + name + '</span>' +
                '<span>' + sales.toFixed(1) + '万/' + target.toFixed(0) + '万</span>' +
                '<span>' + prog.toFixed(1) + '%</span>' +
                '<span style="width:80px;height:8px;background:#e0e0e0;border-radius:4px;display:inline-block;">' +
                '<span style="width:' + Math.min(100, prog) + '%;height:100%;background:' + (prog >= 80 ? '#4caf50' : prog >= 50 ? '#ff9800' : '#f44336') + ';border-radius:4px;display:block;"></span></span>' +
                '</div>';
        });
    });
    
    document.getElementById('rptContent').innerHTML = h;
}

// ===== 产品页 =====


// 业务经理销售分布数据
// 更新后的productsData（按销售额从高到低排序，一品蓝鲸排第一）
// 默认按销售额排序

// 产品渲染函数
// 产品排序状态
var currentSort = 'sales_desc';

function renderProduct() {
    // 根据排序状态进行排序
    var sortField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    var sortOrder = currentSort.indexOf('desc') >= 0 ? -1 : 1;
    var sorted = productsData.slice().sort(function(a, b) {
        var valA = sortField === 'sales' ? a.sales : a.profit;
        var valB = sortField === 'sales' ? b.sales : b.profit;
        return (valB - valA) * sortOrder;
    });
    
    // 搜索过滤
    // 搜索过滤（支持多关键词关联搜索）
    var k = document.getElementById('pSk').value.toLowerCase().trim();
    var filtered = k ? sorted.filter(function(p) {
        var keywords = k.split(/\s+/);
        return keywords.every(function(kw) {
            return p.name.toLowerCase().indexOf(kw) >= 0 
                || p.code.toLowerCase().indexOf(kw) >= 0
                || (p.spec && p.spec.toLowerCase().indexOf(kw) >= 0)
                || (p.category && p.category.toLowerCase().indexOf(kw) >= 0);
        });
    }) : sorted;
    
    // 分类筛选
    var catFilter = document.getElementById('pCategory').value;
    if (catFilter) {
        filtered = filtered.filter(function(p) { return p.category === catFilter; });
    }
    
    // 毛利率筛选
    var profitFilter = document.getElementById('pProfitRange').value;
    if (profitFilter === 'high') {
        filtered = filtered.filter(function(p) { return p.profit >= 15; });
    } else if (profitFilter === 'mid') {
        filtered = filtered.filter(function(p) { return p.profit >= 10 && p.profit < 15; });
    } else if (profitFilter === 'low') {
        filtered = filtered.filter(function(p) { return p.profit < 10; });
    }
    
    var h = '';
    
    // 搜索和筛选栏
    h += '<div style="display:flex;gap:6px;margin-bottom:10px">';
    h += '<button onclick="showSortOptions(\'sales\')" style="flex:1;padding:8px;font-size:11px;border:' + (currentSort === 'sales' ? '2px solid #1a73e8' : '1px solid #ddd') + ';border-radius:6px;background:' + (currentSort === 'sales' ? '#e8f0fe' : '#fff') + ';color:' + (currentSort === 'sales' ? '#1a73e8' : '#666') + ';cursor:pointer">📊 销售额</button>';
    h += '<button onclick="showSortOptions(\'profit\')" style="flex:1;padding:8px;font-size:11px;border:' + (currentSort === 'profit' ? '2px solid #1a73e8' : '1px solid #ddd') + ';border-radius:6px;background:' + (currentSort === 'profit' ? '#e8f0fe' : '#fff') + ';color:' + (currentSort === 'profit' ? '#1a73e8' : '#666') + ';cursor:pointer">💰 毛利率</button>';

// 点击排序按钮显示下拉选项菜单
function showSortOptions(field) {
    event.stopPropagation();
    var existingMenu = document.getElementById('sortMenu');
    if (existingMenu) {
        existingMenu.remove();
        return;
    }
    
    var btn = event.currentTarget;
    var rect = btn.getBoundingClientRect();
    
    var menu = document.createElement('div');
    menu.id = 'sortMenu';
    menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 5) + 'px;left:' + Math.min(rect.left, window.innerWidth - 170) + 'px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;min-width:160px;padding:6px 0;';
    
    var currentField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    
    var options = field === 'sales' ? [
        {'value': 'sales_desc', 'label': '📊 销售额从高到低'},
        {'value': 'sales_asc', 'label': '📊 销售额从低到高'}
    ] : [
        {'value': 'profit_desc', 'label': '💰 毛利率从高到低'},
        {'value': 'profit_asc', 'label': '💰 毛利率从低到高'}
    ];
    
    options.forEach(function(opt) {
        var item = document.createElement('div');
        var isActive = currentSort === opt.value;
        item.style.cssText = 'padding:12px 16px;cursor:pointer;font-size:12px;' + (isActive ? 'background:#e8f0fe;color:#1a73e8;font-weight:600;' : 'color:#333;');
        item.innerHTML = opt.label + (isActive ? ' ✓' : '');
        item.onclick = function(e) {
            e.stopPropagation();
            setSort(opt.value);
            menu.remove();
        };
        item.onmouseenter = function() {
            if (!isActive) this.style.background = '#f5f5f5';
        };
        item.onmouseleave = function() {
            if (!isActive) this.style.background = '#fff';
        };
        menu.appendChild(item);
    });
    
    document.body.appendChild(menu);
    
    // 点击其他地方关闭菜单
    setTimeout(function() {
        var closeHandler = function(e) {
            var m = document.getElementById('sortMenu');
            if (m && !m.contains(e.target)) {
                m.remove();
                document.removeEventListener('click', closeHandler);
            }
        };
        document.addEventListener('click', closeHandler);
    }, 10);
}

// 产品详情弹窗
// 从规格型号中提取每件包数
function getSpecCount(spec) {
    if (!spec) return 1;
    // 匹配 "300G*20包" 或 "125g*100包" 等格式
    var match = spec.match(/\*(\d+)/);
    return match ? parseInt(match[1]) : 1;
}

function applyCustomerFilter(){
var k=document.getElementById('cSk').value.toLowerCase();
var lv=document.getElementById('cLevel').value;
var sl=document.getElementById('cSales').value;
var nd=document.getElementById('cNextDate').value;
var pf=document.getElementById('cProfitRange').value;
var today=new Date();today.setHours(0,0,0,0);
var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+(7-today.getDay()));
var monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
filteredCustomers=allCustomers.filter(function(c){
if(k&&c.name.toLowerCase().indexOf(k)<0)return false;
if(lv&&(!c.level||c.level.indexOf(lv)<0))return false;
if(sl&&c.salesman!==sl)return false;
if(nd){
if(c.nextDate){
var ndD=new Date(c.nextDate);
if(nd==='thisWeek'&&(ndD<today||ndD>weekEnd))return false;
if(nd==='thisMonth'&&(ndD<today||ndD>monthEnd))return false;
if(nd==='overdue'&&ndD>=today)return false;
if(nd==='unknown')return false;
}else{if(nd!=='unknown')return false;}
}
if(pf){
if(pf==='high'&&(c.profitRate||0)<15)return false;
if(pf==='mid'&&((c.profitRate||0)<10||(c.profitRate||0)>=15))return false;
if(pf==='low'&&(c.profitRate||0)>=10)return false;
}
return true;
});
currentPage=1;
document.getElementById('custStat').textContent='筛选结果:'+filteredCustomers.length+'个客户';
renderCustomerList();
}

        productsData = productsData.map(function(p) {
            var cat=p.ct||p.c||'';

        });
        DATA.productsData = productsData;
    }
    allCustomers = customersData;

    // 初始化产品分类选项
    var categories = {};
    productsData.forEach(function(p) { if(p.category) categories[p.category] = true; });

        Object.keys(categories).sort().forEach(function(cat) {
            var opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            catSelect.appendChild(opt);
        });
    }
    
    // 初始渲染（可能数据还没加载）
    renderReport();
    renderProduct();
    renderCustomerFilters();
    renderCustomerList();
    
    // 立即尝试加载产品和客户数据

}
