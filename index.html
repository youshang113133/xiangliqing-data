<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#1a73e8,#0d47a1);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.loader{text-align:center;padding:40px}
.loader h2{font-size:20px;margin-bottom:16px}
.loader p{font-size:14px;opacity:0.8}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top:4px solid #fff;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.error{background:rgba(255,0,0,0.2);padding:16px;border-radius:8px;margin-top:16px;font-size:13px}
</style>
</head>
<body>
<div class="loader">
<h2>湘里情智营·客户决策</h2>
<div class="spinner"></div>
<p id="status">正在加载数据...</p>
<div id="error" class="error" style="display:none"></div>
</div>
<script>
(function(){
var COS_URL = 'https://xiangliqing-data-1423818390.cos.ap-guangzhou.myqcloud.com/index.html';
var statusEl = document.getElementById('status');
var errorEl = document.getElementById('error');

fetch(COS_URL, {
  method: 'GET',
  headers: {'Accept': 'text/html'},
  signal: AbortSignal.timeout(30000)
})
.then(function(r) {
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.text();
})
.then(function(html) {
  // 替换整个页面
  document.open();
  document.write(html);
  document.close();
})
.catch(function(e) {
  statusEl.textContent = '加载失败';
  errorEl.style.display = 'block';
  errorEl.textContent = '错误: ' + e.message + '\n\n请刷新重试，或使用WiFi网络访问';
});
})();
</script>
</body>
</html>
