<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f7fa;font-size:14px}
.pg{display:none;padding:12px;padding-bottom:70px}
.pg.on{display:block}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 12px;position:sticky;top:0;z-index:100}
.pg-hd h1{font-size:17px}
.pg-hd p{font-size:11px;opacity:.9}
.search{padding:10px 14px;border:2px solid #e0e0e0;border-radius:20px;font-size:14px;width:100%;margin:10px 0}
.fl{display:flex;gap:6px;margin-bottom:10px}
.fl select{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.card-tit{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row:last-child{border-bottom:none}
.lb{color:#888}
.vl{color:#333;font-weight:500}
.vl-r{color:#e53935;font-weight:600}
.vl-g{color:#137333;font-weight:600}
.it{padding:12px;border-bottom:1px solid #eee;cursor:pointer;border-radius:8px;margin-bottom:8px;background:#fff;transition:background .2s}
.it:active{background:#f0f0f0}
.it:last-child{border-bottom:none}
.it-nm{font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
.it-info{font-size:12px;color:#666;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.tag-g{background:#e6f4ea;color:#137333}
.tag-y{background:#fef7e0;color:#e37400}
.tag-r{background:#fce8e6;color:#c5221f}
.tag-b{background:#e8f0fe;color:#1a73e8}
.tag-p{background:#f3e5f5;color:#7b1fa2}
.warn{background:#fff3cd;color:#856404;padding:2px 8px;border-radius:4px;font-size:10px;display:inline-block}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;padding:6px 0}
.nav>div{flex:1;padding:10px;text-align:center;font-size:11px;color:#666;cursor:pointer;user-select:none}
.nav .on{color:#1a73e8;font-weight:500}
.nav .on::before{content:'';display:block;width:24px;height:3px;background:#1a73e8;border-radius:2px;margin:0 auto 6px}
.stat-row{display:flex;padding:12px 0;border-bottom:1px solid #eee}
.stat-item{text-align:center;flex:1}
.stat-num{font-size:22px;font-weight:700;color:#1a73e8}
.stat-lbl{font-size:10px;color:#888;margin-top:4px}
.prd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prd-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prd-nm{font-size:12px;font-weight:500;color:#333;margin-bottom:6px;line-height:1.4}
.prd-pr{color:#e53935;font-weight:700;font-size:15px}
.prd-info{font-size:10px;color:#888;margin-top:6px}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.md.on{display:flex;align-items:flex-end}
.md-ct{background:#fff;width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto}
.md-hd{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.md-tt{font-size:16px;font-weight:600;max-width:85%;line-height:1.3}
.md-cl{font-size:28px;color:#666;background:none;border:none;cursor:pointer;line-height:1;padding:0 8px}
.md-bd{padding:14px}
.rc{background:#f8f9fa;border-radius:12px;padding:12px;margin-top:14px}
.rc-tt{color:#1a73e8;font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rc-tt::before{content:'🎁';font-size:14px}
.rc-i{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.rc-i:last-child{margin-bottom:0}
.rc-nm{font-size:14px;font-weight:500;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start}
.rc-pr{color:#e53935;font-weight:700;font-size:14px;white-space:nowrap}
.rc-mt{font-size:11px;color:#666;margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap}
.rc-lg{background:#fff8e1;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;color:#795548;margin-bottom:8px}
.rc-sc{background:#e3f2fd;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;color:#1565c0}
.loading{padding:50px;text-align:center;color:#888;font-size:14px}
.loading::after{content:'';display:block;width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px;text-align:center;color:#888}
.empty::before{content:'🔍';display:block;font-size:50px;margin-bottom:12px}
.empty p{font-size:13px}
.more{text-align:center;padding:20px;color:#888;font-size:13px;cursor:pointer}
.more:active{color:#1a73e8}
.more::before{content:'⬇️ ';margin-right:6px}
.pager{text-align:center;padding:16px;color:#888;font-size:12px;background:#f8f9fa;border-radius:8px;margin-top:10px}
</style>
</head>
<body>

<!-- 日报页 -->
<div id="pgReport" class="pg on">
<div class="pg-hd"><h1>📊 湘里情智营·客户决策</h1><p id="rptDate"></p><div id="dataStatusBar" style="font-size:10px;color:#fff;opacity:0.8;margin-top:4px;padding:4px 0;"></div></div>
<div id="rptContent"></div>
</div>

<!-- 产品页 -->
<div id="pgProduct" class="pg">
<div class="pg-hd"><h1>📦 产品中心</h1><p>高毛利产品推荐</p></div>
<input type="search" class="search" id="pSk" placeholder="搜索产品名称..." oninput="renderProduct()">
<div class="fl" style="margin-top:0">
<select id="pCategory" onchange="renderProduct()" style="flex:1">
  <option value="">全部分类</option>
</select>
<select id="pProfitRange" onchange="renderProduct()" style="flex:1">
  <option value="">全部毛利率</option>
  <option value="high">高毛利≥15%</option>
  <option value="mid">中毛利10-15%</option>
  <option value="low">低毛利&lt;10%</option>
</select>
</div>
<div id="prdContent"></div>
</div>

<!-- 客户页 -->
<div id="pgCustomer" class="pg">
<div class="pg-hd"><h1>👥 客户管理</h1><p id="custStat"></p></div>
<input type="search" class="search" id="cSk" placeholder="搜索客户名称..." oninput="resetCustomerPage()">
<div class="fl">
<select id="cLevel" onchange="resetCustomerPage()"><option value="">全部分层</option><option value="A">A类</option><option value="B">B类</option><option value="C">C类</option><option value="D">D类</option></select>
<select id="cSales" onchange="resetCustomerPage()"><option value="">全部业务员</option></select>
</div>
<div class="fl">
<select id="cNextDate" onchange="resetCustomerPage()"><option value="">预测采购时间</option><option value="thisWeek">本周内</option><option value="thisMonth">本月内</option><option value="overdue">已逾期</option><option value="unknown">待预测</option></select>
</div>
<div class="fl">
<select id="cProfitRange" onchange="resetCustomerPage()">
  <option value="">全部毛利率</option>
  <option value="high">高毛利≥15%</option>
  <option value="mid">中毛利10-15%</option>
  <option value="low">低毛利&lt;10%</option>
</select>
</div>
<div id="custContent"></div>
</div>

<!-- 详情弹窗 -->
<div id="md" class="md" onclick="closeMd()">
<div class="md-ct" onclick="event.stopPropagation()">
<div class="md-hd"><div class="md-tt" id="mdTt"></div><button class="md-cl" onclick="closeMd()">×</button></div>
<div class="md-bd" id="mdBd"></div>
</div>
</div>

<!-- 底部导航 -->
<div class="nav">
<div id="navReport" class="on" onclick="switchTab('Report')">日报</div>
<div id="navProduct" onclick="switchTab('Product')">产品</div>
<div id="navCustomer" onclick="switchTab('Customer')">客户</div>
</div>


<!-- 刷新按钮 -->
<div style="position:fixed;top:10px;right:12px;z-index:101;">
  <button onclick="manualRefreshData()" style="background:#fff;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);display:flex;align-items:center;gap:4px;">
    🔄 刷新
  </button>
</div>

<div style="position:fixed;top:60px;right:12px;z-index:99;">
  <button onclick="manualRefreshData()" style="background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    🔄 刷新数据
  </button>
</div>

<script>

// ===== 双模式数据加载系统 =====
var DATA_URL = "https://gcore.jsdelivr.net/gh/xiangliqing888/xiangliqing-data@main/data_v202604221853.json"; // 请替换为实际云端地址
var dataSource = 'cloud'; // 'embedded' 或 'cloud' - 使用云端数据
var dataUpdateTime = '2026-04-22 17:36:06';


// 尝试从云端获取数据
async function fetchCloudData() {
  try {
    var response = await fetch(DATA_URL, {
      method: 'GET',
      headers: {'Accept': 'application/json'},
      signal: AbortSignal.timeout(30000)
    });
    if (response.ok) {
      var cloudData = await response.json();
      // 更新全局数据变量
      if (cloudData.productsData) productsData = cloudData.productsData;
      if (cloudData.customersData) customersData = cloudData.customersData;
      // 已改用customersData（4247个客户），不再使用allCustomers（267个）
      if (cloudData.dailyReportData) dailyReportData = cloudData.dailyReportData;
      if (cloudData.salesProgressData) salesProgressData = cloudData.salesProgressData;
      if (cloudData.channelTypeMap) channelTypeMap = cloudData.channelTypeMap;
      
      dataSource = 'cloud';
      dataUpdateTime = cloudData.updateTime || new Date().toLocaleString();
      console.log('✅ 云端数据加载成功，更新时间：' + dataUpdateTime);
      
      // 更新状态栏
      updateDataStatus();
      
      // 刷新当前页面
      refreshCurrentPage();
    }
  } catch (e) {
    console.log('⚠️ 云端数据获取失败，使用本地数据：' + e.message);
  }
}

// 刷新当前页面
function refreshCurrentPage() {
  var activeTab = document.querySelector('.pg.on');
  if (activeTab) {
    var tabId = activeTab.id;
    if (tabId === 'pgReport') renderReport();
    if (tabId === 'pgProduct') renderProduct();
    if (tabId === 'pgCustomer') loadCustomerList();
  }
}

// 更新数据状态栏
function updateDataStatus() {
  var statusBar = document.getElementById('dataStatusBar');
  if (statusBar) {
    var onlineIcon = navigator.onLine ? '🟢' : '🔴';
    var sourceIcon = dataSource === 'cloud' ? '☁️' : '📦';
    statusBar.innerHTML = sourceIcon + ' 数据: ' + (dataSource === 'cloud' ? '云端' : '本地') + 
                          ' | ' + onlineIcon + ' 网络: ' + (navigator.onLine ? '在线' : '离线') + 
                          ' | 更新时间: ' + dataUpdateTime;
  }
}

// 初始化：先使用本地数据，然后尝试获取云端更新
(function initDualMode() {
  updateDataStatus();
  if (navigator.onLine) {
    fetchCloudData();
  }
})();

// 监听网络状态变化
window.addEventListener('online', function() {
  console.log('🟢 网络已连接，尝试更新数据...');
  updateDataStatus();
  fetchCloudData();
});

window.addEventListener('offline', function() {
  console.log('🔴 网络已断开，使用本地数据');
  updateDataStatus();
});

// 手动刷新数据
function manualRefreshData() {
  if (navigator.onLine) {
    console.log('手动刷新数据...');
    fetchCloudData();
  } else {
    alert('当前网络不可用，请检查网络连接');
  }
}



// 客户渠道类型映射
var channelTypeMap = {};

// 产品业务经理销售分布数据
var productSalesmen = {};

// ===== 全局变量 =====
var customersData = [];
var allCustomers=[];    // 全部客户数据
var filteredCustomers=[]; // 筛选后的客户
var displayedCount=50;   // 每页显示数量
var currentPage=1;
var custPageSize=50;

// ===== 页面切换 =====
function switchTab(tab){
document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
document.querySelectorAll('.nav>div').forEach(n=>n.classList.remove('on'));
document.getElementById('pg'+tab).classList.add('on');
document.getElementById('nav'+tab).classList.add('on');
if(tab==='Report')renderReport();
if(tab==='Product')renderProduct();
if(tab==='Customer')loadCustomerList();
}

// ===== 报表数据 =====
var dailyReportData = {};
var salesProgressData = [];

// ===== 日报页 =====
function renderReport() {
    var data = dailyReportData;
    var progress = salesProgressData;
    var now = new Date();
    var todayStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
    document.getElementById('rptDate').textContent = todayStr + ' ' + ['周日','周一','周二','周三','周四','周五','周六'][now.getDay()];

    var h = '';

    // ===== 1. 核心经营指标 =====
    h += '<div class="card"><div class="card-tit">📊 核心经营指标</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    
    // 当日指标
    h += '<div style="background:#f8f9fa;padding:10px;border-radius:8px">';
    h += '<div style="font-size:11px;color:#888;margin-bottom:6px">当日数据</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + fmtAmt(data['核心经营指标']['销售额']['当日']) + '</div><div style="font-size:10px;color:#888">销售额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(data['核心经营指标']['毛利额']['当日']) + '</div><div style="font-size:10px;color:#888">毛利额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:' + (data['核心经营指标']['毛利率']['当日达标'] ? '#137333' : '#e53935') + '">' + (data['核心经营指标']['毛利率']['当日'] * 100).toFixed(1) + '%</div><div style="font-size:10px;color:#888">毛利率</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + data['核心经营指标']['订单数']['当日'] + '</div><div style="font-size:10px;color:#888">订单数</div></div>';
    h += '</div></div>';
    
    // 月累计指标
    h += '<div style="background:#e8f0fe;padding:10px;border-radius:8px">';
    h += '<div style="font-size:11px;color:#1a73e8;margin-bottom:6px">月累计</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + fmtAmt(data['核心经营指标']['销售额']['月累计']) + '</div><div style="font-size:10px;color:#888">销售额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#e53935">' + fmtAmt(data['核心经营指标']['毛利额']['月累计']) + '</div><div style="font-size:10px;color:#888">毛利额</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:' + (data['核心经营指标']['毛利率']['月累计达标'] ? '#137333' : '#e53935') + '">' + (data['核心经营指标']['毛利率']['月累计'] * 100).toFixed(1) + '%</div><div style="font-size:10px;color:#888">毛利率</div></div>';
    h += '<div><div style="font-size:16px;font-weight:700;color:#1a73e8">' + data['核心经营指标']['订单数']['月累计'] + '</div><div style="font-size:10px;color:#888">订单数</div></div>';
    h += '</div></div>';
    h += '</div>';

    // 亏损预警
    if (data['核心经营指标']['亏损订单数']['预警']) {
        h += '<div style="margin-top:10px;padding:8px 10px;background:#fff3cd;border-radius:6px;font-size:12px;color:#856404">';
        h += '⚠️ 亏损订单: 今日' + data['核心经营指标']['亏损订单数']['当日'] + '单, 月累计' + data['核心经营指标']['亏损订单数']['月累计'] + '单';
        h += '</div>';
    }
    h += '</div>';

    // ===== 2. 毛利区间分布 =====
    h += '<div class="card"><div class="card-tit">📈 毛利区间分布（当日）</div>';
    h += '<div style="overflow-x:auto">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:11px">';
    h += '<tr style="background:#1a73e8;color:#fff">';
    h += '<th style="padding:8px 4px;text-align:left">区间</th>';
    h += '<th style="padding:8px 4px;text-align:right">销售额</th>';
    h += '<th style="padding:8px 4px;text-align:right">占比</th>';
    h += '<th style="padding:8px 4px;text-align:right">目标</th>';
    h += '<th style="padding:8px 4px;text-align:center">状态</th>';
    h += '</tr>';
    
    data['毛利区间']['当日'].forEach(function(item) {
        var isWarn = item['预警'] && item['预警'].indexOf('预警') >= 0;
        var bgColor = isWarn ? '#fff3cd' : (item['预警'] && item['预警'].indexOf('正常') >= 0 ? '#e6f4ea' : '');
        h += '<tr style="background:' + bgColor + ';border-bottom:1px solid #eee">';
        h += '<td style="padding:8px 4px">' + item['区间'] + '</td>';
        h += '<td style="padding:8px 4px;text-align:right;font-weight:500">' + fmtAmt(item['销售额']) + '</td>';
        h += '<td style="padding:8px 4px;text-align:right">' + (item['占比'] * 100).toFixed(1) + '%</td>';
        h += '<td style="padding:8px 4px;text-align:right;color:#888">' + (item['目标占比'] * 100).toFixed(0) + '%</td>';
        h += '<td style="padding:8px 4px;text-align:center;font-size:12px">' + item['预警'] + '</td>';
        h += '</tr>';
    });
    h += '</table></div></div>';

    // ===== 3. 销售目标进度 =====
    h += '<div class="card"><div class="card-tit">🎯 销售目标进度（月累计）</div>';

    var regions = ['省外业务部', '省内业务部', '长株潭业务部', '大客户部'];
    regions.forEach(function(region) {
        var regionData = progress.filter(function(p) { return p['区域'] === region; });
        if (regionData.length === 0) return;
        
        var subtotal = regionData.find(function(p) { return p['业务经理'] === '小计'; });
        if (subtotal) {
            var subProgress = parseFloat(subtotal['完成进度'].replace('%','')).toFixed(1);
            var subColor = parseFloat(subtotal['月累计毛利率']) >= 13 ? '#137333' : '#e53935';
            h += '<div style="background:#e8f0fe;padding:10px;margin-bottom:10px;border-radius:8px">';
            h += '<div style="display:flex;justify-content:space-between;align-items:center">';
            h += '<span style="font-weight:600;color:#1a73e8">' + region + '</span>';
            h += '<span style="font-size:12px">';
            h += '' + fmtAmt(subtotal['月销售额']) + ' | 进度 <b style="color:#1a73e8">' + subProgress + '%</b> | 毛利 <b style="color:' + subColor + '">' + (subtotal['月累计毛利率'] * 100).toFixed(1) + '%</b>';
            h += '</span></div>';
            h += '<div style="margin-top:6px;height:8px;background:#fff;border-radius:4px;overflow:hidden">';
            h += '<div style="height:100%;width:' + Math.min(subProgress, 100) + '%;background:linear-gradient(90deg,#1a73e8,#0d47a1);border-radius:4px"></div>';
            h += '</div>';
            h += '</div>';
        }

        regionData.filter(function(p) { return p['业务经理'] !== '小计' && p['业务经理'] !== '公司合计'; }).forEach(function(p) {
            var pProgress = parseFloat(p['完成进度']) || 0;
            var pColor = parseFloat(p['月累计毛利率']) >= 13 ? '#137333' : '#e53935';
            var isWang = p['月累计达标'] === '✅';
            
            h += '<div style="padding:8px 0;border-bottom:1px solid #f0f0f0">';
            h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
            h += '<span style="font-weight:500;font-size:12px;cursor:pointer;color:#1a73e8" onclick="showSalesmanAdvice(\'' + p['业务经理'] + '\')">' + p['业务经理'] + '</span>';

    h += '</div>';

function fmtAmt(amt) {
    if (typeof amt !== 'number') return amt || '0';
    if (amt >= 10000) return (amt / 10000).toFixed(1) + 'w';
    return amt.toLocaleString('zh-CN', {maximumFractionDigits: 0});
}

    var sorted = productsData.slice().sort(function(a, b) {
        var valA = sortField === 'sales' ? a.sales : a.profit;
        var valB = sortField === 'sales' ? b.sales : b.profit;
        return (valB - valA) * sortOrder;
    });
    
    // 搜索过滤

    var k = document.getElementById('pSk').value.toLowerCase().trim();

                || (p.spec && p.spec.toLowerCase().indexOf(kw) >= 0)

// 点击排序按钮显示下拉选项菜单
function showSortOptions(field) {
    event.stopPropagation();
    var existingMenu = document.getElementById('sortMenu');
    if (existingMenu) {
        existingMenu.remove();
        return;
    }
    
    var btn = event.currentTarget;
    var rect = btn.getBoundingClientRect();
    
    var menu = document.createElement('div');
    menu.id = 'sortMenu';
    menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 5) + 'px;left:' + Math.min(rect.left, window.innerWidth - 170) + 'px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;min-width:160px;padding:6px 0;';
    
    var currentField = currentSort.indexOf('sales') === 0 ? 'sales' : 'profit';
    
    var options = field === 'sales' ? [
        {'value': 'sales_desc', 'label': '📊 销售额从高到低'},
        {'value': 'sales_asc', 'label': '📊 销售额从低到高'}
    ] : [
        {'value': 'profit_desc', 'label': '💰 毛利率从高到低'},
        {'value': 'profit_asc', 'label': '💰 毛利率从低到高'}
    ];
    
    options.forEach(function(opt) {
        var item = document.createElement('div');
        var isActive = currentSort === opt.value;
        item.style.cssText = 'padding:12px 16px;cursor:pointer;font-size:12px;' + (isActive ? 'background:#e8f0fe;color:#1a73e8;font-weight:600;' : 'color:#333;');
        item.innerHTML = opt.label + (isActive ? ' ✓' : '');
        item.onclick = function(e) {
            e.stopPropagation();
            setSort(opt.value);
            menu.remove();
        };
        item.onmouseenter = function() {
            if (!isActive) this.style.background = '#f5f5f5';
        };
        item.onmouseleave = function() {
            if (!isActive) this.style.background = '#fff';
        };
        menu.appendChild(item);
    });
    
    document.body.appendChild(menu);
    
    // 点击其他地方关闭菜单
    setTimeout(function() {
        var closeHandler = function(e) {
            var m = document.getElementById('sortMenu');
            if (m && !m.contains(e.target)) {
                m.remove();
                document.removeEventListener('click', closeHandler);
            }
        };
        document.addEventListener('click', closeHandler);
    }, 10);
}

function getSpecCount(spec) {
    if (!spec) return 1;
    // 匹配 "300G*20包" 或 "125g*100包" 等格式
    var match = spec.match(/\*(\d+)/);
    return match ? parseInt(match[1]) : 1;
}

function applyCustomerFilter(){

var lv=document.getElementById('cLevel').value;
var sl=document.getElementById('cSales').value;
var nd=document.getElementById('cNextDate').value;
var pf=document.getElementById('cProfitRange').value;
var today=new Date();today.setHours(0,0,0,0);
var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+(7-today.getDay()));
var monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
filteredCustomers=allCustomers.filter(function(c){
if(k&&c.name.toLowerCase().indexOf(k)<0)return false;
if(lv&&(!c.level||c.level.indexOf(lv)<0))return false;
if(sl&&c.salesman!==sl)return false;
if(nd){
if(c.nextDate){
var ndD=new Date(c.nextDate);
if(nd==='thisWeek'&&(ndD<today||ndD>weekEnd))return false;
if(nd==='thisMonth'&&(ndD<today||ndD>monthEnd))return false;
if(nd==='overdue'&&ndD>=today)return false;
if(nd==='unknown')return false;
}else{if(nd!=='unknown')return false;}
}
if(pf){
if(pf==='high'&&(c.profitRate||0)<15)return false;
if(pf==='mid'&&((c.profitRate||0)<10||(c.profitRate||0)>=15))return false;
if(pf==='low'&&(c.profitRate||0)>=10)return false;
}
return true;
});
currentPage=1;
document.getElementById('custStat').textContent='筛选结果:'+filteredCustomers.length+'个客户';
renderCustomerList();
}

function renderCustomerList(){
var start=(currentPage-1)*custPageSize;
var end=Math.min(start+custPageSize,filteredCustomers.length);
var pageData=filteredCustomers.slice(start,end);
var h='';
var todayStr=new Date().toISOString().slice(0,10);
var today=new Date();
var weekStart=new Date(today);
weekStart.setDate(today.getDate()-today.getDay());
var weekEnd=new Date(weekStart);
weekEnd.setDate(weekStart.getDate()+6);
pageData.forEach(function(c){
var lv=c.level?(c.level.indexOf('A')===0?'g':c.level.indexOf('B')===0?'y':c.level.indexOf('D')===0?'r':'b'):'b';
var isOverdue=c.nextDate&&c.nextDate<todayStr&&(!c.lastDate||c.lastDate<c.nextDate);
var isThisWeek=false;
var nextDateText='<span style="color:#999">待预测</span>';
if(c.nextDate){
var nextD=new Date(c.nextDate);
isThisWeek=nextD>=weekStart && nextD<=weekEnd;
if(isOverdue){
var overdueDays=Math.floor((today-new Date(c.nextDate))/(1000*60*60*24));
nextDateText='<span style="color:#c5221f;font-weight:600">预计'+c.nextDate.slice(5)+'(已逾期'+overdueDays+'天)</span>';
}else if(isThisWeek){
nextDateText='<span style="color:#e37400;font-weight:700;background:#fef7e0;padding:2px 6px;border-radius:4px">📌 马上跟进('+c.nextDate.slice(5)+')</span>';
}else{
nextDateText='<span style="color:#1a73e8">预计'+c.nextDate.slice(5)+'</span>';
}
}
var addressStr='';
if(c.address){
addressStr=c.address;
}else if(c.name){
var addrMatch=c.name.match(/([\u4e00-\u9fa5]+省[\u4e00-\u9fa5]+[市区县][^\s]*)/);
if(addrMatch)addressStr=addrMatch[1];
}
var monthlyAmountStr='';
if(c.monthlyAmount&&c.monthlyAmount>0){
monthlyAmountStr='¥'+c.monthlyAmount.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});
}else if(c.月均采购额&&c.月均采购额>0){
monthlyAmountStr='¥'+c.月均采购额.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});
}
var profitRateDisplay=0;
if(c.profitRate25!==undefined&&c.profitRate25!==null){
profitRateDisplay=c.profitRate25;
}else if(c.profitRate!==undefined&&c.profitRate!==null){
profitRateDisplay=c.profitRate;
}else if(c.整体毛利率!==undefined&&c.整体毛利率!==null){
profitRateDisplay=c.整体毛利率>1?c.整体毛利率:(c.整体毛利率*100);
}
h+='<div class="it" onclick="showCustomer(\''+c.id+'\')">';
var cChannel = channelTypeMap[c.id] || c.channelType || '-';
var cChannelColor = '#666';
if(cChannel === '流通') cChannelColor = '#1a73e8';
else if(cChannel === '餐饮') cChannelColor = '#e37400';
else if(cChannel === '沉默') cChannelColor = '#888';
else if(cChannel === '连锁') cChannelColor = '#7b1fa2';
else if(cChannel === '团膳') cChannelColor = '#137333';
else if(cChannel === '电商') cChannelColor = '#c5221f';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
h+='<span class="it-nm" style="flex:1">'+c.name+'</span>';
h+='<span style="font-size:10px;padding:2px 6px;border-radius:8px;background:'+cChannelColor+'22;color:'+cChannelColor+';font-weight:500">'+cChannel+'</span>';
h+='</div>';
h+='<div class="it-info">';
h+='<span>'+(c.salesman||c.主要对接业务员||'-')+'</span>';
h+='<span class="tag tag-g">毛利'+(profitRateDisplay||0).toFixed(1)+'%</span>';
if(monthlyAmountStr)h+='<span class="tag tag-b">月采'+monthlyAmountStr.replace('¥','')+'</span>';
h+='</div>';
h+='<div class="it-info" style="margin-top:4px">'+nextDateText;
if(addressStr)h+='<span style="color:#666;font-size:11px">'+addressStr+'</span>';
h+='</div>';
if(c.warning||c.流失预警)h+='<div style="margin-top:6px"><span class="warn">'+(c.warning||c.流失预警)+'</span></div>';
h+='</div>';
});
if(filteredCustomers.length===0)h='<div class="empty"><p>无匹配客户</p></div>';
else if(end<filteredCustomers.length){
h+='<div class="more" onclick="loadMoreCustomer()">加载更多 ('+end+'/'+filteredCustomers.length+')</div>';
}else if(filteredCustomers.length> custPageSize){
h+='<div class="pager">已显示全部 '+filteredCustomers.length+' 个客户</div>';
}
document.getElementById('custContent').innerHTML=h;
}

function loadMoreCustomer(){

renderCustomerList();

function loadCustomerRecs(id){
// 使用内嵌的推荐商品数据
var recsData = {};
var recs=recsData[id]||recsData["default"]||[];
if(recs.length===0){
document.getElementById('recsContainer').innerHTML='<div class="rc"><div class="rc-tt">暂无推荐商品</div></div>';
return;
}
var h='<div class="rc"><div class="rc-tt">🎁 推荐商品 ('+recs.length+'个)</div>';
recs.forEach(function(r){
// 从productsData匹配获取一批价格和售卖家数
var matchedProduct = productsData.find(function(p) { return p.name === r.name; });
if (matchedProduct) {
    if (!r.price && matchedProduct.batchPrice) r.price = matchedProduct.batchPrice;
    if (!r.sellerCount && matchedProduct.sellerCount) r.sellerCount = matchedProduct.sellerCount;
}
var typeTagClass='tag-b';
var typeBgColor='#e8f0fe';
if(r.type==='品类相关高毛利'||r.type==='品类相关高毛利产品'){
typeTagClass='tag-g';
typeBgColor='#e6f4ea';
}else if(r.type==='高复购率'||r.type==='高复购率产品'){
typeTagClass='tag-y';
typeBgColor='#fef7e0';
}else if(r.type==='行业趋势'||r.type==='行业趋势爆品'){
typeTagClass='tag-p';
typeBgColor='#f3e5f5';
}
var profitDisplay=0;
if(r.profit!==undefined){
profitDisplay=r.profit;
}else if(r.毛利率!==undefined){
profitDisplay=r.毛利率>1?r.毛利率:(r.毛利率*100);
}
var profitColor=profitDisplay>=18?'#137333':(profitDisplay>=13?'#1a73e8':'#e53935');
var priceDisplay=r.price||r.一批价格||0;
var salesCountDisplay=r.sellerCount||r.salesCount||r.售卖家数||r.购买客户数||'-';
var reasonDisplay=r.reason||r.recommend||r.reason||r.recommended||'';
if(!reasonDisplay){
if(r.type==='品类相关高毛利'||r.type==='品类相关高毛利产品'){
reasonDisplay='品类关联高毛利产品，毛利率'+profitDisplay.toFixed(1)+'%';
}else if(r.type==='高复购率'||r.type==='高复购率产品'){
reasonDisplay='高复购率爆品，'+salesCountDisplay+'个客户购买';
}else if(r.type==='行业趋势'||r.type==='行业趋势爆品'){
reasonDisplay='行业趋势爆品，冷冻食材热门品类';
}else if(r.type==='渠道适配'||r.type==='渠道适配爆品'){
reasonDisplay='渠道适配爆品(流通渠道畅销)';
}else{
reasonDisplay=r.type||'系统智能推荐';
}
}
var logicDisplay=r.logic||r.reason||r.recommend||'';
if(!logicDisplay&&r.选品逻辑){
logicDisplay=r.选品逻辑;
}
var scriptDisplay=r.script||r.话术||r.AI话术||r.推销话术||'';
if(!scriptDisplay&&r.AI润色话术){
scriptDisplay=r.AI润色话术;
}
h+='<div class="rc-i">';
h+='<div class="rc-nm"><span style="flex:1;font-weight:600;font-size:13px">'+r.name+'</span></div>';
h+='<div style="display:flex;gap:6px;margin:8px 0;flex-wrap:wrap">';
h+='<div style="flex:1;min-width:70px;padding:6px 8px;background:#f8f9fa;border-radius:6px">';

h+='<div style="background:#fff3e0;padding:6px 8px;border-radius:6px;font-size:11px;line-height:1.4;color:#e65100;margin-bottom:6px">';

            var opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            catSelect.appendChild(opt);
        });

    renderReport();

    renderCustomerList();
});
