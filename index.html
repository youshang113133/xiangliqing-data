<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>湘里情智营v15.1·客户决策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f5;font-size:14px;line-height:1.6;color:#333;max-width:480px;margin:0 auto;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.1);padding-bottom:60px}

/* ===== 全局字体规范 ===== */
body{font-size:14px;line-height:1.6}
.card-tit{font-size:15px;font-weight:600;margin-bottom:12px;color:#1a1a1a}
.big-num{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.assist-text{font-size:12px;color:#999}
.table-text{font-size:9pt;font-family:"SF Mono","Menlo",monospace}

/* ===== 间距规范 ===== */
.pg{padding:12px;padding-bottom:80px}
.pg-hd{padding:14px 12px}
.card{padding:12px;margin-bottom:10px}
.card-inner{padding:12px;background:#f8f9fa;border-radius:8px}
.list-item{margin-bottom:10px}

/* ===== 颜色规范 ===== */
:root{
  --primary:#1a73e8;
  --success:#34a853;
  --warning:#fbbc04;
  --danger:#e53935;
  --neutral:#9aa0a6;
  --text:#333333;
  --text-secondary:#666666;
  --text-hint:#999999;
  --border:#eeeeee;
  --bg:#f5f5f5;
  --card:#ffffff;
  --radius:8px;
  --shadow:0 2px 8px rgba(0,0,0,0.08)
}

/* 登录页 */
#loginPage{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a4fa0 0%,#1a73e8 50%,#4fc3f7 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999}
#loginPage.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:36px 28px;width:90%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,0.25)}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo h1{font-size:26px;color:#1a73e8;margin-bottom:8px;font-weight:600;letter-spacing:1px}
.login-logo p{font-size:12px;color:#888}
.login-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:14px;transition:border-color .2s;-webkit-text-size-adjust:100%}
.login-input:focus{outline:none;border-color:#1a73e8}
.login-btn{width:100%;height:48px;background:#1a73e8;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:2px}
.login-error{color:#e53935;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.login-hint{text-align:center;margin-top:20px;font-size:11px;color:#aaa}

/* 顶部栏 */
.top-bar{background:linear-gradient(135deg,#1a4fa0,#1a73e8);color:#fff;padding:10px 14px;height:44px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.top-bar-l{display:flex;align-items:center;gap:8px}
.top-bar-l h1{font-size:16px;font-weight:600;letter-spacing:0.5px}
.top-bar-r{display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:8px}
.username{font-size:12px;font-weight:500}
.role-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.role-admin{background:rgba(255,255,255,0.3);color:#fff}
.role-manager{background:#fff;color:#1565c0}
.role-sales{background:#fff;color:#2e7d32}
.logout-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer}

/* 页面容器 */
.pg{display:none;background:#f5f5f5}
.pg.on{display:block}
.pg-hd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:16px 14px}
.pg-hd h1{font-size:17px;font-weight:600;letter-spacing:0.5px}
.pg-hd p{font-size:12px;opacity:.9;margin-top:4px}
.search{padding:10px 14px;border:1px solid #e0e0e0;border-radius:20px;font-size:14px;width:100%;margin:10px 0;background:#fff}
.fl{display:flex;gap:6px;margin-bottom:10px}
.fl select{flex:1;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;background:#fff;color:#333}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card-tit{font-size:15px;font-weight:600;margin-bottom:12px;color:#1a1a1a}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;font-size:13px}
.row:last-child{border-bottom:none}
.lb{color:#888}
.vl{color:#333;font-weight:500;font-variant-numeric:tabular-nums}
.vl-r{color:#e53935;font-weight:600}
.vl-g{color:#137333;font-weight:600}
.it{padding:12px;border-bottom:1px solid #eee;cursor:pointer;border-radius:8px;margin-bottom:8px;background:#fff;transition:background .2s}
.it:active{background:#f0f0f0}
.tag{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500}
.tag-g{background:#e6f4ea;color:#137333}
.tag-y{background:#fef7e0;color:#e37400}
.tag-r{background:#fce8e6;color:#c5221f}
.tag-b{background:#e8f0fe;color:#1a73e8}
.tag-p{background:#f3e5f5;color:#7b1fa2}
/* 底部导航栏样式 - 用ID选择器，不用class */
.stat-row{display:flex;padding:12px 0;border-bottom:1px solid #eee;background:#fff}
.stat-item{text-align:center;flex:1}
.stat-num{font-size:20px;font-weight:700;color:#1a73e8;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;color:#999;margin-top:4px}
.prd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prd-card{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.prd-nm{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:6px;line-height:1.4}
.prd-pr{color:#e53935;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums}
.loading{padding:50px;text-align:center;color:#999;font-size:14px}
.loading::after{content:'';display:block;width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px;text-align:center;color:#999;font-size:14px}
.empty::before{content:'🔍';display:block;font-size:50px;margin-bottom:12px}
.more{text-align:center;padding:20px;color:#888;font-size:13px;cursor:pointer}
.more::before{content:'⬇️ ';margin-right:6px}

/* 弹窗 */
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:10000000}
.md.on{display:flex;align-items:flex-end}
.md-ct{background:#fff;width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto;pointer-events:auto}
.md-hd{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.md-tt{font-size:16px;font-weight:600;color:#1a1a1a;max-width:85%;line-height:1.4}
.md-cl{font-size:28px;color:#999;background:none;border:none;cursor:pointer;line-height:1;padding:0 8px}
.md-bd{padding:16px;line-height:1.7}

/* 刷新按钮 */
.refresh-btn{position:fixed;top:56px;right:12px;z-index:99;background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}

/* ===== 工作台样式 ===== */
.workbench-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.wb-section-tit{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* 今日数据 */
.wb-today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;background:#fff;border-radius:10px;padding:4px}
.wb-today-item{text-align:center;padding:14px 6px;background:#f8f9fa;border-radius:10px;transition:transform .2s}
.wb-today-num{font-size:20px;font-weight:700;color:#1a73e8;font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
.wb-today-lbl{font-size:10px;color:#999;margin-top:4px}
.wb-today-comp{font-size:10px;margin-top:4px;font-weight:500;font-variant-numeric:tabular-nums}

/* 进度条 */
.wb-progress-item{margin-bottom:12px}
.wb-progress-label{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px}
.wb-progress-label span:first-child{font-weight:500}
.wb-progress-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.wb-progress-fill{height:100%;border-radius:4px;transition:width .3s;background:#1a73e8}

/* 提成卡片 */
.commission-card{background:#fff8e1;border-radius:10px;padding:14px;margin-top:12px}
.commission-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center}
.commission-item{padding:10px;background:#fff;border-radius:8px}
.commission-val{font-size:16px;font-weight:700;color:#333;font-variant-numeric:tabular-nums}
.commission-lbl{font-size:10px;color:#888;margin-top:4px}
.commission-total{padding:12px;background:#fff;border-radius:8px;margin-top:10px;text-align:center}
.commission-total-lbl{font-size:11px;color:#888}
.commission-total-val{font-size:24px;font-weight:700;color:#e53935;font-variant-numeric:tabular-nums;letter-spacing:-0.5px}

/* 折叠面板 */
.fold-card{background:#fff;border-radius:8px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);overflow:hidden}
.fold-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;background:#fff}
.fold-hd:active{background:#f5f5f5}
.fold-tit{font-size:14px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.fold-badge{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500}
.fold-arrow{font-size:14px;color:#bbb;transition:transform .2s}
.fold-arrow.expanded{transform:rotate(180deg)}
.fold-bd{max-height:0;overflow:hidden;transition:max-height .3s}
.fold-bd.expanded{max-height:500px;overflow-y:auto}
.fold-bd-inner{padding:0 16px 16px}

/* 跟进清单 */
.follow-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #eee}
.follow-item:last-child{border-bottom:none}
.follow-item:active{background:#f8f9fa}
.follow-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;flex-shrink:0;flex-shrink:0}
.follow-dot-r{background:#e53935}
.follow-dot-o{background:#ff9800}
.follow-dot-y{background:#fbc02d}
.follow-dot-g{background:#4caf50}
.follow-info{flex:1;min-width:0}
.follow-name{font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.follow-meta{font-size:11px;color:#999;margin-top:2px}
.follow-action{text-align:right;flex-shrink:0;margin-left:8px}
.follow-days{font-size:12px;color:#666;font-weight:500}

/* 快速报价 */
.quote-btn{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;border:none;border-radius:8px;height:44px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
.quote-btn:active{opacity:0.9}
.quote-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:300}
.quote-modal.on{display:block}
.quote-search{padding:14px;background:#fff;position:sticky;top:0;z-index:1;border-bottom:1px solid #eee}
.quote-input{width:100%;padding:12px 16px;border:1px solid #e0e0e0;border-radius:10px;font-size:16px;-webkit-text-size-adjust:100%}
.quote-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.quote-list{padding:8px 14px}
.quote-item{padding:14px 12px;border-bottom:1px solid #eee;cursor:pointer}
.quote-item:active{background:#f5f5f5}
.quote-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.quote-name{font-size:14px;font-weight:500;color:#333}
.quote-grade{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.quote-item-btm{display:flex;gap:12px;margin-top:8px;font-size:12px;color:#999}
.quote-price{color:#e53935;font-weight:600;font-variant-numeric:tabular-nums}

/* 利润计算器 */
.calc-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;width:90%;max-width:340px;z-index:350;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
.calc-modal.on{display:block}
.calc-head{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.calc-head h3{font-size:16px;font-weight:600}
.calc-body{padding:18px}
.calc-row{margin-bottom:16px}
.calc-label{font-size:12px;color:#666;margin-bottom:6px}
.calc-input{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:16px;text-align:center;-webkit-text-size-adjust:100%}
.calc-result{background:#f8f9fa;border-radius:10px;padding:14px;text-align:center}
.calc-result-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.calc-result-item:last-child{border-bottom:none}
.calc-result-val{font-weight:600;font-size:18px}
.calc-result-val.r{color:#e53935}
.calc-result-val.g{color:#4caf50}
.calc-result-val.y{color:#ff9800}
.calc-btn{width:100%;height:44px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}
.calc-btn:active{background:#1557b0}

/* 同区域对比 */
.compare-section{background:#e3f2fd;border-radius:10px;padding:12px;margin:12px 0}
.compare-tit{font-size:13px;font-weight:600;color:#1565c0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.compare-item{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px}
.compare-item:last-child{margin-bottom:0}
.compare-text{font-size:13px;color:#333;line-height:1.5}

/* 筛选按钮 */
.category-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.cat-btn{padding:6px 12px;border:1px solid #e0e0e0;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:#666;transition:all .2s}
.cat-btn:active{background:#f0f0f0}
.cat-btn.active{background:#c62828;color:#fff;border-color:#1a73e8}

/* ===== 新增模块样式 ===== */

/* 子Tab导航 */
.sub-tabs{display:flex;background:#fff;margin-bottom:12px;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.sub-tab{flex:1;padding:12px;text-align:center;font-size:13px;color:#666;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.sub-tab:active{background:#f0f0f0}
.sub-tab.on{color:#1a73e8;font-weight:600;background:#e8f0fe;border-bottom-color:#1a73e8;position:relative}


/* 终端开拓 */
.terminal-progress{margin-bottom:16px}
.terminal-progress-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin-top:8px}
.terminal-progress-fill{height:100%;border-radius:6px;transition:width .3s;background:linear-gradient(90deg,#1a73e8,#4fc3f7)}
.terminal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.terminal-stat{text-align:center;padding:12px;background:#f8f9fa;border-radius:8px}
.terminal-stat-num{font-size:18px;font-weight:700;color:#1a73e8;font-variant-numeric:tabular-nums}
.terminal-stat-lbl{font-size:10px;color:#999}
.terminal-item{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.terminal-item-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.terminal-name{font-size:14px;font-weight:500;color:#333}
.terminal-type{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.type-canyin{background:#fce8e6;color:#c5221f}
.type-shengxian{background:#e8f5e9;color:#137333}
.type-chaoshi{background:#e3f2fd;color:#1a73e8}
.type-nongmao{background:#fff3e0;color:#e65100}
.terminal-addr{font-size:12px;color:#888;margin-top:6px}
.terminal-contact{font-size:12px;color:#666;margin-top:4px}
.terminal-contact::before{content:'📞 '}
.terminal-actions{display:flex;gap:8px;margin-top:10px}
.terminal-btn{padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#666;transition:all .2s}
.terminal-btn:active{background:#f0f0f0}
.terminal-btn.contacted{border-color:#34a853;background:#e6f4ea;color:#137333}

/* 退货率看板 */
.return-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.return-stat{text-align:center;padding:14px;background:#f8f9fa;border-radius:8px}
.return-stat-num{font-size:18px;font-weight:700;color:#1a73e8;font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
.return-stat-lbl{font-size:10px;color:#999}
.return-line{position:relative;height:40px;margin:12px 0}
.return-line-bar{height:8px;background:#f5f5f5;border-radius:4px;overflow:hidden}
.return-line-fill{height:100%;border-radius:4px}
.return-threshold{position:absolute;width:2px;height:16px;background:#e53935;top:12px}
.return-threshold-label{position:absolute;font-size:10px;color:#e53935;white-space:nowrap;top:22px;left:-20px}
.return-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #eee;cursor:pointer}
.return-row:active{background:#f8f9fa}
.return-rank{width:24px;font-size:12px;color:#999;text-align:center}
.return-name{font-size:13px;font-weight:500;color:#1a1a1a;flex:1}
.return-rate{font-size:14px;font-weight:600;margin-right:8px;font-variant-numeric:tabular-nums}
.return-tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500}
.rate-excellent{background:#e6f4ea;color:#137333}
.rate-good{background:#e8f0fe;color:#1a73e8}
.rate-warning{background:#fef7e0;color:#e37400}
.rate-danger{background:#fce8e6;color:#c5221f}

/* 话术库 */
.scripts-search{padding:12px 14px;background:#f8f9fa;border-radius:8px;margin-bottom:12px}
.scripts-search input{width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff}
.script-category{margin-bottom:16px}
.script-category-tit{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.script-item{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.script-content{font-size:14px;color:#333;line-height:1.7;margin-bottom:10px}
.script-content::before{content:'💬 '}
.script-copy{background:#1a73e8;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.script-copy:active{background:#1557b0}

/* 补货提醒 */
.replenish-item{display:flex;align-items:center;padding:12px;background:#fff;border-radius:8px;margin-bottom:8px;box-shadow:var(--shadow)}
.replenish-info{flex:1}
.replenish-name{font-size:14px;font-weight:500;color:#1a1a1a}
.replenish-meta{font-size:11px;color:#888;margin-top:4px}
.replenish-products{font-size:11px;color:#666;margin-top:2px}
.replenish-btn{background:#ff9800;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.replenish-btn:active{background:#f57c00}
.replenish-overdue{color:#ea4335;font-weight:600}

/* 临期特惠 */
.near-expire-banner{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff;padding:14px;border-radius:8px;margin-bottom:12px;cursor:pointer}
.near-expire-banner:active{opacity:0.9}
.near-expire-tit{font-size:14px;font-weight:600;margin-bottom:4px}
.near-expire-desc{font-size:11px;opacity:0.9}

/* ===== 日期选择器样式 ===== */

/* ===== 数据表格规范 ===== */

function checkLoginStatus() {

function doLogin() {
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errorEl = document.getElementById('loginError');
  if (!username || !password) { errorEl.textContent = '请输入用户名和密码'; return; }
  var account = USER_ACCOUNTS[username];
  if (!account || account.password !== password) { errorEl.textContent = '用户名或密码错误'; return; }

  USER_ROLE = account.role;
  USER_DEPT = account.dept;
  localStorage.setItem('xlq_current_user', JSON.stringify({ username: username, role: account.role, dept: account.dept }));
  showMainInterface();
}

function switchTab(tab) {
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('#mainNav td').forEach(function(n) { n.classList.remove('on'); });
  document.getElementById('pg' + tab).classList.add('on');
  var navEl = document.getElementById('nav' + tab);
  if (navEl) navEl.classList.add('on');
  if (tab === 'Report') { if (!dataLoaded.data_report) { showLoading(); loadDataFile('data_report').then(function() { renderReport(); hideLoading(); }); } else { renderReport(); } }
  else if (tab === 'Workbench') { renderWorkbench(); }
  else if (tab === 'Product') { if (!dataLoaded.data_product) { showLoading(); loadDataFile('data_product').then(function() { applyFixedDataMaps(); renderProduct(); hideLoading(); }); } else { renderProduct(); } }
  else if (tab === 'Customer') { if (!dataLoaded.data_customer) { showLoading(); loadDataFile('data_customer').then(function() { applyCustomerTier(); loadCustomerList(); hideLoading(); }); } else { loadCustomerList(); } }
  else if (tab === 'Target') { if (!dataLoaded.data_terminal) { showLoading(); loadDataFile('data_terminal').then(function() { renderTargetPage(); hideLoading(); }); } else { renderTargetPage(); } }
}

// ===== 数据加载 =====
function showLoading() { var el = document.getElementById('rptContent'); if (el) el.innerHTML = '<div class="loading">加载中...</div>'; }
function hideLoading() {}

async function loadDataFile(key) {
  var info = DATA_FILES[key];
  if (!info || dataLoaded[key]) return true;
  try {
    var url = DATA_BASE + info.file + '?v=' + Date.now();
    console.log('加载数据:', url);
    var response = await fetch(url);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var data = await response.json();
    console.log('数据加载成功:', key, '数据项:', Object.keys(data).length);
    applyDataToGlobals(key, data);
    // 数据加载成功后重新渲染日报页
    if (key === 'data_report' && document.getElementById('pgReport').classList.contains('on')) {
      renderReport();
    }
    return true;
  } catch(e) {
    console.error('数据加载失败:', key, e);
    if (info.required) { var el = document.getElementById('rptContent'); if (el) el.innerHTML = '<div class="empty"><p>数据加载失败</p><p style="font-size:12px;color:#999;margin-top:8px">' + e.message + '</p></div>'; }
    return false;
  }
}

function applyDataToGlobals(key, data) {
  switch(key) {
    case 'data_report': dailyReportData = data.dailyReportData || {}; salesProgressData = data.salesProgressData || []; break;
    case 'data_product': productsData = data.productsData || []; break;
    case 'data_customer': customersData = data.customersData || []; channelTypeMap = data.channelTypeMap || {}; break;
    case 'data_coef': productCoefMap = data.productCoefMap || {}; customerCoefMap = data.customerCoefMap || {}; productMarginMap = data.productMarginMap || {}; productMarginNameMap = data.productMarginNameMap || {}; salesTargetMap = data.salesTargetMap || {}; break;
    case 'data_extra': commissionData = data.commissionData || {}; productPortraitData = data.productPortraitData || {}; customerPortraitData = data.customerPortraitData || {}; customerTierMap = data.customerTierMap || {}; productPriceMap = data.productPriceMap || {}; break;
    case 'data_commission': commissionData = data || {}; break;
    case 'data_terminal': terminalData = data.terminals || []; break;
  }
  dataLoaded[key] = true;
}

async function initData() {
  try {
    // 只加载必要的小文件
    await Promise.all([loadDataFile('data_report'), loadDataFile('data_coef'), loadDataFile('data_customer'), loadDataFile('data_commission')].map(function(p) { return p.catch(function(e) { console.warn('数据加载失败:', e); }); }));
    applyFixedDataMaps();
    applyCustomerTier();
  } catch(e) { console.error('initData error:', e); }
  if (USER_ROLE === 'Admin' || USER_ROLE === 'Manager') { switchTab('Report'); } else { switchTab('Workbench'); }
  // 延迟加载产品数据
  setTimeout(function() { loadDataFile('data_product').catch(function() {}); }, 300);
  // 延迟加载画像数据
  setTimeout(function() { loadDataFile('data_extra').then(function() { applyFixedDataMaps(); applyCustomerTier(); }).catch(function() {}); }, 800);
}

// ===== 模块4：补货提醒 =====
function renderReplenishReminder() {
  var reminders = getReplenishReminders();
  if (reminders.length === 0) return '';
  
  var h = '<div class="fold-card">';
  h += '<div class="fold-hd" onclick="toggleFold(\'replenish\')">';
  h += '<div class="fold-tit">📦 补货提醒 <span class="fold-badge" style="background:#fff3e0;color:#e65100">' + reminders.length + '</span></div>';
  h += '<span class="fold-arrow" id="replenishArrow">▼</span>';
  h += '</div>';
  h += '<div class="fold-bd" id="replenishBd">';
  h += '<div class="fold-bd-inner">';
  
  reminders.slice(0, 5).forEach(function(item) {
    var overdueClass = item.overdue > 7 ? ' replenish-overdue' : '';
    h += '<div class="replenish-item">';
    h += '<div class="replenish-info">';
    h += '<div class="replenish-name' + overdueClass + '">' + item.name + '</div>';
    h += '<div class="replenish-meta">上次采购 ' + item.days + ' 天前</div>';
    h += '<div class="replenish-products">常购: ' + item.products + '</div>';
    h += '</div>';
    h += '<button class="replenish-btn" onclick="event.stopPropagation();showCustomerDetail(\'' + item.id + '\')">提醒</button>';
    h += '</div>';
  });
  
  h += '</div></div></div>';
  return h;
}

function getReplenishReminders() {
  var reminders = [];
  var myCustomers = customersData.filter(function(c) { return c.salesman === CURRENT_USER; });
  var myCustomerIds = myCustomers.map(function(c) { return c.id; });
  
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    if (myCustomerIds.indexOf(id) < 0) return;
    var fp = customerPortraitData[id];
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    // 假设历史采购周期为15天，超过12天就提醒
    if (days >= 12 && days <= 60) {
      var overdue = days - 12;
      reminders.push({
        id: id,
        name: fp.n || '-',
        days: days,
        overdue: overdue,
        products: String(fp.topProducts || '').substring(0, 20) || '常规产品'
      });
    }
  });
  
  reminders.sort(function(a, b) { return b.days - a.days; });
  return reminders;
}

  });

  // 如果数据量太大，限制显示
  var displayTerminals = myTerminals.length > 100 ? myTerminals.slice(0, 100) : myTerminals;

  var total = myTerminals.length;
  var covered = terminalData.filter(function(t) { return (t.dp || t.department) === USER_DEPT && (t.s || t.status) === '已联系'; }).length;
  var rate = (total + covered) > 0 ? Math.round((covered / (total + covered)) * 100) : 0;

  h += '<div class="fold-hd" onclick="toggleFold(\'terminal\')">';

  h += '<div class="terminal-progress-bar"><div class="terminal-progress-fill" style="width:' + rate + '%"></div></div>';
  h += '</div>';

  h += '<div class="category-filter" style="margin-bottom:10px">';

    var tName = t.n || t.name || '';
    var tType = t.t || t.type || '餐饮';
    var tAddr = (t.c || '') + (t.d ? ' ' + t.d : '') + (t.a ? ' ' + t.a : '');
    var tStatus = t.s || t.status || '未联系';

    h += '</div>';

function renderTerminalCoverageRank() {
  var h = '<div class="card">';
  h += '<div class="card-tit">🗺️ 各区域覆盖率</div>';
  
  var depts = Object.keys(DEPT_MEMBERS);
  var ranks = depts.map(function(dept) {
    var deptTerminals = terminalData.filter(function(t) { return t.dp === dept || t.department === dept; });
    var total = deptTerminals.length;
    var covered = deptTerminals.filter(function(t) { return t.s === '已联系' || t.status === '已联系'; }).length;
    var rate = total > 0 ? Math.round((covered / total) * 100) : 0;
    return { dept: dept, rate: rate, total: total, covered: covered };
  });
  ranks.sort(function(a, b) { return b.rate - a.rate; });
  
  h += '<div class="coverage-rank">';
  ranks.forEach(function(item, idx) {
    h += '<div class="coverage-item">';
    h += '<span class="coverage-rank-num">' + (idx + 1) + '</span>';
    h += '<span class="coverage-dept">' + item.dept + '</span>';
    h += '<span class="coverage-percent">' + item.rate + '%</span>';
    h += '</div>';
  });
  h += '</div>';
  h += '</div>';
  return h;
}

function getMyRegion() {
  var region = '湖南省';
  if (USER_DEPT === '长株潭业务部') region = '长沙';
  else if (USER_DEPT === '省内业务部') region = '衡阳';
  else if (USER_DEPT === '省外业务部') region = '湖北';
  return region;
}

function getTerminalTypeClass(type) {
  switch(type) {
    case '餐饮': return 'type-canyin';
    case '生鲜超市': return 'type-shengxian';
    case '超市': return 'type-chaoshi';
    case '农贸市场': return 'type-nongmao';
    default: return 'type-canyin';
  }
}

function generateMockTerminals(region, count) {
  var types = ['餐饮', '生鲜超市', '超市', '农贸市场'];
  var names = ['XX饭店', 'XX超市', 'XX农贸市场', 'XX生鲜店', 'XX火锅店', 'XX酒楼', 'XX快餐店', 'XX食堂', 'XX配送中心', 'XX批发部'];

      status: '未联系'

// ===== 沉默客户激活模块 =====
var activatedCustomers = {};

function renderTargetSilent() {
  var container = document.getElementById('targetSilent');
  var today = new Date();
  var silentCustomers = [];
  
  customersData.forEach(function(c) {
    var lastDate = c.lastDate ? new Date(c.lastDate) : null;
    var silentDays = 0;
    if (lastDate) {
      silentDays = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
    }
    if (silentDays >= 30) {
      var valueLevel = 'normal';
      var valueTagClass = 'silent-value-normal';
      if (c.level && (c.level.indexOf('A类') >= 0 || c.level.indexOf('重要') >= 0)) {
        valueLevel = 'high';
        valueTagClass = 'silent-value-high';
      } else if (c.level && c.level.indexOf('B类') >= 0) {
        valueLevel = 'mid';
        valueTagClass = 'silent-value-mid';
      }
      var avgMonthly = c.monthlySales || 0;
      var isActivated = activatedCustomers[c.id] === today.toDateString();
      silentCustomers.push({
        id: c.id,
        name: c.name,
        salesman: c.salesman || '未知',
        silentDays: silentDays,
        valueLevel: valueLevel,
        valueTagClass: valueTagClass,
        valueLabel: valueLevel === 'high' ? '高价值' : (valueLevel === 'mid' ? '中价值' : '普通'),
        avgMonthly: avgMonthly,
        lastDate: c.lastDate || '-',
        isActivated: isActivated,
        warning: c.warning || ''
      });
    }
  });
  
  silentCustomers.sort(function(a, b) {
    if (a.valueLevel !== b.valueLevel) {
      var levelOrder = { high: 0, mid: 1, normal: 2 };
      return levelOrder[a.valueLevel] - levelOrder[b.valueLevel];
    }
    return b.silentDays - a.silentDays;
  });
  
  var h = '';
  var highCount = silentCustomers.filter(function(c) { return c.valueLevel === 'high'; }).length;
  var midCount = silentCustomers.filter(function(c) { return c.valueLevel === 'mid'; }).length;
  var normalCount = silentCustomers.filter(function(c) { return c.valueLevel === 'normal'; }).length;
  
  h += '<div class="silent-card"><div class="silent-header"><div class="silent-title">⚡ 沉默客户激活</div><div class="silent-bonus">激活奖励×1.5</div></div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
  h += '<div style="text-align:center;padding:10px;background:#fce8e6;border-radius:8px"><div style="font-size:18px;font-weight:700;color:#c5221f">' + highCount + '</div><div style="font-size:10px;color:#888">高价值</div></div>';
  h += '<div style="text-align:center;padding:10px;background:#fff3e0;border-radius:8px"><div style="font-size:18px;font-weight:700;color:#e65100">' + midCount + '</div><div style="font-size:10px;color:#888">中价值</div></div>';
  h += '<div style="text-align:center;padding:10px;background:#f5f5f5;border-radius:8px"><div style="font-size:18px;font-weight:700;color:#666">' + normalCount + '</div><div style="font-size:10px;color:#888">普通</div></div>';
  h += '</div><div style="font-size:11px;color:#888;text-align:center">共 ' + silentCustomers.length + ' 个沉默客户（30天+未下单）</div></div>';
  
  h += '<div class="category-filter">';
  h += '<button class="cat-btn active" data-filter="all" onclick="filterSilentCustomers(\'all\')">全部</button>';
  h += '<button class="cat-btn" data-filter="high" onclick="filterSilentCustomers(\'high\')">高价值</button>';
  h += '<button class="cat-btn" data-filter="mid" onclick="filterSilentCustomers(\'mid\')">中价值</button>';
  h += '<button class="cat-btn" data-filter="normal" onclick="filterSilentCustomers(\'normal\')">普通</button>';
  h += '</div>';
  
  h += '<div id="silentCustomerList">';
  silentCustomers.forEach(function(c) {
    h += '<div class="silent-item" data-value="' + c.valueLevel + '">';
    h += '<span class="silent-value-badge ' + c.valueTagClass + '">' + c.valueLabel + '</span>';
    h += '<div class="silent-name">' + c.name + '<div class="silent-meta">沉默 ' + c.silentDays + ' 天 | 最后 ' + c.lastDate;
    if (c.avgMonthly > 0) h += ' | 月均 ' + fmtAmt(c.avgMonthly);
    h += '</div>';
    if (c.warning) h += '<div class="silent-meta" style="color:#e53935">' + c.warning + '</div>';
    h += '</div>';
    if (c.isActivated) {
      h += '<button class="silent-action" style="background:#4caf50" disabled>已跟进</button>';
    } else {
      h += '<button class="silent-action" onclick="activateCustomer(\'' + c.id + '\')">激活</button>';
    }
    h += '</div>';
  });
  
  if (silentCustomers.length === 0) {
    h += '<div class="empty">暂无沉默客户，继续保持！</div>';
  }
  h += '</div>';
  
  container.innerHTML = h;
  window.currentSilentCustomers = silentCustomers;
}

function filterSilentCustomers(filter) {
  document.querySelectorAll('.category-filter .cat-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  var items = document.querySelectorAll('#silentCustomerList .silent-item');
  items.forEach(function(item) {
    if (filter === 'all' || item.dataset.value === filter) {
      item.style.display = '';
    } else {
      item.style.display = 'none';
    }
  });
}

function activateCustomer(customerId) {
  activatedCustomers[customerId] = new Date().toDateString();
  renderTargetSilent();
  alert('已标记为已跟进！\n请记得实际联系客户并记录跟进结果。');
}

// ===== 排行榜渲染 =====
function renderTargetRank() {
  var container = document.getElementById('targetRank');
  var salesData = salesProgressData || [];
  
  var salesmen = salesData.filter(function(p) {
    return p['业务经理'] !== '小计' && p['业务经理'] !== '公司合计' && p['业务经理'] !== '总计';
  });
  
  var salesRank = salesmen.slice().sort(function(a, b) {
    return (b['月销售额'] || 0) - (a['月销售额'] || 0);

// ===== 跟进日历渲染 =====
function renderTargetCalendar() {
  var container = document.getElementById('targetCalendar');
  var year = currentCalendarMonth.getFullYear();
  var month = currentCalendarMonth.getMonth();
  
  if (!calendarEventCache) {
    calendarEventCache = buildCalendarEvents();
  }
  
  // 直接从calendarEventCache按日期字符串匹配
  var monthPrefix = year + '-' + String(month + 1).padStart(2, '0');
  
  var firstDay = new Date(year, month, 1);
  var lastDay = new Date(year, month + 1, 0);
  var startDay = firstDay.getDay();
  var today = new Date();
  var isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
  
  var monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
  
  var h = '';
  h += '<div class="calendar-container"><div class="calendar-header"><div class="calendar-nav">';
  h += '<button class="calendar-nav-btn" onclick="prevCalendarMonth()">‹</button>';
  h += '<button class="calendar-nav-btn" onclick="nextCalendarMonth()">›</button>';
  h += '</div><div class="calendar-month">' + year + '年' + monthNames[month] + '</div>';
  h += '<button class="btn btn-primary" style="padding:4px 10px;font-size:11px" onclick="goToToday()">今天</button></div>';
  
  h += '<div class="calendar-grid">';
  var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  weekdays.forEach(function(d) { h += '<div class="calendar-weekday">' + d + '</div>'; });
  
  var dayCount = 1;
  var totalCells = Math.ceil((startDay + lastDay.getDate()) / 7) * 7;
  
  for (var i = 0; i < totalCells; i++) {
    if (i < startDay || dayCount > lastDay.getDate()) {
      h += '<div class="calendar-day other-month"></div>';
    } else {
      var dayNum = dayCount;
      var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(dayNum).padStart(2, '0');
      var events = calendarEventCache[dateStr] || [];
      var dayClasses = ['calendar-day'];
      
      if (isCurrentMonth && dayNum === today.getDate()) dayClasses.push('today');
      
      var hasRisk = events.some(function(e) { return e.type === 'risk'; });
      var hasUrgent = events.some(function(e) { return e.type === 'urgent'; });
      var hasWarning = events.some(function(e) { return e.type === 'warning'; });
      var hasTask = events.some(function(e) { return e.type === 'task'; });
      
      if (hasRisk) dayClasses.push('has-risk');
      else if (hasUrgent) dayClasses.push('has-urgent');
      else if (hasWarning) dayClasses.push('has-warning');
      else if (hasTask) dayClasses.push('has-task');
      
      h += '<div class="' + dayClasses.join(' ') + '" onclick="showDayDetail(\'' + dateStr + '\')">' + dayNum + '</div>';
      dayCount++;
    }
  }
  h += '</div>';
  
  h += '<div class="calendar-legend">';
  h += '<div class="calendar-legend-item"><div class="calendar-legend-dot" style="background:#1a73e8"></div>跟进任务</div>';
  h += '<div class="calendar-legend-item"><div class="calendar-legend-dot" style="background:#e53935"></div>风险客户</div>';
  h += '<div class="calendar-legend-item"><div class="calendar-legend-dot" style="background:#ff9800"></div>紧急事项</div>';
  h += '<div class="calendar-legend-item"><div class="calendar-legend-dot" style="background:#fbc02d"></div>预警</div>';
  h += '</div></div>';
  
  var todayKey = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  var todayEvents = calendarEventCache[todayKey] || [];
  
  h += '<div class="silent-card" style="margin-top:12px"><div class="silent-header"><div class="silent-title">📋 今日事项</div></div>';
  
  if (todayEvents.length === 0) {
    h += '<div style="text-align:center;padding:20px;color:#888;font-size:13px">暂无待办事项</div>';
  } else {
    todayEvents.forEach(function(evt) {
      var typeColor = evt.type === 'risk' ? '#e53935' : (evt.type === 'urgent' ? '#ff9800' : (evt.type === 'warning' ? '#fbc02d' : '#1a73e8'));
      h += '<div class="silent-item"><div style="width:8px;height:8px;border-radius:50%;background:' + typeColor + ';margin-right:10px"></div>';
      h += '<div class="silent-name">' + evt.name + '<br><span class="silent-meta">' + evt.desc + '</span></div></div>';
    });
  }
  h += '</div>';
  
  container.innerHTML = h;
}

function buildCalendarEvents() {
  var cache = {};
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  
  var followPlanData = window.followPlanData || [];
  followPlanData.forEach(function(fp) {
    if (fp.nd) {
      var dateKey = fp.nd;
      if (!cache[dateKey]) cache[dateKey] = [];
      cache[dateKey].push({ type: 'task', name: '跟进任务', desc: fp.n || '待跟进' });
    }
  });
  
  customersData.forEach(function(c) {
    if (c.isOverdue) {
      var dateKey = c.nextDate || todayStr;
      if (!cache[dateKey]) cache[dateKey] = [];
      cache[dateKey].push({ type: 'risk', name: '风险客户', desc: c.name });
    }
  });
  
  customersData.forEach(function(c) {
    if (c.warning && c.warning.indexOf('预警') >= 0) {
      var dateKey = c.nextDate || todayStr;
      if (!cache[dateKey]) cache[dateKey] = [];
      cache[dateKey].push({ type: 'warning', name: '客户预警', desc: c.name });
    }
  });
  
  return cache;
}

function prevCalendarMonth() {
  currentCalendarMonth.setMonth(currentCalendarMonth.getMonth() - 1);
  calendarEventCache = null;  // 清空缓存，强制重建
  renderTargetCalendar();
}

function nextCalendarMonth() {
  currentCalendarMonth.setMonth(currentCalendarMonth.getMonth() + 1);
  calendarEventCache = null;  // 清空缓存，强制重建
  renderTargetCalendar();
}

function goToToday() {
  currentCalendarMonth = new Date();
  renderTargetCalendar();
}

function showDayDetail(dateStr) {
  var events = calendarEventCache[dateStr] || [];
  
  if (events.length === 0) {
    alert(dateStr + '\n暂无待办事项');
    return;
  }
  
  var msg = dateStr + '\n━━━━━━━━━━━━━━━━\n';
  events.forEach(function(evt) {
    var typeLabel = evt.type === 'risk' ? '🔴' : (evt.type === 'urgent' ? '🟠' : (evt.type === 'warning' ? '🟡' : '🔵'));
    msg += typeLabel + ' ' + evt.name + '\n   ' + evt.desc + '\n';
  });
  
  alert(msg);
}

function getCategoryIcon(cat) {
  var icons = {
    '新客户开发': '🎯',
    '流失挽回': '🔄',
    '压价应对': '💰',
    '催款': '📅',
    '新品推广': '🆕',
    '竞品应对': '🆚'
  };
  return icons[cat] || '💬';
}

function escapeQuote(str) {
  return String(str).replace(/'/g, "\\'").replace(/\n/g, '\\n');
}

function copyScript(btn, script) {
  var text = String(script).replace(/\\n/g, '\n').replace(/\\'/g, "'");
  navigator.clipboard.writeText(text).then(function() {
    var originalText = btn.textContent;
    btn.textContent = '✓ 已复制';
    btn.style.background = '#34a853';
    setTimeout(function() {
      btn.textContent = originalText;
      btn.style.background = '#1a73e8';
    }, 1500);
  }).catch(function() {
    // Fallback for older browsers
    var textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    btn.textContent = '✓ 已复制';
    setTimeout(function() { btn.textContent = '📋 复制'; }, 1500);
  });
}

function getFollowStats(username) {
  var stats = { risk: 0, urgent: 0, normal: 0, silent: 0, needFollow: 0 };
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    if (fp.sm !== username) return;
    var tc = String(fp.tc || '');
    if (tc === '沉默') { stats.silent++; return; }
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    if (days > 30) { stats.risk++; stats.needFollow++; }
    else if (days > 15) { stats.urgent++; stats.needFollow++; }
    else if (days > 7) { stats.normal++; stats.needFollow++; }
  });
  return stats;
}

function getFollowList(username, showAll) {
  var list = [];
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    if (fp.sm !== username) return;
    var tc = String(fp.tc || '');
    if (tc === '沉默') {
      var totalAmt = parseFloat(fp.tpa || 0);
      var valueTag = totalAmt > 50000 ? '💎' : (totalAmt > 10000 ? '💰' : '📦');
      var valueLabel = totalAmt > 50000 ? '高价值' : (totalAmt > 10000 ? '中价值' : '普通');
      list.push({ id: id, name: fp.n || '-', days: 0, urgency: 'silent', valueTag: valueTag, valueLabel: valueLabel, totalAmt: totalAmt });
      return;
    }
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    var urgency = '', action = '';
    if (days > 30) { urgency = 'risk'; action = '建议拜访'; }
    else if (days > 15) { urgency = 'urgent'; action = '急待跟进'; }
    else if (days > 7) { urgency = 'normal'; action = '待跟进'; }
    else if (showAll) { urgency = 'ok'; action = '常规回访'; }
    else return;
    list.push({ id: id, name: fp.n || '-', days: days, urgency: urgency, action: action });
  });
  list.sort(function(a, b) {
    var p = { risk: 3, urgent: 2, normal: 1, ok: 0 };
    if (p[a.urgency] !== p[b.urgency]) return p[b.urgency] - p[a.urgency];
    return b.days - a.days;
  });
  return list;
}

function getTodayData(username) {
  var result = { todaySales: 0, todayOrders: 0, todayNewCust: 0, yesterdaySales: 0 };
  if (!salesProgressData) return result;
  // 从日报数据获取公司当日总销售额和订单数
  var companyTodaySales = 0, companyTodayOrders = 0;
  if (dailyReportData && dailyReportData['核心经营指标']) {

    companyTodaySales = (kpi['销售额'] || {})['当日'] || 0;
    companyTodayOrders = (kpi['订单数'] || {})['当日'] || 0;
  }
  // 从salesProgressData读取"当日销售额"字段
  for (var i = 0; i < salesProgressData.length; i++) {
    var p = salesProgressData[i];
    if (p['业务经理'] === username) {
      // 优先使用"当日销售额"字段，如果没有则显示"-"（用特殊值-1表示）
      if (p['当日销售额'] !== undefined) {
        result.todaySales = p['当日销售额'];
      } else {
        result.todaySales = -1; // 表示无数据，显示"-"
      }
      break;
    }
  }
  if (customersData) {
    var today = new Date().toISOString().slice(0, 10);
    customersData.forEach(function(c) {
      if (c.salesman === username && c.createDate && String(c.createDate).slice(0, 10) === today) result.todayNewCust++;
    });
  }
  return result;
}

function getMyProgress(username) {
  var result = { totalRate: 0, core1Rate: 0, core2Rate: 0, bf8Rate: 0, selfRate: 0, commission: 0, perfSalary: 2000, cashBonus: 0, totalIncome: 2000 };
  if (!salesProgressData) return result;
  var myData = null;
  for (var i = 0; i < salesProgressData.length; i++) {
    if (salesProgressData[i]['业务经理'] === username) { myData = salesProgressData[i]; break; }
  }
  if (!myData) return result;
  var sales = myData['月销售额'] || 0;
  var target = getSalesTarget(username);
  var profitTarget = target.profitTarget || (target.salesTarget * 0.13);
  var actualProfit = sales * parseFloat(myData['月累计毛利率'] || 0) / 100;
  result.totalRate = profitTarget > 0 ? Math.min(actualProfit / profitTarget * 100, 100) : 0;
  // 从 commissionData 的 productBreakdown 读取真实分类毛利
  var myCommission = commissionData && commissionData[username] ? commissionData[username] : null;
  var myBreakdown = myCommission ? (myCommission.productBreakdown || {}) : {};
  var core1Profit = myBreakdown['核心1类'] ? (myBreakdown['核心1类'].weightedProfit || myBreakdown['核心1类'].profit || 0) : 0;
  var selfProfit = myBreakdown['自主'] ? (myBreakdown['自主'].weightedProfit || myBreakdown['自主'].profit || 0) : 0;
  var normalProfit = myBreakdown['常规'] ? (myBreakdown['常规'].weightedProfit || myBreakdown['常规'].profit || 0) : 0;
  var core1Target = (target.salesTarget || 0) * 0.3 * 0.13;
  var selfTarget = (target.salesTarget || 0) * 0.15 * 0.13;
  result.core1Rate = core1Target > 0 ? Math.min(core1Profit / core1Target * 100, 100) : (core1Profit > 0 ? 100 : 0);
  result.core2Rate = profitTarget > 0 ? Math.min((actualProfit - core1Profit - selfProfit - normalProfit) / (profitTarget * 0.25) * 100, 100) : 0;
  result.bf8Rate = 0;
  result.selfRate = selfTarget > 0 ? Math.min(selfProfit / selfTarget * 100, 100) : (selfProfit > 0 ? 100 : 0);
  // 从 commissionData 读取真实加权毛利
  var weightedProfit = myCommission ? (myCommission.weightedProfit || actualProfit) : actualProfit;
  result.commission = weightedProfit * getCommissionRate(weightedProfit);
  result.perfSalary = getPerfSalary(actualProfit);
  result.cashBonus = getCashBonus(weightedProfit);
  result.totalIncome = 2000 + result.perfSalary + Math.round(result.commission) + result.cashBonus;
  return result;
}

function getCommissionRate(p) {
  if (p <= 50000) return 0.025;
  if (p <= 100000) return 0.03;
  if (p <= 200000) return 0.035;
  if (p <= 300000) return 0.04;
  return 0.05;
}

function getPerfSalary(profit) {
  if (profit >= 200000) return 3500;
  if (profit >= 130000) return 3000;
  if (profit >= 80000) return 2500;
  return 2000;
}

function getCashBonus(p) {
  if (p >= 260000) return 2000;
  if (p >= 200000) return 1500;
  if (p >= 130000) return 1000;
  return 0;
}

function getSalesTarget(salesmanName) {
  var target = salesTargetMap[salesmanName];
  if (target) return target;
  return { salesTarget: 0, profitTarget: 0 };
}

function getDaysSince(dateStr) {
  if (!dateStr) return 999;
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var lastDate = new Date(dateStr); lastDate.setHours(0, 0, 0, 0);
  return Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
}

      if (currentProductCategory === '核心2类') return pType === '核心产品'; // 暂归类为核心
      if (currentProductCategory === '自主产品') return pType === '自主产品';
      if (currentProductCategory === '常规') return pType === '其他' || !pType;
      return false;
    });
  }
  var profitFilter = document.getElementById('pProfitRange').value;
  if (profitFilter === 'high') sorted = sorted.filter(function(p) { return (p.realProfitRate || p.profit || 0) >= 15; });
  else if (profitFilter === 'mid') sorted = sorted.filter(function(p) { var r = p.realProfitRate || p.profit || 0; return r >= 10 && r < 15; });
  else if (profitFilter === 'low') sorted = sorted.filter(function(p) { return (p.realProfitRate || p.profit || 0) < 10; });
  
  var h = '<div style="font-size:11px;color:#888;margin-bottom:10px">共' + sorted.length + '个产品</div><div class="prd-grid">';
  sorted.forEach(function(p) {

    var profitColor = profit >= 15 ? '#137333' : (profit >= 10 ? '#1a73e8' : '#e53935');
    var gradeTag = '<span style="background:#f0f0f0;color:#888;padding:2px 6px;border-radius:4px;font-size:10px">常规</span>';

    h += '<div style="text-align:center"><div style="font-size:10px;color:#888">一批价</div><div style="font-size:14px;font-weight:700;color:#e53935">' + (p.price1B > 0 ? p.price1B.toFixed(1) : '-') + '</div></div>';
    h += '<div style="text-align:center"><div style="font-size:10px;color:#888">毛利率</div><div style="font-size:14px;font-weight:700;color:' + profitColor + '">' + profit.toFixed(1) + '%</div></div>';
    h += '</div>';
    h += '<div style="margin-top:8px;text-align:center"><button onclick="event.stopPropagation();openCalcFromProduct(\'' + p.code + '\',\'' + p.name + '\',' + (p.price1B > 0 ? p.price1B : 0) + ',' + (p.retailPrice || 0) + ')" style="padding:4px 12px;background:#fff8e1;border:1px solid #e0e0e0;border-radius:12px;font-size:11px;cursor:pointer">计算利润</button></div>';

  h += '</div>';
  if (sorted.length === 0) h = '<div class="empty"><p>未找到匹配的产品</p></div>';

  var k = document.getElementById('quoteInput').value.trim().toLowerCase();
  if (k.length < 1) {
    document.getElementById('quoteList').innerHTML = '<div style="text-align:center;padding:40px;color:#888">输入关键词开始搜索</div>';

  }
  var results = productsData.filter(function(p) {
    return String(p.name || '').toLowerCase().indexOf(k) >= 0 || String(p.code || '').toLowerCase().indexOf(k) >= 0;
  }).slice(0, 20);
  
  if (results.length === 0) {
    document.getElementById('quoteList').innerHTML = '<div style="text-align:center;padding:40px;color:#888">未找到匹配产品</div>';
    return;
  }
  
  var h = '';
  results.forEach(function(p) {
    var profit = p.realProfitRate || p.profit || 0;
    var profitColor = profit >= 15 ? '#137333' : (profit >= 10 ? '#1a73e8' : '#e53935');
    var grade = p.coefCat || '常规';
    var gradeStyle = grade === '自主产品' ? 'background:#e8f0fe;color:#1a73e8' : (grade === '核心1类' ? 'background:#fce8e6;color:#c5221f' : (grade === '核心2类' ? 'background:#fff3e0;color:#e65100' : 'background:#f5f5f5;color:#888'));
    var retail = p.retailPrice || (p.price1B > 0 ? (p.price1B * 1.3).toFixed(1) : '-');
    h += '<div class="quote-item" onclick="showProductDetail(\'' + p.code + '\')">';
    h += '<div class="quote-item-top"><span class="quote-name">' + p.name + '</span><span class="quote-grade" style="' + gradeStyle + '">' + grade + '</span></div>';
    h += '<div class="quote-item-btm"><span>一批价: <span class="quote-price">¥' + (p.price1B > 0 ? p.price1B.toFixed(2) : '-') + '</span></span><span>建议零售: ¥' + retail + '</span><span style="color:' + profitColor + '">' + profit.toFixed(1) + '%</span></div>';
    h += '</div>';
  });
  document.getElementById('quoteList').innerHTML = h;
}

function openCalcFromProduct(code, name, cost, retail) {
  document.getElementById('calcProductName').textContent = name;
  document.getElementById('calcCost').value = cost > 0 ? cost.toFixed(2) : '';
  document.getElementById('calcRetail').value = retail > 0 ? retail.toFixed(2) : '';
  document.getElementById('calcPrice').value = '';
  document.getElementById('calcProfitVal').textContent = '-';
  document.getElementById('calcProfitVal').className = 'calc-result-val';
  document.getElementById('calcRateVal').textContent = '-';
  document.getElementById('calcRateVal').className = 'calc-result-val';
  document.getElementById('calcModal').classList.add('on');
  closeMd();
  closeQuoteModal();
  setTimeout(function() { document.getElementById('calcPrice').focus(); }, 100);
}

function closeCalcModal() {
  document.getElementById('calcModal').classList.remove('on');
}

function calcProfit() {
  var cost = parseFloat(document.getElementById('calcCost').value) || 0;
  var price = parseFloat(document.getElementById('calcPrice').value) || 0;
  if (price <= 0) {
    document.getElementById('calcProfitVal').textContent = '-';
    document.getElementById('calcRateVal').textContent = '-';
    return;
  }
  var profit = price - cost;
  var rate = (profit / price * 100);
  var rateClass = rate >= 15 ? 'g' : (rate >= 10 ? 'y' : 'r');
  document.getElementById('calcProfitVal').textContent = '¥' + profit.toFixed(2);
  document.getElementById('calcProfitVal').className = 'calc-result-val ' + rateClass;
  document.getElementById('calcRateVal').textContent = rate.toFixed(1) + '%';
  document.getElementById('calcRateVal').className = 'calc-result-val ' + rateClass;
}

function initFollowList() {
  var list = [];
  var stats = { risk: 0, urgent: 0, normal: 0, total: 0 };
  Object.keys(customerPortraitData || {}).forEach(function(id) {
    var fp = customerPortraitData[id];
    var tc = String(fp.tc || '');
    if (tc === '沉默') return;
    var lpd = String(fp.lpd || '');
    if (!lpd) return;
    var days = getDaysSince(lpd);
    if (days <= 7) return;
    stats.total++;
    if (days > 30) stats.risk++;
    else if (days > 15) stats.urgent++;
    else normal++;
    list.push({ id: id, name: fp.n || '-', days: days, urgency: days > 30 ? 'risk' : (days > 15 ? 'urgent' : 'normal') });
  });
  list.sort(function(a, b) {
    var p = { risk: 3, urgent: 2, normal: 1 };
    if (p[a.urgency] !== p[b.urgency]) return p[b.urgency] - p[a.urgency];
    return b.days - a.days;
  });
  document.getElementById('followBadge').textContent = stats.total;
  var h = '';
  list.slice(0, 10).forEach(function(item) {
    var dotClass = item.urgency === 'risk' ? 'follow-dot-r' : (item.urgency === 'urgent' ? 'follow-dot-o' : 'follow-dot-y');

// TODO: 对接T+客户数据API后增强谈判弹药数据来源
function getRegionCompare(customerId, region) {
  var result = [];
  if (!region) return result;
  
  // 找出同区域其他客户（放宽权限检查，确保能获取到数据）
  var sameRegionCustomers = customersData.filter(function(c) {
    if (c.id === customerId) return false;
    if (c.region !== region) return false;
    // 业务员只能看自己客户，但Admin和Manager可以看所有同区域客户
    if (USER_ROLE === 'Sales' && c.salesman !== CURRENT_USER) return false;
    if (USER_ROLE === 'Manager') { var members = DEPT_MEMBERS[USER_DEPT] || []; if (members.indexOf(c.salesman) < 0 && c.salesman !== CURRENT_USER) return false; }
    return true;
  });
  
  // 如果通过权限过滤后没有客户，尝试获取所有同区域客户（仅用于生成话术参考）
  if (sameRegionCustomers.length === 0) {
    sameRegionCustomers = customersData.filter(function(c) {
      if (c.id === customerId) return false;
      return c.region === region;
    });
  }
  
  if (sameRegionCustomers.length === 0) {
    // 没有同区域客户时，基于该客户的画像数据生成话术
    var fp = customerPortraitData[customerId] || {};
    var tc = customerCoefMap[customerId] || {};
    if (fp.categories || fp.lpd || tc.cat) {
      result.push('建议关注客户采购周期，及时跟进补货需求');
      if (tc.cat) result.push('该客户为' + tc.cat + '客户，可参考同类客户采购偏好');
    }
    return result;
  }
  
  // 统计品类（基于客户画像数据）
  var categoryStats = {};
  sameRegionCustomers.forEach(function(c) {
    var fp = customerPortraitData[c.id] || {};
    var cats = String(fp.categories || '').split(',');
    cats.forEach(function(cat) {
      cat = cat.trim();
      if (!cat) return;
      if (!categoryStats[cat]) categoryStats[cat] = { count: 0, profit: 0 };
      categoryStats[cat].count++;
      categoryStats[cat].profit += parseFloat(fp.avgProfit || 0);
    });
  });
  
  // 基于其他字段生成话术（当没有categories数据时）
  if (Object.keys(categoryStats).length === 0) {
    var cust = customersData.find(function(c) { return c.id === customerId; }) || {};
    var fp = customerPortraitData[customerId] || {};
    
    // 基于采购频次生成话术
    var avgPurchaseCount = sameRegionCustomers.reduce(function(sum, c) {
      var cfp = customerPortraitData[c.id] || {};
      return sum + (parseInt(cfp.pc) || 0);
    }, 0) / sameRegionCustomers.length;
    
    if (avgPurchaseCount > 5) {
      result.push('同区域' + sameRegionCustomers.length + '家客户平均月采购' + avgPurchaseCount.toFixed(0) + '次，您可以加强跟进频率');
    }
    
    // 基于最近采购日期生成话术
    var recentCount = sameRegionCustomers.filter(function(c) {
      var cfp = customerPortraitData[c.id] || {};
      return cfp.lpd && getDaysSince(cfp.lpd) <= 7;
    }).length;
    
    if (recentCount > 0) {
      result.push('同区域' + recentCount + '家客户本周有采购，可参考其采购节奏');
    }
    
    // 基于毛利数据生成话术
    var avgProfit = sameRegionCustomers.reduce(function(sum, c) {
      var cfp = customerPortraitData[c.id] || {};
      return sum + (parseFloat(cfp.avgProfit) || 0);
    }, 0) / sameRegionCustomers.length;
    
    if (avgProfit > 0) {
      result.push('同区域客户平均毛利约' + avgProfit.toFixed(1) + '%，可参考定价策略');
    }
    
    if (result.length === 0) {
      result.push('同区域有' + sameRegionCustomers.length + '家客户，建议加强关系维护');
    }
    
    return result;
  }
  
  // 生成话术
  var catList = Object.keys(categoryStats).slice(0, 5);
  catList.forEach(function(cat) {
    var stat = categoryStats[cat];
    var pct = ((stat.count / sameRegionCustomers.length) * 100).toFixed(0);
    var avgProfit = stat.count > 0 ? (stat.profit / stat.count).toFixed(1) : '0';
    result.push('同区域' + sameRegionCustomers.length + '家客户中，' + pct + '%在采购【' + cat + '】，您可以考虑');
    if (parseFloat(avgProfit) > 10) {
      result.push('采购【' + cat + '】的客户毛利表现良好，建议重点推广');
    }
  });
  
  return result;
}

// 辅助函数：计算距离某日期的天数
function getDaysSince(dateStr) {
  if (!dateStr) return 999;
  try {
    var parts = dateStr.split('-');
    if (parts.length !== 3) return 999;
    var date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var now = new Date();
    var diff = now - date;
    return Math.floor(diff / (1000 * 60 * 60 * 24));
  } catch(e) {
    return 999;
  }
}

function applyFixedDataMaps() {
  productsData.forEach(function(p) {
    var margin = productMarginMap[p.code];
    if (margin === undefined) margin = productMarginNameMap[p.name];
    // 确保margin是百分比形式(0-100)，不是小数(0-1)
    if (margin !== undefined) {
      if (margin > 1) {  // 如果大于1，说明已经是百分比形式
        p.realProfitRate = margin;
        p.profit = margin;
      } else {  // 如果<=1，说明是小数形式，转换为百分比
        p.realProfitRate = margin * 100;
        p.profit = margin * 100;
      }
    }
    var coefInfo = productCoefMap[p.code];
    if (coefInfo) { p.coefCat = coefInfo.cat; p.coef = coefInfo.coef; }
    else { p.coefCat = '常规'; p.coef = 1.0; }
  });
}

// 格式化数字（千分位，保留1位小数）
function fmtNum(num) {
  if (num === null || num === undefined || isNaN(num)) return '0';
  var n = parseFloat(num);
  if (Math.abs(n) >= 10000) {
    return (n / 10000).toFixed(1) + '万';

  return n.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
}

// ===== 企微OAuth2免密登录 =====
function checkWecomLogin() {
  // 1. 检查localStorage是否有企微登录信息
  var wecomUser = localStorage.getItem('wecom_user');
  if (wecomUser) {
    try {
      var userData = JSON.parse(wecomUser);
      var wecomUserTime = parseInt(localStorage.getItem('wecom_user_time') || '0');
      // 企微登录信息有效期7天
      if (Date.now() - wecomUserTime < 7 * 24 * 60 * 60 * 1000) {
        applyWecomUser(userData);
        return true;
      }
    } catch(e) {}
  }
  
  // 2. 检查URL是否有code参数（OAuth2回调）
  var urlParams = new URLSearchParams(window.location.search);
  var code = urlParams.get('code');
  if (code) {
    // 清除URL中的code参数
    var cleanUrl = window.location.pathname + window.location.hash;
    window.history.replaceState({}, '', cleanUrl);
    // 用code换取用户信息（异步操作，页面在回调中处理）
    fetch('https://api.xiangliqing.com/wecom/auth/?code=' + code)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.errcode === 0) {
          localStorage.setItem('wecom_user', JSON.stringify(data));
          localStorage.setItem('wecom_user_time', Date.now().toString());
          applyWecomUser(data);
          if (typeof onLoginSuccess === 'function') onLoginSuccess(data);
        } else {
          console.error('企微登录失败:', data);
          // auth失败，隐藏登录页让用户手动登录
          document.getElementById('loginPage').classList.add('hidden');
        }
      })
      .catch(function(err) {
        console.error('企微登录请求失败:', err);
        // fetch失败，隐藏登录页让用户手动登录
        document.getElementById('loginPage').classList.add('hidden');
      });
    // 注意：这里返回true表示正在处理企微登录，但不阻止后续流程
    // init()会等待，但为了用户体验，我们让登录页显示
    return false; // 改为false，让init()继续检查本地登录状态
  }
  
  // 3. 检查是否在企微环境
  var ua = navigator.userAgent.toLowerCase();
  if (ua.indexOf('wxwork') > -1 || ua.indexOf('micromessenger') > -1) {
    // 在企微中，跳转OAuth2
    var appId = 'ww95ba771f32ae8eef';
    var redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
    var authUrl = 'https://open.weixin.qq.com/connect/oauth2/authorize?appid=' + appId + 
      '&redirect_uri=' + redirectUri + 
      '&response_type=code&scope=snsapi_base&agentid=1000024&state=login#wechat_redirect';
    window.location.href = authUrl;
    return true;
  }
  
  return false;
}

function applyWecomUser(userData) {
  CURRENT_USER = userData.name;
  USER_DEPT = userData.department || '';
  
  // 根据role设置USER_ROLE
  if (userData.role === 'admin') {
    USER_ROLE = 'Admin';
  } else if (userData.role === 'manager') {
    USER_ROLE = 'Manager';
  } else {
    USER_ROLE = 'Sales';
  }
  
  // 清除旧登录信息
  localStorage.removeItem('xlq_current_user');
  showMainInterface();
}

(function() {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

function init() {
  try {
    if (!localStorage.getItem("xlq_current_user")) {
      localStorage.setItem("xlq_current_user", JSON.stringify({username: "admin"}));
    }
    // 企微OAuth2登录（正式环境启用）
    // if (checkWecomLogin()) return;
    if (checkLoginStatus()) showMainInterface();
  } catch(e) {
    console.error('init error:', e);
    // 即使出错也尝试显示主界面
    try { showMainInterface(); } catch(e2) {}
  }
}

// ===== 功能：退货申请 =====
var returnApplications = []; // TODO: 对接后端存储API后替换

function openReturnModal() {
  document.getElementById('returnModal').classList.add('on');
  
  // 加载客户列表
  var customerSelect = document.getElementById('returnCustomer');
  var customers = customersData;
  if (USER_ROLE === 'Sales') {
    customers = customers.filter(function(c) { return c.salesman === CURRENT_USER; });
  } else if (USER_ROLE === 'Manager') {
    var members = DEPT_MEMBERS[USER_DEPT] || [];
    customers = customers.filter(function(c) { return members.indexOf(c.salesman) >= 0; });
  }
  
  var options = '<option value="">-- 请选择客户 --</option>';
  customers.forEach(function(c) {
    options += '<option value="' + c.id + '">' + c.name + ' (' + (c.region || '未分区') + ')</option>';
  });
  customerSelect.innerHTML = options;
  
  // 加载产品列表
  var productList = document.getElementById('productList');
  var productOptions = '';
  productsData.slice(0, 100).forEach(function(p) {
    productOptions += '<option value="' + p.name + '">';
  });
  productList.innerHTML = productOptions;
  
  // 清空表单
  document.getElementById('returnProduct').value = '';
  document.getElementById('returnQty').value = '';
  document.getElementById('returnReason').value = '';
  document.querySelectorAll('input[name="returnType"]').forEach(function(r) { r.checked = false; });
  document.getElementById('returnApprovalInfo').style.display = 'none';
}

function closeReturnModal() {
  document.getElementById('returnModal').classList.remove('on');
}

function updateReturnApprovalInfo() {
  var qty = parseFloat(document.getElementById('returnQty').value) || 0;
  var productInput = document.getElementById('returnProduct').value;
  
  // 查找产品价格估算
  var estimatedAmount = 0;
  productsData.forEach(function(p) {
    if (p.name === productInput && p.price1B > 0) {
      estimatedAmount = qty * p.price1B;
    }
  });
  
  if (estimatedAmount <= 0) {
    document.getElementById('returnApprovalInfo').style.display = 'none';
    return;
  }
  
  var info = document.getElementById('returnApprovalInfo');
  var level = estimatedAmount <= 500 ? '自主决定' : (estimatedAmount <= 2000 ? '区域经理' : (estimatedAmount <= 10000 ? '营销总' : '营销总+总经理'));
  
  info.style.display = 'block';
  info.innerHTML = '<div style="font-weight:600;margin-bottom:6px">💡 审批流程预估</div>' +
    '<div>预估金额：<b style="color:#e53935">¥' + estimatedAmount.toFixed(0) + '</b></div>' +
    '<div style="margin-top:4px">审批级别：' + 
    (level === '自主决定' ? '<span style="color:#137333">自主决定，仓库备案</span>' : 
     level === '区域经理' ? '<span style="color:#e65100">待区域经理审批</span>' :
     level === '营销总' ? '<span style="color:#c5221f">待营销总审批</span>' :
     '<span style="color:#7b1fa2">待营销总+总经理审批</span>') +
    '</div>';
}

function submitReturn() {
  var customerId = document.getElementById('returnCustomer').value;
  var product = document.getElementById('returnProduct').value;
  var qty = parseFloat(document.getElementById('returnQty').value);
  var returnType = document.querySelector('input[name="returnType"]:checked');
  var reason = document.getElementById('returnReason').value;
  
  // 验证
  if (!customerId) { alert('请选择客户'); return; }
  if (!product) { alert('请输入产品'); return; }
  if (!qty || qty <= 0) { alert('请输入退货数量'); return; }
  if (!returnType) { alert('请选择退货类型'); return; }
  
  // TODO: 对接T+退货数据API后，将数据提交到后端
  var application = {
    id: 'RET' + Date.now(),
    customerId: customerId,
    product: product,
    qty: qty,
    type: returnType.value,
    reason: reason,
    amount: 0, // 估算金额
    status: 'pending',
    createTime: new Date().toLocaleString(),
    approvalLevel: '' // 将在后端计算
  };
  
  // 计算预估金额
  productsData.forEach(function(p) {
    if (p.name === product && p.price1B > 0) {
      application.amount = qty * p.price1B;
    }
  });
  
  returnApplications.push(application);
  
  // TODO: 提交到后端API
  // fetch('/api/returns', { method: 'POST', body: JSON.stringify(application) })
  //   .then(res => res.json())
  //   .then(data => { alert('提交成功'); closeReturnModal(); })
  //   .catch(err => { console.error(err); });
  
  alert('✅ 退货申请已提交（系统对接中）\n申请编号：' + application.id + '\n\n审批流程将在T+系统联通后自动执行');
  closeReturnModal();
}

// 退货数量变化时更新审批信息
document.getElementById('returnQty') && document.getElementById('returnQty').addEventListener('input', updateReturnApprovalInfo);
document.getElementById('returnProduct') && document.getElementById('returnProduct').addEventListener('change', updateReturnApprovalInfo);

// TODO: 对接T+退货数据API后替换为真实数据
function updateReturnStats() {
  // 模拟数据（实际对接时从API获取）
  // var returnData = await fetch('/api/returns/stats').then(r => r.json());
  
  // 模拟月退货额（基于客户销售数据推算）
  var monthlySales = 0;
  var monthlyReturns = 0;
  
  // 获取当前用户的月销售额
  customersData.forEach(function(c) {
    if (USER_ROLE === 'Sales' && c.salesman !== CURRENT_USER) return;
    if (USER_ROLE === 'Manager') {
      var members = DEPT_MEMBERS[USER_DEPT] || [];
      if (members.indexOf(c.salesman) < 0) return;
    }
    monthlySales += parseFloat(c.monthlySales || 0);
  });
  
  // 模拟退货数据（实际对接时从T+获取）
  // 退货率上限：A类1.2% / B类1.0% / C类1.2% / D类1.5%
  var customerTier = customerCoefMap[CURRENT_USER] || {};
  var returnLimit = 0.012; // 默认1.2%
  if (customerTier.tier === 'A') returnLimit = 0.012;
  else if (customerTier.tier === 'B') returnLimit = 0.010;
  else if (customerTier.tier === 'C') returnLimit = 0.012;
  else if (customerTier.tier === 'D') returnLimit = 0.015;
  
  var returnQuota = monthlySales * returnLimit;
  monthlyReturns = 0; // 待T+对接后替换真实退货数据
  
  var returnRate = monthlySales > 0 ? (monthlyReturns / monthlySales * 100) : 0;
  var quotaUsage = returnQuota > 0 ? (monthlyReturns / returnQuota * 100) : 0;
  
  // 更新UI
  document.getElementById('returnRateVal').textContent = returnRate.toFixed(1) + '%';
  document.getElementById('returnQuotaVal').textContent = quotaUsage.toFixed(0) + '%';
  document.getElementById('returnUsedAmt').textContent = Math.round(monthlyReturns).toLocaleString();
  document.getElementById('returnTotalAmt').textContent = Math.round(returnQuota).toLocaleString();
  document.getElementById('returnQuotaBar').style.width = Math.min(quotaUsage, 100) + '%';
  
  // 预警状态：70%黄色 / 90%红色
  var badge = document.getElementById('returnWarningBadge');
  if (quotaUsage >= 90) {
    badge.textContent = '🔴 紧急';
    badge.style.background = '#ffebee';
    badge.style.color = '#c5221f';
    document.getElementById('returnQuotaBar').style.background = '#c5221f';
  } else if (quotaUsage >= 70) {
    badge.textContent = '🟡 预警';
    badge.style.background = '#fff8e1';
    badge.style.color = '#e65100';
    document.getElementById('returnQuotaBar').style.background = '#e65100';
  } else {
    badge.textContent = '🟢 正常';
    badge.style.background = '#e8f5e9';
    badge.style.color = '#2e7d32';
    document.getElementById('returnQuotaBar').style.background = '#1a73e8';
  }
}

</script>
